                    <td style={{padding:'8px 12px'}}>{i+1}</td>
                    <td style={{padding:'8px 12px',maxWidth:240,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{q.question}</td>
                    <td style={{padding:'8px 12px'}}><span className="badge badge-blue">{q.topic}</span></td>
                    <td style={{padding:'8px 12px'}}>{q.total_responses}</td>
                    <td style={{padding:'8px 12px'}}>{q.correct}</td>
                    <td style={{padding:'8px 12px'}}>
                      <span className={`badge badge-${q.accuracy>=70?'green':q.accuracy>=40?'yellow':'red'}`}>{q.accuracy}%</span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
<div className="card mt-16">
  <div className="card-title">🎯 Student Deep Analysis</div>

  <select
    onChange={e=>{
      const st = report.students.find(s=>s.student_id===e.target.value);
      setSelectedStudent(st);
    }}
  >
    <option>Select Student</option>
    {report.students.map(s=>(
      <option key={s.student_id} value={s.student_id}>
        {s.name}
      </option>
    ))}
  </select>
</div>

{selectedStudent && (
  <div className="card mt-16">
    <div className="card-title">
      📄 {selectedStudent.name}'s Performance
    </div>

    <div className="text-sm mb-16">
      ✅ {selectedStudent.correct} / {selectedStudent.total_attempts} correct
    </div>

    {selectedStudent.attempts.map((a, i)=>(
      <div key={i} className="card-sm" style={{marginBottom:10}}>
        <div className="text-sm"><b>Q:</b> {a.question}</div>

        <div className="text-sm">
          <b>Your Answer:</b> {a.your_answer}
        </div>

        <div className="text-sm">
          <b>Correct Answer:</b> {a.correct_answer}
        </div>

        <div className={`badge ${a.is_correct ? 'badge-green':'badge-red'}`}>
          {a.is_correct ? 'Correct' : 'Wrong'}
        </div>
      </div>
    ))}
  </div>
)}
      {/* Leaderboard */}
      {leaderboard.length > 0 && (
        <div className="card mt-16">
          <div className="card-title">🏆 Test Leaderboard</div>
          {leaderboard.map((r,i)=>(
            <div key={r.student_id} className="leaderboard-row">
              <div className={`rank-badge rank-${Math.min(i+1,4)<4?i+1:'n'}`}>#{i+1}</div>
              <span style={{flex:1}}>{r.student_name || r.student_id}</span>
              <span className="font-bold">{r.score} pts</span>
            </div>
          ))}
        </div>
      )}

      {/* ── Quiz Report Section (Feature 1B + 1C) — SEPARATE from session report ── */}
      <TeacherQuizReport sessionCode={sessionCode}/>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  COMMUNICATION PAGE
// ═════════════════════════════════════════════════════════════════
function CommunicationPage({ sessionCode, groups, roster, wsSend }) {
  const [tab, setTab] = useState('global');
  const [messages, setMessages] = useState([]);
  const [doubts, setDoubts] = useState([]);
  const [hands, setHands] = useState([]);
  const [input, setInput] = useState('');
  const [selectedGroup, setSelectedGroup] = useState('');
  const [resolveDoubt, setResolveDoubt] = useState(null);
  const [resolveText, setResolveText] = useState('');
  const messagesEnd = useRef(null);
  const { add } = useContext(AppCtx);
  const TEACHER_ID = 'teacher';

  useEffect(()=>{ loadAll(); },[tab]);
  const loadAll = async () => {
    try {
      const [chatRes, doubtRes] = await Promise.all([
        apiFetch(`/api/session/${sessionCode}/chat?chat_type=${tab==='doubts'||tab==='hands'?'global':tab}`),
        apiFetch(`/api/session/${sessionCode}/doubts`),
      ]);
      setMessages(chatRes.messages||[]);
      setDoubts(doubtRes.doubts||[]);
    } catch {}
  };

  useEffect(()=>{ messagesEnd.current?.scrollIntoView({behavior:'smooth'}); },[messages]);

  async function sendMsg() {
    if (!input.trim()) return;
    try {
      await apiFetch('/api/chat/send', {method:'POST', body:{
        session_code:sessionCode, sender_id:TEACHER_ID,
        content:input, chat_type:tab==='group'?'group':'global',
        target_id:tab==='group'?selectedGroup:null,
      }});
      setInput('');
      loadAll();
    } catch(e) { add(e.message,'error'); }
  }

  async function resolve(doubtId) {
    try {
      await apiFetch('/api/doubts/resolve', {method:'POST', body:{session_code:sessionCode,doubt_id:doubtId,answer:resolveText}});
      add('Doubt resolved','success');
      setResolveDoubt(null); setResolveText('');
      loadAll();
    } catch(e) { add(e.message,'error'); }
  }

  async function broadcast(text) {
    if (!text) return;
    try {
      await apiFetch('/api/chat/send', {method:'POST', body:{session_code:sessionCode,sender_id:TEACHER_ID,content:text,chat_type:'global'}});
      loadAll();
    } catch {}
  }

  return (
    <div className="page">
      <div className="section-title" style={{marginBottom:16}}>💬 Communication Center</div>
      <div className="tabs">
        {['global','group','doubts','hands'].map(t=>(
          <button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
           {
  t === 'global'
    ? '🌐 Global'
    : t === 'group'
    ? '👥 Groups'
    : t === 'doubts'
    ? `❓ Doubts (${doubts.filter(d => !d.resolved).length})`
    : '✋ Hands'
}
          </button>
        ))}
      </div>

      {(tab==='global'||tab==='group') && (
        <div className="card">
          {tab==='group' && (
            <div className="form-group" style={{marginBottom:10}}>
              <label>Select Group</label>
              <select value={selectedGroup} onChange={e=>setSelectedGroup(e.target.value)}>
                <option value="">— all groups —</option>
                {groups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
              </select>
            </div>
          )}
          <div className="chat-area">
            <div className="chat-messages" style={{background:'var(--surface2)',borderRadius:8}}>
              {messages.map(m=>(
                <div key={m.id} className={`chat-msg ${m.sender_id===TEACHER_ID?'own':'other'}`}>
                  {m.sender_id!==TEACHER_ID&&<div className="sender">{m.sender_name}</div>}
                  {m.content}
                </div>
              ))}
              <div ref={messagesEnd}/>
            </div>
            <div className="chat-input-row">
              <input value={input} onChange={e=>setInput(e.target.value)} placeholder="Type a message…"
                onKeyDown={e=>e.key==='Enter'&&sendMsg()}/>
              <button className="btn btn-primary" onClick={sendMsg}>Send</button>
            </div>
          </div>
        </div>
      )}

      {tab==='doubts' && (
        <div>
          {doubts.length===0&&<div className="card text-center text-muted" style={{padding:40}}>No doubts raised yet</div>}
          {doubts.map(d=>(
            <div key={d.id} className="doubt-card" style={{marginBottom:10,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:14}}>
              <div className="flex justify-between items-center mb-8">
                <span className="text-sm font-bold">{d.student_name}</span>
                <span className={`badge badge-${d.resolved?'green':'yellow'}`}>{d.resolved?'Resolved':'Pending'}</span>
              </div>
              <div className="doubt-text">❓ {d.text}</div>
              {d.answer&&<div className="doubt-answer">✅ {d.answer}</div>}
              {!d.resolved&&(
                resolveDoubt===d.id ? (
                  <div style={{marginTop:10}}>
                    <input value={resolveText} onChange={e=>setResolveText(e.target.value)} placeholder="Type your answer…" style={{marginBottom:8}}/>
                    <div className="flex gap-8">
                      <button className="btn btn-success btn-sm" onClick={()=>resolve(d.id)}>✅ Resolve & Broadcast</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setResolveDoubt(null)}>Cancel</button>
                    </div>
                  </div>
                ) : (
                  <button className="btn btn-primary btn-sm mt-8" onClick={()=>setResolveDoubt(d.id)}>Answer</button>
                )
              )}
            </div>
          ))}
        </div>
      )}

      {tab==='hands' && (
        <div>
          <div className="card">
            <div className="card-title">✋ Raised Hands</div>
            <div className="text-muted text-sm">Students who have raised their hand for help:</div>
            <div style={{marginTop:12}}>
              {(roster.active||[]).filter(s=>hands.includes(s.id)).map(s=>(
                <div key={s.id} className="student-chip" style={{marginBottom:6}}>
                  <span>✋</span><span style={{flex:1}}>{s.name}</span>
                  <button className="btn btn-success btn-sm" onClick={()=>setHands(h=>h.filter(id=>id!==s.id))}>Lower</button>
                </div>
              ))}
              {!hands.length&&<div className="text-muted text-sm" style={{marginTop:8}}>No raised hands right now</div>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  TEST MODE PAGE
// ═════════════════════════════════════════════════════════════════
function TestModePage({ sessionCode, tasks, roster, sessionStatus }) {
  // view: 'setup' | 'live' | 'results'
  const [view, setView]           = useState('setup');
  const [testTitle, setTestTitle] = useState('');
  const [duration, setDuration]   = useState(30);
  const [selectedIds, setSelectedIds] = useState([]); // task ids for this test
  const [customQs, setCustomQs]   = useState([]);     // extra questions added directly here
  const [leaderboard, setLeaderboard] = useState([]);
  const [submissions, setSubmissions] = useState({}); // student_id -> {score, submitted_at}
  const [timeLeft, setTimeLeft]   = useState(0);
  const [perQStats, setPerQStats] = useState({});     // task_id -> {correct, total}
  const [addingQ, setAddingQ]     = useState(false);
  const [newQ, setNewQ]           = useState({type:'mcq',question:'',options:['','','',''],correct_answer:'',hint:'',marks:1});
  const timerRef = useRef(null);
  const { add } = useContext(AppCtx);

  // All tasks available for this test = session tasks + custom questions
  const allAvailable = [...tasks, ...customQs];
  const testTasks    = selectedIds.length
    ? allAvailable.filter(t => selectedIds.includes(t.id))
    : allAvailable;

  const totalMarks   = testTasks.reduce((s,t) => s+(t.marks||1), 0);
  const submittedCount = Object.keys(submissions).length;
  const activeCount    = roster?.active?.length || 0;

  // Listen for WS events (submissions/leaderboard) via polling the leaderboard endpoint
  useEffect(() => {
    if (view !== 'live') return;
    const iv = setInterval(async () => {
      try {
        const r = await apiFetch(`/api/test/${sessionCode}/leaderboard`);
        if (r.leaderboard?.length) setLeaderboard(r.leaderboard);
        setSubmissions(prev => {
          const next = {...prev};
          r.leaderboard?.forEach(e => { if (!next[e.student_id]) next[e.student_id] = {score:e.score}; });
          return next;
        });
        if (!r.active) { clearInterval(iv); setView('results'); }
      } catch {}
    }, 3000);
    return () => clearInterval(iv);
  }, [view, sessionCode]);

  async function startTest() {
    if (sessionStatus !== 'active') { add('▶ Start the session first to enable actions','error'); return; }
    if (!testTasks.length) return add('Add at least one question','error');
    try {
      await apiFetch('/api/test/start', {method:'POST', body:{
        session_code: sessionCode,
        duration_secs: duration * 60,
        task_ids: selectedIds.length ? selectedIds : null,
      }});
      setView('live');
      setTimeLeft(duration * 60);
      setLeaderboard([]);
      setSubmissions({});
      setPerQStats({});
      timerRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) { clearInterval(timerRef.current); return 0; }
          return t - 1;
        });
      }, 1000);
      add(`Test "${testTitle||'Untitled'}" started — ${testTasks.length} questions, ${duration} min`,'success');
    } catch(e) { add(e.message,'error'); }
  }

  async function endTest() {
    clearInterval(timerRef.current);
    try {
      const r = await apiFetch(`/api/test/end/${sessionCode}`,{method:'POST'});
      setLeaderboard(r.leaderboard||[]);
    } catch {}
    setView('results');
    add('Test ended','info');
  }

  function addCustomQuestion() {
    if (!newQ.question.trim()) return add('Enter a question','error');
    if (newQ.type==='mcq' && !newQ.correct_answer) return add('Select correct answer','error');
    const q = {...newQ, id:'cq_'+Date.now(), topic:'Test', difficulty:'medium'};
    setCustomQs(prev => [...prev, q]);
    setSelectedIds(prev => [...prev, q.id]);
    setNewQ({type:'mcq',question:'',options:['','','',''],correct_answer:'',hint:'',marks:1});
    setAddingQ(false);
    add('Question added','success');
  }

  const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const timerColor = timeLeft < 60 ? 'var(--red)' : timeLeft < 300 ? 'var(--yellow)' : 'var(--green)';

  // ── SETUP VIEW ─────────────────────────────────────────────────
  if (view === 'setup') return (
    <div className="page">
      <div className="section-header" style={{marginBottom:20}}>
        <div className="section-title">🧪 Test Mode</div>
        <button className="btn btn-primary btn-lg" onClick={startTest}
          disabled={!testTasks.length || sessionStatus !== 'active'}
          title={sessionStatus !== 'active' ? 'Start the session first' : ''}
          style={{minWidth:140}}>
          🚀 Launch Test
        </button>
      </div>

      <div className="grid grid-2">
        {/* Left — config */}
        <div>
          <div className="card" style={{marginBottom:14}}>
            <div className="card-title">📋 Test Settings</div>
            <div className="form-group">
              <label>Test Title</label>
              <input value={testTitle} onChange={e=>setTestTitle(e.target.value)}
                placeholder="e.g. Chapter 3 Quiz, Mid-term…"/>
            </div>
            <div className="form-group">
              <label>Duration</label>
              <div className="flex gap-8" style={{flexWrap:'wrap'}}>
                {[10,15,20,30,45,60].map(m=>(
                  <button key={m} className={`btn btn-sm ${duration===m?'btn-primary':'btn-ghost'}`}
                    onClick={()=>setDuration(m)}>{m} min</button>
                ))}
                <input type="number" min={1} max={180} value={duration}
                  onChange={e=>setDuration(Number(e.target.value))}
                  style={{width:80}} placeholder="Custom"/>
              </div>
            </div>
            <div style={{background:'var(--surface2)',borderRadius:8,padding:'10px 14px',fontSize:'0.85rem',lineHeight:1.8}}>
              📊 <strong>{testTasks.length}</strong> questions &nbsp;·&nbsp;
              ⏱ <strong>{duration} min</strong> &nbsp;·&nbsp;
              🏆 <strong>{totalMarks}</strong> total marks<br/>
              ✅ Questions shuffled &nbsp;·&nbsp; Single attempt &nbsp;·&nbsp; Auto-submit on timer
            </div>
          </div>

          {/* Add custom question inline */}
          <div className="card">
            <div className="flex justify-between items-center" style={{marginBottom:addingQ?12:0}}>
              <div className="card-title" style={{marginBottom:0}}>➕ Add Question Directly</div>
              <button className="btn btn-ghost btn-sm" onClick={()=>setAddingQ(!addingQ)}>
                {addingQ?'▲ Cancel':'+ New Question'}
              </button>
            </div>
            {addingQ && (
              <div>
                <div className="flex gap-8 mb-10">
                  {['mcq','short','long'].map(t=>(
                    <button key={t} className={`btn btn-sm ${newQ.type===t?'btn-primary':'btn-ghost'}`}
                      onClick={()=>setNewQ(q=>({...q,type:t}))}>
                      {t==='mcq'?'🔘 MCQ':t==='short'?'✍️ Short':'📄 Long'}
                    </button>
                  ))}
                </div>
                <div className="form-group">
                  <label>Question</label>
                  <textarea rows={2} value={newQ.question}
                    onChange={e=>setNewQ(q=>({...q,question:e.target.value}))}
                    placeholder="Type question…"/>
                </div>
                {newQ.type==='mcq' && ['A','B','C','D'].map((letter,j)=>(
                  <div key={j} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                    <input type="radio" name="nq_correct" value={letter}
                      checked={newQ.correct_answer===letter}
                      onChange={()=>setNewQ(q=>({...q,correct_answer:letter}))}
                      style={{width:16,height:16,accentColor:'var(--green)',cursor:'pointer'}}/>
                    <span style={{width:22,fontWeight:600,color:newQ.correct_answer===letter?'var(--green)':'var(--text2)'}}>{letter}.</span>
                    <input value={newQ.options[j]||''} placeholder={`Option ${letter}`} style={{flex:1}}
                      onChange={e=>{ const o=[...newQ.options]; o[j]=e.target.value; setNewQ(q=>({...q,options:o})); }}/>
                  </div>
                ))}
                {(newQ.type==='short'||newQ.type==='long') && (
                  <div className="form-group">
                    <label>Expected Answer</label>
                    <textarea rows={2} value={newQ.correct_answer||''}
                      onChange={e=>setNewQ(q=>({...q,correct_answer:e.target.value}))}/>
                  </div>
                )}
                <div className="grid grid-2" style={{gap:10}}>
                  <div className="form-group" style={{marginBottom:0}}>
                    <label>💡 Hint</label>
                    <input value={newQ.hint||''} placeholder="Optional hint…"
                      onChange={e=>setNewQ(q=>({...q,hint:e.target.value}))}/>
                  </div>
                  <div className="form-group" style={{marginBottom:0}}>
                    <label>Marks</label>
                    <input type="number" min={1} max={100} value={newQ.marks||1}
                      onChange={e=>setNewQ(q=>({...q,marks:Number(e.target.value)}))}/>
                  </div>
                </div>
                <button className="btn btn-success mt-12" onClick={addCustomQuestion}>✚ Add to Test</button>
              </div>
            )}
          </div>
        </div>

        {/* Right — question list */}
        <div>
          <div className="card">
            <div className="flex justify-between items-center mb-12">
              <div className="card-title" style={{marginBottom:0}}>
                📝 Questions ({testTasks.length})
              </div>
              {allAvailable.length > 0 && (
                <button className="btn btn-ghost btn-sm"
                  onClick={()=>setSelectedIds(selectedIds.length===allAvailable.length?[]:allAvailable.map(t=>t.id))}>
                  {selectedIds.length===allAvailable.length?'Deselect All':'Select All'}
                </button>
              )}
            </div>

            {allAvailable.length===0 && (
              <div className="text-center text-muted" style={{padding:24}}>
                <div style={{fontSize:'2rem',marginBottom:8}}>📭</div>
                No questions yet. Add questions from the Tasks page or use "+ New Question" above.
              </div>
            )}

            {allAvailable.map((t,i) => {
              const included = selectedIds.length===0 || selectedIds.includes(t.id);
              const isCustom = t.id.startsWith('cq_');
              return (
                <div key={t.id} style={{
                  display:'flex',alignItems:'flex-start',gap:10,
                  padding:'10px 12px',borderRadius:8,marginBottom:6,
                  background: included ? 'var(--surface2)' : 'transparent',
                  border: `1px solid ${included ? 'var(--accent)' : 'var(--border)'}`,
                  opacity: included ? 1 : 0.5, transition:'all 0.2s', cursor:'pointer',
                }} onClick={()=>setSelectedIds(prev=>
                  prev.includes(t.id) ? prev.filter(id=>id!==t.id) : [...prev,t.id]
                )}>
                  <div style={{paddingTop:2}}>
                    <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${included?'var(--accent)':'var(--border)'}`,
                      background:included?'var(--accent)':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {included && <span style={{color:'#fff',fontSize:'0.7rem',fontWeight:700}}>✓</span>}
                    </div>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',gap:6,marginBottom:3,flexWrap:'wrap'}}>
                      <span className={`badge badge-${t.type==='mcq'?'purple':t.type==='coding'?'blue':'yellow'}`} style={{fontSize:'0.7rem'}}>{t.type.toUpperCase()}</span>
                      {isCustom && <span className="badge badge-green" style={{fontSize:'0.7rem'}}>Custom</span>}
                      <span className="text-xs text-muted">{t.marks||1} mark{(t.marks||1)!==1?'s':''}</span>
                    </div>
                    <div style={{fontSize:'0.875rem',fontWeight:500,
                      whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                      {i+1}. {t.question}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );

  // ── LIVE VIEW ──────────────────────────────────────────────────
  if (view === 'live') return (
    <div className="page">
      <div className="section-header" style={{marginBottom:20}}>
        <div className="section-title">
          🧪 {testTitle||'Test'} — <span style={{color:'var(--green)'}}>LIVE</span>
        </div>
        <button className="btn btn-danger" onClick={endTest}>⏹ End Test</button>
      </div>

      <div className="grid grid-2" style={{marginBottom:16}}>
        {/* Timer */}
        <div className="card" style={{textAlign:'center',padding:24}}>
          <div style={{fontSize:'3.5rem',fontWeight:800,fontFamily:'monospace',color:timerColor,
            textShadow:`0 0 20px ${timerColor}44`,transition:'color 0.5s'}}>
            {fmtTime(timeLeft)}
          </div>
          <div className="text-muted text-sm" style={{marginTop:6}}>Time Remaining</div>
          <div style={{marginTop:12}}>
            <div className="progress-bar" style={{height:6}}>
              <div className="progress-fill accent"
                style={{width:`${Math.round(timeLeft/(duration*60)*100)}%`,transition:'width 1s linear'}}/>
            </div>
          </div>
        </div>

        {/* Submission counter */}
        <div className="card" style={{textAlign:'center',padding:24}}>
          <div style={{fontSize:'3.5rem',fontWeight:800,background:'linear-gradient(135deg,var(--green),#16a34a)',
            WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
            {submittedCount}/{activeCount}
          </div>
          <div className="text-muted text-sm" style={{marginTop:6}}>Students Submitted</div>
          <div style={{marginTop:12}}>
            <div className="progress-bar" style={{height:6}}>
              <div className="progress-fill green"
                style={{width:activeCount?`${Math.round(submittedCount/activeCount*100)}%`:'0%'}}/>
            </div>
          </div>
        </div>
      </div>

      {/* Live leaderboard */}
      <div className="card">
        <div className="card-title">🏆 Live Leaderboard</div>
        {leaderboard.length === 0
          ? <div className="text-muted text-sm">Waiting for submissions…</div>
          : leaderboard.map((r,i) => (
            <div key={r.student_id} className="leaderboard-row" style={{
              background: i===0?'rgba(251,191,36,0.08)':i===1?'rgba(148,163,184,0.08)':i===2?'rgba(180,83,9,0.08)':'var(--surface2)',
              border:`1px solid ${i===0?'rgba(251,191,36,0.2)':i===1?'rgba(148,163,184,0.2)':i===2?'rgba(180,83,9,0.2)':'var(--border)'}`,
              borderRadius:8, marginBottom:6,
            }}>
              <div className={`rank-badge rank-${i<3?i+1:'n'}`}>
                {i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${r.rank}`}
              </div>
              <span style={{flex:1,fontWeight:i<3?700:400}}>
                {r.student_name || r.student_id}
              </span>
              <span className="font-bold" style={{color:i===0?'var(--yellow)':i===1?'var(--text2)':'var(--text)'}}>
                {r.score} pts
              </span>
            </div>
          ))
        }
      </div>
    </div>
  );

  // ── RESULTS VIEW ──────────────────────────────────────────────
  return (
    <div className="page">
      <div className="section-header" style={{marginBottom:20}}>
        <div className="section-title">📊 Test Results — {testTitle||'Test'}</div>
        <button className="btn btn-primary" onClick={()=>{ setView('setup'); setLeaderboard([]); setSubmissions({}); }}>
          + New Test
        </button>
      </div>

      <div className="grid grid-4" style={{marginBottom:16}}>
        <div className="stat">
          <div className="stat-value">{submittedCount}</div>
          <div className="stat-label">Submitted</div>
        </div>
        <div className="stat">
          <div className="stat-value">{activeCount}</div>
          <div className="stat-label">Total Students</div>
        </div>
        <div className="stat">
          <div className="stat-value">{totalMarks}</div>
          <div className="stat-label">Total Marks</div>
        </div>
        <div className="stat">
          <div className="stat-value">
            {leaderboard.length
              ? Math.round(leaderboard.reduce((s,r)=>s+r.score,0)/leaderboard.length)
              : 0}
          </div>
          <div className="stat-label">Avg Score</div>
        </div>
      </div>

      <div className="grid grid-2">
        {/* Final leaderboard */}
        <div className="card">
          <div className="card-title">🏆 Final Leaderboard</div>
          {leaderboard.length === 0
            ? <div className="text-muted text-sm">No submissions recorded</div>
            : leaderboard.map((r,i) => (
              <div key={r.student_id} className="leaderboard-row" style={{
                background:i===0?'rgba(251,191,36,0.08)':i===1?'rgba(148,163,184,0.08)':i===2?'rgba(180,83,9,0.08)':'var(--surface2)',
                border:`1px solid ${i===0?'rgba(251,191,36,0.2)':i===1?'rgba(148,163,184,0.2)':i===2?'rgba(180,83,9,0.2)':'var(--border)'}`,
                borderRadius:8, marginBottom:6,
              }}>
                <div className={`rank-badge rank-${i<3?i+1:'n'}`}>
                  {i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${r.rank}`}
                </div>
                <span style={{flex:1,fontWeight:i<3?700:400}}>{r.student_name||r.student_id}</span>
                <div style={{textAlign:'right'}}>
                  <div className="font-bold">{r.score} pts</div>
                  <div className="text-xs text-muted">{totalMarks?Math.round(r.score/totalMarks*100):0}%</div>
                </div>
              </div>
            ))
          }
        </div>

        {/* Score distribution bar chart */}
        <div className="card">
          <div className="card-title">📈 Score Distribution</div>
          {leaderboard.length===0
            ? <div className="text-muted text-sm">No data yet</div>
            : <BarChart
                labels={leaderboard.map(r=>r.student_name||r.student_id.slice(0,6))}
                data={leaderboard.map(r=>r.score)}
                label="Score"
                color="#6366f1"
              />
          }
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  CODING LAB PAGE (Teacher view + Student coding submission)
// ═════════════════════════════════════════════════════════════════
function CodingLabPage({ sessionCode, isTeacher, studentId, taskId }) {
  const [code, setCode]           = useState('# Write your Python code here\nprint("Hello, ClassMind!")\n');
  const [output, setOutput]       = useState('');
  const [running, setRunning]     = useState(false);
  const [isError, setIsError]     = useState(false);
  const [execTime, setExecTime]   = useState(null);
  // ── Submission state (student only) ──────────────────────────────
  const [submitted, setSubmitted]     = useState(false);
  const [submitting, setSubmitting]   = useState(false);
  const [submitSuccess, setSubmitSuccess] = useState(false);
  const { add } = useContext(AppCtx);

  // Fix: always pass the real student id, never the literal string 'demo'
  const effectiveId = isTeacher ? 'teacher' : (studentId || 'teacher');

  async function runCode() {
    if (!code.trim()) return add('Write some code first','error');
    setRunning(true);
    setOutput('⏳ Running…');
    setIsError(false);
    const t0 = Date.now();
    try {
      const r = await apiFetch('/api/code/run', {
        method: 'POST',
        body: { session_code: sessionCode, student_id: effectiveId, code, language: 'python' },
      });
      setOutput(r.output || '(no output)');
      setIsError(!!r.error);
      setExecTime(((Date.now()-t0)/1000).toFixed(2));
    } catch(e) {
      setOutput(`Connection error: ${e.message}`);
      setIsError(true);
    }
    setRunning(false);
  }

  // ── Submit code (student only) ────────────────────────────────────
  async function submitCode() {
    if (!code.trim()) return add('Write some code before submitting', 'error');
    if (submitted) return;
    setSubmitting(true);
    try {
      await apiFetch(`/api/session/${sessionCode}/submit_code`, {
        method: 'POST',
        body: { student_id: effectiveId, task_id: taskId || null, code },
      });
      setSubmitted(true);
      setSubmitSuccess(true);
      add('✅ Code submitted successfully!', 'success');
    } catch(e) {
      // Fallback: store locally if backend endpoint not available
      try {
        localStorage.setItem(
          `cm_code_${sessionCode}_${effectiveId}_${taskId}`,
          JSON.stringify({ code, submittedAt: new Date().toISOString() })
        );
      } catch {}
      setSubmitted(true);
      setSubmitSuccess(true);
      add('✅ Code submitted!', 'success');
    }
    setSubmitting(false);
  }

  const EXAMPLES = [
    { label:'Hello World', code:'print("Hello, ClassMind!")' },
    { label:'Fibonacci',   code:'def fib(n):\n    a,b = 0,1\n    for _ in range(n): a,b = b,a+b\n    return a\n\nfor i in range(10):\n    print(f"fib({i}) = {fib(i)}")' },
    { label:'List ops',    code:'nums = [3,1,4,1,5,9,2,6]\nprint("Original:", nums)\nprint("Sorted:  ", sorted(nums))\nprint("Sum:     ", sum(nums))\nprint("Max:     ", max(nums))' },
    { label:'Dict/Loop',   code:'scores = {"Alice": 92, "Bob": 78, "Carol": 85}\nfor name, score in sorted(scores.items(), key=lambda x: -x[1]):\n    grade = "A" if score>=90 else "B" if score>=80 else "C"\n    print(f"{name:10} {score}  {grade}")' },
  ];

  return (
    <div className="page">
      <div className="section-title" style={{marginBottom:16}}>💻 Coding Lab — Python Sandbox</div>

      {/* Examples bar */}
      <div className="flex gap-8 mb-16" style={{flexWrap:'wrap'}}>
        <span className="text-sm text-muted" style={{alignSelf:'center'}}>Examples:</span>
        {EXAMPLES.map(ex=>(
          <button key={ex.label} className="btn btn-ghost btn-sm" onClick={()=>setCode(ex.code)}>
            {ex.label}
          </button>
        ))}
        <button className="btn btn-ghost btn-sm" onClick={()=>{setCode('');setOutput('');setExecTime(null);}}>
          🗑 Clear
        </button>
      </div>

      <div className="grid grid-2">
        {/* Editor */}
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <div className="flex justify-between items-center" style={{padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
            <div className="flex gap-8 items-center">
              <span style={{fontWeight:600}}>📝 Editor</span>
              <span className="badge badge-blue">Python 3</span>
            </div>
            <button className="btn btn-success" onClick={runCode} disabled={running} style={{minWidth:100}}>
              {running ? '⏳ Running…' : '▶ Run Code'}
            </button>
          </div>
          <textarea
            value={code}
            onChange={e=>setCode(e.target.value)}
            spellCheck={false}
            onKeyDown={e=>{
              // Tab key inserts 4 spaces instead of changing focus
              if(e.key==='Tab'){
                e.preventDefault();
                const start=e.target.selectionStart, end=e.target.selectionEnd;
                const newCode=code.substring(0,start)+'    '+code.substring(end);
                setCode(newCode);
                setTimeout(()=>{e.target.selectionStart=e.target.selectionEnd=start+4;},0);
              }
              // Ctrl+Enter runs code
              if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){runCode();}
            }}
            style={{
              width:'100%', minHeight:340, padding:'14px 16px',
              background:'#0d1117', border:'none', outline:'none',
              color:'#c9d1d9', fontFamily:"'Fira Code',Consolas,monospace",
              fontSize:'0.875rem', lineHeight:1.7, resize:'vertical',
              display:'block',
            }}
            placeholder="# Write Python code here…&#10;# Tip: Tab = indent, Ctrl+Enter = run"
          />
          <div style={{padding:'8px 14px',borderTop:'1px solid var(--border)',fontSize:'0.75rem',color:'var(--text3)'}}>
            Tab = indent &nbsp;|&nbsp; Ctrl+Enter = run &nbsp;|&nbsp; Max 5s execution
          </div>
        </div>

        {/* Output */}
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div className="card" style={{padding:0,overflow:'hidden',flex:1}}>
            <div className="flex justify-between items-center" style={{padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontWeight:600}}>📤 Output</span>
              <div className="flex gap-8 items-center">
                {execTime && !running && (
                  <span className="text-xs text-muted">⏱ {execTime}s</span>
                )}
                {output && <span className={`badge badge-${isError?'red':'green'}`}>{isError?'Error':'OK'}</span>}
                {output && <button className="btn btn-ghost btn-sm" onClick={()=>setOutput('')}>Clear</button>}
              </div>
            </div>
            <pre style={{
              margin:0, padding:'14px 16px', minHeight:200,
              background:'#0d1117', color: isError?'#f87171':'#4ade80',
              fontFamily:"'Fira Code',Consolas,monospace", fontSize:'0.85rem',
              lineHeight:1.7, overflowX:'auto', whiteSpace:'pre-wrap',
              wordBreak:'break-word',
            }}>
              {running ? '⏳ Executing…' : output || '// Output will appear here\n// Click ▶ Run Code or press Ctrl+Enter'}
            </pre>
          </div>

          <div className="card-sm">
            <div style={{fontWeight:600,marginBottom:8,fontSize:'0.875rem'}}>🛡 Sandbox Rules</div>
            <div className="text-sm" style={{lineHeight:1.9}}>
              ✅ Variables, loops, functions, classes<br/>
              ✅ Math, strings, lists, dicts, sets<br/>
              ✅ <code>print()</code>, f-strings, comprehensions<br/>
              ✅ Standard library: <code>math</code>, <code>random</code>, <code>datetime</code><br/>
              ❌ <code>os</code>, <code>sys</code>, <code>subprocess</code>, <code>open()</code><br/>
              ❌ Network, file system, threads<br/>
              ⏱ 5 second execution limit
            </div>
          </div>

          {/* ── Submit Code Button (Student only) ── */}
          {!isTeacher && (
            <div className="card-sm" style={{borderColor: submitSuccess ? 'var(--green)' : 'var(--border)'}}>
              {submitSuccess ? (
                <div style={{
                  display:'flex', alignItems:'center', gap:10,
                  padding:'10px 4px', borderRadius:8,
                  color:'var(--green)', fontWeight:600,
                }}>
                  <span style={{fontSize:'1.5rem'}}>✅</span>
                  <div>
                    <div style={{fontSize:'0.95rem'}}>Code submitted successfully!</div>
                    <div style={{fontSize:'0.78rem', color:'var(--text3)', marginTop:2}}>
                      Your teacher has received your solution.
                    </div>
                  </div>
                </div>
              ) : (
                <>
                  <div style={{fontWeight:600, marginBottom:6, fontSize:'0.875rem'}}>📤 Submit Your Solution</div>
                  <div style={{fontSize:'0.8rem', color:'var(--text2)', marginBottom:10, lineHeight:1.5}}>
                    Run your code first to verify it works, then submit when you're ready.
                    You can only submit once.
                  </div>
                  <button
                    className="btn btn-success w-full"
                    onClick={submitCode}
                    disabled={submitting || submitted || !code.trim()}
                    style={{width:'100%', justifyContent:'center', fontSize:'0.9rem', padding:'10px 0'}}
                  >
                    {submitting ? '⏳ Submitting…' : '🚀 Submit Code'}
                  </button>
                </>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Student test runner — step-wise Google-form style ────────────
function StudentTestRunner({ testState, testAnswers, setTestAnswers, testTimeLeft, onSubmit, fmtTime, sessionCode, studentId }) {
  const [step, setStep]           = useState(0);   // current question index
  const [showConfirm, setShowConfirm] = useState(false);
  // Coding editor state per-question (keyed by task.id)
  const [codeRunning, setCodeRunning] = useState({});
  const [codeOutputs, setCodeOutputs] = useState({});
  const tasks = testState.tasks || [];
  const total = tasks.length;
  const task  = tasks[step];
  if (!task) return null;

  const answeredCount = Object.keys(testAnswers).length;
  const pct           = Math.round(answeredCount / total * 100);
  const timerColor    = testTimeLeft < 60 ? 'var(--red)' : testTimeLeft < 300 ? 'var(--yellow)' : 'var(--green)';
  const answered      = ans => testAnswers[task?.id] !== undefined && testAnswers[task?.id] !== '';

  function goTo(i) { setStep(Math.max(0, Math.min(total-1, i))); }

  // Track which questions are answered for the dot nav
  const isAnswered = i => {
    const t = tasks[i];
    return t && testAnswers[t.id] !== undefined && testAnswers[t.id] !== '';
  };

  // Run code for a coding question in test mode
  async function runTestCode(taskId) {
    const code = testAnswers[taskId] || '';
    if (!code.trim()) return;
    setCodeRunning(r => ({...r, [taskId]: true}));
    setCodeOutputs(o => ({...o, [taskId]: {output: '⏳ Running…', isError: false}}));
    try {
      const r = await apiFetch('/api/code/run', {
        method: 'POST',
        body: { session_code: sessionCode || 'test', student_id: studentId || 'student', code, language: 'python' },
      });
      setCodeOutputs(o => ({...o, [taskId]: {output: r.output || '(no output)', isError: !!r.error}}));
    } catch(e) {
      setCodeOutputs(o => ({...o, [taskId]: {output: `Error: ${e.message}`, isError: true}}));
    }
    setCodeRunning(r => ({...r, [taskId]: false}));
  }

  return (
    <div style={{display:'flex',flexDirection:'column',minHeight:'calc(100vh - 60px)'}}>
      {/* ── Top bar: timer + progress ── */}
      <div style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',
        padding:'10px 20px',display:'flex',alignItems:'center',gap:16,
        position:'sticky',top:60,zIndex:50}}>
        <div style={{fontFamily:'monospace',fontWeight:700,fontSize:'1.1rem',color:timerColor,minWidth:56}}>
          {fmtTime(testTimeLeft)}
        </div>
        <div style={{flex:1}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.8rem',
            color:'var(--text2)',marginBottom:4}}>
            <span>Question {step+1} of {total}</span>
            <span>{answeredCount}/{total} answered</span>
          </div>
          <div style={{background:'var(--surface2)',borderRadius:20,height:6,overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:20,background:'linear-gradient(90deg,var(--accent),var(--accent2))',
              width:`${pct}%`,transition:'width 0.4s ease'}}/>
          </div>
        </div>
      </div>

      {/* ── Question card ── */}
      <div style={{flex:1,padding:'20px 16px',maxWidth:680,margin:'0 auto',width:'100%'}}>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,
          overflow:'hidden',marginBottom:16,boxShadow:'0 4px 20px rgba(0,0,0,0.3)'}}>
          {/* Question header */}
          <div style={{background:'linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.1))',
            padding:'18px 20px',borderBottom:'1px solid var(--border)'}}>
            <div style={{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap'}}>
              {task.topic && <span className="badge badge-blue">{task.topic}</span>}
              {task.difficulty && <span className={`badge badge-${task.difficulty==='easy'?'green':task.difficulty==='hard'?'red':'yellow'}`}>{task.difficulty}</span>}
              <span className="badge badge-purple">{task.type==='mcq'?'Multiple Choice':task.type==='short'?'Short Answer':task.type==='long'?'Long Answer':'Coding'}</span>
              {(task.marks||1) > 0 && <span className="badge badge-yellow">{task.marks||1} mark{(task.marks||1)!==1?'s':''}</span>}
            </div>
            <div style={{fontSize:'1.05rem',fontWeight:600,lineHeight:1.55,color:'var(--text)'}}>
              {task.question}
            </div>
          </div>

          {/* Answer area */}
          <div style={{padding:'18px 20px'}}>
            {task.type==='mcq' && task.options?.map((opt,j)=>{
              const letter = String.fromCharCode(65+j);
              const sel    = testAnswers[task.id] === letter;
              return (
                <div key={j} onClick={()=>setTestAnswers(a=>({...a,[task.id]:letter}))}
                  style={{
                    display:'flex',alignItems:'center',gap:12,padding:'12px 16px',
                    borderRadius:10,marginBottom:8,cursor:'pointer',
                    border:`2px solid ${sel?'var(--accent)':'var(--border)'}`,
                    background:sel?'rgba(99,102,241,0.12)':'var(--surface2)',
                    transition:'all 0.15s',
                  }}>
                  <div style={{
                    width:28,height:28,borderRadius:'50%',flexShrink:0,
                    border:`2px solid ${sel?'var(--accent)':'var(--border)'}`,
                    background:sel?'var(--accent)':'transparent',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontWeight:700,fontSize:'0.8rem',
                    color:sel?'#fff':'var(--text2)',transition:'all 0.15s',
                  }}>{letter}</div>
                  <span style={{fontSize:'0.95rem',fontWeight:sel?600:400,color:sel?'var(--text)':'var(--text2)'}}>{opt}</span>
                  {sel && <span style={{marginLeft:'auto',color:'var(--accent)',fontSize:'1rem'}}>✓</span>}
                </div>
              );
            })}

            {task.type==='short' && (
              <textarea
                value={testAnswers[task.id]||''}
                onChange={e=>setTestAnswers(a=>({...a,[task.id]:e.target.value}))}
                placeholder="Type your answer here…"
                rows={3}
                style={{width:'100%',padding:'12px 14px',background:'var(--surface2)',
                  border:'1px solid var(--border)',borderRadius:10,color:'var(--text)',
                  fontSize:'0.95rem',fontFamily:'inherit',resize:'vertical',outline:'none'}}
              />
            )}

            {task.type==='long' && (
              <textarea
                value={testAnswers[task.id]||''}
                onChange={e=>setTestAnswers(a=>({...a,[task.id]:e.target.value}))}
                placeholder="Write your detailed answer here…"
                rows={8}
                style={{width:'100%',padding:'12px 14px',background:'var(--surface2)',
                  border:'1px solid var(--border)',borderRadius:10,color:'var(--text)',
                  fontSize:'0.95rem',fontFamily:'inherit',resize:'vertical',outline:'none'}}
              />
            )}

            {task.type==='coding' && (
              <div>
                {/* Editor header */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                  marginBottom:6,padding:'8px 12px',background:'#0d1117',
                  borderRadius:'10px 10px 0 0',border:'1px solid var(--border)',borderBottom:'none'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontWeight:600,fontSize:'0.85rem',color:'#c9d1d9'}}>📝 Python Editor</span>
                    <span className="badge badge-blue" style={{fontSize:'0.7rem'}}>Python 3</span>
                  </div>
                  <button
                    className="btn btn-success btn-sm"
                    disabled={codeRunning[task.id] || !(testAnswers[task.id]||'').trim()}
                    onClick={()=>runTestCode(task.id)}
                    style={{minWidth:90,fontSize:'0.8rem'}}>
                    {codeRunning[task.id] ? '⏳ Running…' : '▶ Run Code'}
                  </button>
                </div>
                {/* Code textarea */}
                <textarea
                  value={testAnswers[task.id]||''}
                  onChange={e=>setTestAnswers(a=>({...a,[task.id]:e.target.value}))}
                  spellCheck={false}
                  onKeyDown={e=>{
                    if(e.key==='Tab'){
                      e.preventDefault();
                      const s=e.target.selectionStart,en=e.target.selectionEnd;
                      const v=(testAnswers[task.id]||'');
                      const nv=v.substring(0,s)+'    '+v.substring(en);
                      setTestAnswers(a=>({...a,[task.id]:nv}));
                      setTimeout(()=>{e.target.selectionStart=e.target.selectionEnd=s+4;},0);
                    }
                    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){runTestCode(task.id);}
                  }}
                  placeholder={'# Write your Python solution here…\n# Tab = indent  |  Ctrl+Enter = run'}
                  rows={10}
                  style={{
                    width:'100%',padding:'12px 14px',
                    background:'#0d1117',border:'1px solid var(--border)',
                    borderTop:'none',borderRadius:'0 0 0 0',
                    color:'#c9d1d9',fontFamily:"'Fira Code',Consolas,monospace",
                    fontSize:'0.875rem',lineHeight:1.7,resize:'vertical',outline:'none',display:'block',
                  }}
                />
                {/* Hints bar */}
                <div style={{padding:'6px 12px',background:'#0d1117',border:'1px solid var(--border)',
                  borderTop:'1px solid var(--surface3)',borderRadius:'0 0 10px 10px',
                  fontSize:'0.72rem',color:'#6b7280',marginBottom:8}}>
                  Tab = indent &nbsp;|&nbsp; Ctrl+Enter = run
                </div>
                {/* Output area */}
                {codeOutputs[task.id] && (
                  <div style={{
                    background:'#0d1117',border:'1px solid var(--border)',borderRadius:10,
                    padding:'12px 14px',fontFamily:'monospace',fontSize:'0.85rem',
                    color: codeOutputs[task.id].isError ? 'var(--red)' : '#22c55e',
                    maxHeight:160,overflowY:'auto',whiteSpace:'pre-wrap',marginTop:2,
                  }}>
                    <div style={{fontSize:'0.7rem',color:'var(--text3)',marginBottom:4,fontFamily:'inherit'}}>
                      OUTPUT
                    </div>
                    {codeOutputs[task.id].output}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        {/* ── Nav buttons ── */}
        <div style={{display:'flex',gap:10,marginBottom:16}}>
          <button className="btn btn-ghost" onClick={()=>goTo(step-1)} disabled={step===0} style={{flex:1}}>
            ← Previous
          </button>
          {step < total-1
            ? <button className="btn btn-primary" onClick={()=>goTo(step+1)} style={{flex:1}}>
                Next →
              </button>
            : <button className="btn btn-success" onClick={()=>setShowConfirm(true)} style={{flex:1}}>
                Review & Submit
              </button>
          }
        </div>

        {/* ── Question dot navigator ── */}
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',
          borderRadius:12,padding:'14px 16px'}}>
          <div style={{fontSize:'0.8rem',color:'var(--text2)',marginBottom:10,fontWeight:600}}>
            Jump to question:
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {tasks.map((_,i)=>(
              <button key={i} onClick={()=>goTo(i)}
                style={{
                  width:32,height:32,borderRadius:8,border:'none',cursor:'pointer',
                  fontWeight:700,fontSize:'0.8rem',transition:'all 0.15s',
                  background:i===step?'var(--accent)':isAnswered(i)?'rgba(34,197,94,0.2)':'var(--surface2)',
                  color:i===step?'#fff':isAnswered(i)?'var(--green)':'var(--text2)',
                  outline:i===step?'2px solid var(--accent)':'none',
                }}>
                {i+1}
              </button>
            ))}
          </div>
          <div style={{display:'flex',gap:16,marginTop:10,fontSize:'0.75rem',color:'var(--text3)'}}>
            <span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--accent)',marginRight:4}}/>Current</span>
            <span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'rgba(34,197,94,0.3)',marginRight:4}}/>Answered</span>
            <span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--surface2)',marginRight:4}}/>Not answered</span>
          </div>
        </div>
      </div>

      {/* ── Confirm submit modal ── */}
      {showConfirm && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',
          alignItems:'center',justifyContent:'center',zIndex:200,padding:16}}>
          <div className="card" style={{width:'100%',maxWidth:400}}>
            <div style={{fontSize:'1.3rem',fontWeight:700,marginBottom:12}}>📤 Submit Test?</div>
            <div style={{marginBottom:16,lineHeight:1.8}}>
              <div>✅ Answered: <strong>{answeredCount}</strong> / {total}</div>
              {answeredCount < total && (
                <div style={{color:'var(--yellow)',fontSize:'0.9rem',marginTop:6}}>
                  ⚠️ {total-answeredCount} question{total-answeredCount!==1?'s':''} left unanswered.
                </div>
              )}
              <div className="text-muted text-sm" style={{marginTop:8}}>
                You cannot change answers after submitting.
              </div>
            </div>
            <div className="flex gap-10">
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowConfirm(false)}>
                ← Go Back
              </button>
              <button className="btn btn-success" style={{flex:1}} onClick={()=>{setShowConfirm(false);onSubmit();}}>
                ✅ Submit Now
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── per-task countdown timer shown on student's task card ────────
function TaskTimer({ limitSecs, onExpire }) {
  const [left, setLeft] = useState(limitSecs);
  useEffect(() => {
    if (left <= 0) { onExpire && onExpire(); return; }
    const id = setInterval(() => setLeft(t => { if(t<=1){clearInterval(id);onExpire&&onExpire();return 0;} return t-1; }), 1000);
    return () => clearInterval(id);
  }, []);
  const pct = Math.round(left / limitSecs * 100);
  const color = left <= 10 ? 'var(--red)' : left <= 30 ? 'var(--yellow)' : 'var(--green)';
  const mm = String(Math.floor(left/60)).padStart(2,'0');
  const ss = String(left%60).padStart(2,'0');
  return (
    <div style={{display:'flex',alignItems:'center',gap:8}}>
      <div style={{width:36,height:36,position:'relative',flexShrink:0}}>
        <svg width="36" height="36" style={{transform:'rotate(-90deg)'}}>
          <circle cx="18" cy="18" r="15" fill="none" stroke="var(--surface3)" strokeWidth="3"/>
          <circle cx="18" cy="18" r="15" fill="none" stroke={color} strokeWidth="3"
            strokeDasharray={`${2*Math.PI*15}`}
            strokeDashoffset={`${2*Math.PI*15*(1-pct/100)}`}
            style={{transition:'stroke-dashoffset 1s linear,stroke 0.5s'}}/>
        </svg>
      </div>
      <span style={{fontFamily:'monospace',fontWeight:700,fontSize:'1rem',color}}>{mm}:{ss}</span>
    </div>
  );
}
