// ═════════════════════════════════════════════════════════════════
//  STUDENT CODE EDITOR  (Coding Question Fix — BLOCKER)
// ═════════════════════════════════════════════════════════════════
function StudentCodeEditor({ task, sessionCode, studentId, submitted, setSubmitted, result, setResult,
  setAnsweredCount, setCorrectCount, setCodingSubmitted, setCodingScore, add }) {
  const [code, setCode] = useState(() => {
    // Restore saved draft from localStorage
    try { return localStorage.getItem(`cm_code_${sessionCode}_${task.id}`) || ''; } catch { return ''; }
  });
  const [submitting, setSubmitting] = useState(false);
  const [feedback, setFeedback] = useState(null); // {hint, expectedOutput}
  const [running, setRunning] = useState(false);
  const [runOutput, setRunOutput] = useState(null); // {output, error, timed_out}

  // Save draft on every keystroke
  useEffect(() => {
    try { localStorage.setItem(`cm_code_${sessionCode}_${task.id}`, code); } catch {}
  }, [code]);

  // Generate rule-based coding feedback
  function generateFeedback(userCode, task) {
    const q = (task.question || '').toLowerCase();
    const hints = [];
    if (!userCode.includes('def ') && !userCode.includes('function') && !userCode.includes('='))
      hints.push('💡 Start by defining a variable or function to solve the problem.');
    if (q.includes('loop') || q.includes('repeat') || q.includes('each'))
      if (!userCode.includes('for ') && !userCode.includes('while '))
        hints.push('💡 This problem likely needs a loop (for/while) to iterate.');
    if (q.includes('list') || q.includes('array'))
      if (!userCode.includes('[') && !userCode.includes('append'))
        hints.push('💡 Try using a list — e.g. my_list = [] and .append()');
    if (q.includes('return') || q.includes('output') || q.includes('print'))
      if (!userCode.includes('print') && !userCode.includes('return'))
        hints.push('💡 Don\'t forget to print() or return your result!');
    if (hints.length === 0)
      hints.push('💡 Check edge cases — what happens with empty input or extreme values?');
    return hints.join('\n');
  }

  async function runCode() {
    if (!code.trim()) { add('Write some code first!', 'error'); return; }
    setRunning(true);
    setRunOutput(null);
    try {
      const r = await apiFetch('/api/code/run', {
        method: 'POST',
        body: { session_code: sessionCode, student_id: studentId, code, language: 'python' },
      });
      setRunOutput(r);
    } catch(e) {
      setRunOutput({ error: e.message, output: '', timed_out: false });
    }
    setRunning(false);
  }

  async function submitCode() {
    if (!code.trim()) { add('Please write some code first!', 'error'); return; }
    setSubmitting(true);
    try {
      const r = await apiFetch(`/api/responses/submit`, {
        method: 'POST',
        body: {
          session_code: sessionCode,
          student_id: studentId,
          task_id: task.id,
          answer: code,
        },
      });
      setResult(r);
      setSubmitted(true);
      setAnsweredCount(c => c + 1);
      if (r.correct) setCorrectCount(c => c + 1);
      const score = r.score ?? (r.correct ? 100 : 0);
      setCodingScore(score);
      setCodingSubmitted(true);
      // Generate feedback hints for incorrect submissions
      if (!r.correct) {
        setFeedback(generateFeedback(code, task));
      }
      // Persist submission state
      try {
        localStorage.setItem(`cm_submitted_${sessionCode}_${task.id}`, JSON.stringify({ code, result: r }));
      } catch {}
      add(r.correct ? '✅ Code submitted — Correct!' : '❌ Code submitted — Check the feedback below', r.correct ? 'success' : 'error');
    } catch (e) {
      add('Submit failed: ' + e.message, 'error');
    }
    setSubmitting(false);
  }

  return (
    <div>
      {/* Problem description */}
      {task.hint && (
        <div style={{background:'rgba(234,179,8,0.1)',border:'1px solid var(--yellow)',
          borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:'0.875rem'}}>
          💡 <strong>Hint:</strong> {task.hint}
        </div>
      )}

      {/* Code editor */}
      <div className="code-editor" style={{marginBottom:10}}>
        <div style={{fontSize:'0.72rem',color:'var(--text3)',marginBottom:6,display:'flex',
          alignItems:'center',justifyContent:'space-between'}}>
          <span>💻 Write your code here</span>
          {!submitted && <span style={{color:'var(--accent)'}}>Auto-saved</span>}
        </div>
        <textarea
          value={code}
          onChange={e => setCode(e.target.value)}
          placeholder={'# Write your solution here\n# Use Python syntax\n\n'}
          disabled={submitted}
          style={{
            background:'transparent',border:'none',color:'#c9d1d9',
            fontFamily:"'Fira Code',monospace",fontSize:'0.9rem',
            width:'100%',minHeight:220,resize:'vertical',outline:'none',
            opacity: submitted ? 0.7 : 1,
          }}
          spellCheck={false}
          autoCorrect="off"
          autoCapitalize="off"
        />
      </div>

      {/* Run Code + Submit buttons */}
      {!submitted && (
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <button className="btn btn-ghost" style={{flex:1}}
            onClick={runCode} disabled={running || submitting || !code.trim()}>
            {running ? '⏳ Running…' : '▶ Run Code'}
          </button>
          <button className="btn btn-primary" style={{flex:1}}
            onClick={submitCode} disabled={submitting || running || !code.trim()}>
            {submitting ? '⏳ Submitting…' : '🚀 Submit Code'}
          </button>
        </div>
      )}

      {/* Run output panel */}
      {runOutput && (
        <div style={{marginBottom:10}}>
          <div style={{fontSize:'0.72rem',color:'var(--text3)',marginBottom:4,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em'}}>
            ▶ Output
          </div>
          <div className={`code-output${runOutput.error ? ' error' : ''}`}>
            {runOutput.timed_out
              ? '⏰ Execution timed out'
              : runOutput.error
                ? runOutput.error
                : runOutput.output || '(no output)'}
          </div>
        </div>
      )}

      {/* Result feedback */}
      {submitted && result && (
        <div style={{marginTop:12,borderRadius:10,padding:'14px 16px',
          background: result.correct ? 'rgba(34,197,94,0.12)' : 'rgba(239,68,68,0.12)',
          border: `1px solid ${result.correct ? 'var(--green)' : 'var(--red)'}` }}>
          <div style={{fontWeight:700,fontSize:'1rem',
            color: result.correct ? 'var(--green)' : 'var(--red)'}}>
            {result.correct ? '✅ Correct! +' + (result.score || 0) + ' pts' : '❌ Needs improvement'}
          </div>

          {/* Coding feedback hints when wrong */}
          {!result.correct && feedback && (
            <div style={{marginTop:10,fontSize:'0.875rem',lineHeight:1.6}}>
              <div style={{fontWeight:700,color:'var(--yellow)',marginBottom:4}}>📋 Feedback:</div>
              {feedback.split('\n').map((line, i) => (
                <div key={i} style={{marginBottom:4}}>{line}</div>
              ))}
            </div>
          )}

          {/* Expected output from task if available */}
          {(result.expected_output || task.expected_output) && (
            <div style={{marginTop:10,padding:'8px 12px',borderRadius:8,
              background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.4)',
              fontSize:'0.875rem'}}>
              <div style={{fontSize:'0.75rem',fontWeight:700,color:'var(--green)',marginBottom:4}}>EXPECTED OUTPUT</div>
              <code style={{fontFamily:'monospace'}}>{result.expected_output || task.expected_output}</code>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  STUDENT LEADERBOARD (Feature 3 — toggleable)
// ═════════════════════════════════════════════════════════════════
function StudentLeaderboard({ sessionCode, studentId, codingLeaderboard, studentName }) {
  const [board, setBoard] = useState([]);
  const [expanded, setExpanded] = useState(false);
  const [tab, setTab] = useState('mcq'); // 'mcq' | 'coding'
  const prevRankRef = useRef({});

  useEffect(() => {
    let alive = true;
    async function fetchBoard() {
      try {
        const data = await apiFetch(`/api/session/${sessionCode}/leaderboard`);
        if (alive) setBoard(data);
      } catch {}
    }
    fetchBoard();
    const id = setInterval(fetchBoard, 8000);
    return () => { alive = false; clearInterval(id); };
  }, [sessionCode]);

  const activeBoard = tab === 'coding' ? (codingLeaderboard||[]) : board;
  if (!activeBoard.length) return null;

  const display = expanded ? activeBoard : activeBoard.slice(0, 3);
  const rankEmoji = ['🥇','🥈','🥉'];

  return (
    <div className="card fade-up" style={{marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <div className="card-title" style={{margin:0}}>🏆 Leaderboard</div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <button className={`lb-toggle-btn ${tab==='mcq'?'':''}` } style={{background:tab==='mcq'?'var(--accent)':'',color:tab==='mcq'?'#fff':''}}
            onClick={()=>setTab('mcq')}>MCQ</button>
          <button className="lb-toggle-btn" style={{background:tab==='coding'?'var(--accent)':'',color:tab==='coding'?'#fff':''}}
            onClick={()=>setTab('coding')}>💻 Code</button>
          <button className="lb-toggle-btn" onClick={()=>setExpanded(e=>!e)}>
            {expanded ? '▲ Top 3' : `▼ All ${activeBoard.length}`}
          </button>
        </div>
      </div>
      {display.map((s, i) => {
        // support both leaderboard shapes
        const name      = s.student_name || s.name || '';
        const sid       = s.student_id   || s.name;
        const score     = s.score ?? 0;
        const rank      = i + 1;
        const isMe      = sid === studentId || name === studentName;
        const prevRank  = prevRankRef.current[sid];
        const rankUp    = prevRank && rank < prevRank;
        // update ref
        prevRankRef.current[sid] = rank;

        return (
          <div key={sid||i} className={`leaderboard-row ${isMe?'lb-row-me':''}`}
            style={{transition:'all 0.2s'}}>
            <div className={`rank-badge rank-${rank<=3?rank:'n'}`}>
              {rank <= 3 ? rankEmoji[rank-1] : rank}
            </div>
            <div style={{flex:1,fontWeight:isMe?700:500,fontSize:'0.875rem'}}>
              {name} {isMe&&<span style={{color:'var(--accent)',fontSize:'0.72rem'}}>(you)</span>}
              {/* Feature 8: rank intelligence */}
              {rankUp && <span style={{marginLeft:6,fontSize:'0.72rem',color:'var(--orange)'}}>🔥 Moved up!</span>}
              {rank <= 3 && <span style={{marginLeft:6,fontSize:'0.72rem',color:'var(--yellow)'}}>🏆 Top 3!</span>}
            </div>
            <div style={{fontWeight:700,color:'var(--accent)',fontFamily:'monospace'}}>{score}</div>
          </div>
        );
      })}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  STUDENT COPILOT — HYBRID AI TUTOR  (Local → Deep → Web)
//  Level 1: LOCAL  — instant hints, always available
//  Level 2: DEEP   — full explanations, context-aware
//  Level 3: WEB    — locked until submission, deep-dive analysis
// ═════════════════════════════════════════════════════════════════
function StudentCopilotLight({ currentTask, submitted, result,
  answeredCount, correctCount, selected, shortAnswer, timeSpent }) {

  const [open, setOpen]               = useState(false);
  const [messages, setMessages]       = useState([]);
  const [input, setInput]             = useState('');
  const [isTyping, setIsTyping]       = useState(false);
  const [copilotMode, setCopilotMode] = useState('local'); // 'local'|'deep'|'web'
  const [webUsageCount, setWebUsageCount] = useState(0);
  const [autoOpened, setAutoOpened]   = useState(false);
  const [wrongStreak, setWrongStreak] = useState(0);
  const idleRef    = useRef(null);
  const bottomRef  = useRef(null);
  const inputRef   = useRef(null);
  const prevTaskId = useRef(null);

  // ── Track wrong streak for auto-help ─────────────────────────────
  useEffect(() => {
    if (!submitted || !result) return;
    if (!result.correct) setWrongStreak(s => s + 1);
    else setWrongStreak(0);
  }, [submitted, result]);

  // ── Auto-open after 30s idle on unanswered question ──────────────
  useEffect(() => {
    clearTimeout(idleRef.current);
    if (!currentTask || submitted) return;
    idleRef.current = setTimeout(() => {
      if (!open && !autoOpened) {
        setOpen(true);
        setAutoOpened(true);
        pushBot("⏱ You've been thinking a while — need a nudge? Try **💡 Hint** or **🧠 Explain** above!");
      }
    }, 30000);
    return () => clearTimeout(idleRef.current);
  }, [currentTask?.id, submitted, open]);

  // ── Auto-open after 2+ consecutive wrong answers ──────────────────
  useEffect(() => {
    if (wrongStreak >= 2 && submitted && result && !result.correct && !open) {
      setTimeout(() => {
        setOpen(true);
        pushBot("📉 You've got a few wrong in a row — let me help! Click **❌ Why wrong?** or just ask me anything.");
      }, 700);
    }
  }, [wrongStreak]);

  // ── Reset conversation when new task arrives ──────────────────────
  useEffect(() => {
    const tid = currentTask?.id;
    if (prevTaskId.current && tid !== prevTaskId.current) {
      setMessages([]);
      setAutoOpened(false);
      setCopilotMode('local');
      setInput('');
    }
    prevTaskId.current = tid;
  }, [currentTask?.id]);

  // ── Auto-scroll on new messages ───────────────────────────────────
  useEffect(() => {
    setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: 'smooth' }), 60);
  }, [messages, isTyping]);

  function fmtTs() {
    return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }

  // Adds a bot message with optional typing delay
  function pushBot(text, suggestions = []) {
    setIsTyping(true);
    const delay = Math.min(500 + text.length * 5, 1600);
    setTimeout(() => {
      setIsTyping(false);
      setMessages(m => [...m, { role:'bot', text, ts: fmtTs(), suggestions }]);
    }, delay);
  }

  function pushUser(text) {
    setMessages(m => [...m, { role:'user', text, ts: fmtTs() }]);
  }

  // ── ANSWER PROTECTION — safe reveal only after submission ─────────
  function safeCorrect() {
    if (!submitted) return null;
    return result?.correct_answer || currentTask?.correct_answer || null;
  }

  // ─────────────────────────────────────────────────────────────────
  //  LOCAL AI RESPONSES  (Level 1 — always available)
  // ─────────────────────────────────────────────────────────────────
  function buildHint() {
    if (!currentTask) return '⏳ No active question yet.';
    if (currentTask.hint) return `💡 **Teacher's Hint:**\n\n${currentTask.hint}`;
    if (currentTask.type === 'coding') {
      return `💡 **Coding Hint:**\n\nBreak the problem into steps:\n1. Understand input/output format\n2. Plan your logic first\n3. Write the simplest working version\n4. Handle edge cases last`;
    }
    const q = (currentTask.question || '').toLowerCase();
    if (q.includes('which') || q.includes('select'))
      return '💡 **Elimination Strategy:**\n\nCross out options you\'re sure are wrong — you\'ll narrow it to 2 choices fast. Then look for the one that\'s *more complete*.';
    if (q.includes('why') || q.includes('explain'))
      return '💡 **Cause & Effect:**\n\nAsk yourself: *"What causes this result?"* Work backward from the outcome to the root reason.';
    if (q.includes('how'))
      return '💡 **Step-by-Step:**\n\nBreak the process into numbered steps. What happens first? Then next? What is the final result?';
    if (q.includes('define') || q.includes('what is'))
      return '💡 **Definition Tip:**\n\nA strong definition covers: *what it is*, *what it does*, and *how it differs* from similar things.';
    if (q.includes('when') || q.includes('year') || q.includes('date'))
      return '💡 **Timeline Tip:**\n\nThink in sequence — does a specific era, event, or order come to mind? Anchor it to something you already know.';
    return '💡 Re-read the question slowly. **Underline the key word.** What single concept is it really testing?';
  }

  // ─────────────────────────────────────────────────────────────────
  //  DEEP AI RESPONSES  (Level 2 — always available)
  // ─────────────────────────────────────────────────────────────────
  function buildExplain() {
    if (!currentTask) return '⏳ No active question yet.';
    const q = currentTask.question || '';
    const topic = currentTask.topic || 'this topic';
    const diff  = {easy:'🟢 Easy', medium:'🟡 Medium', hard:'🔴 Hard'}[currentTask.difficulty] || '🟡 Medium';
    let text = `🧠 **Breaking down the question:**\n\n_"${q}"_\n\n📚 **Topic:** ${topic}  |  ${diff}\n\n`;
    if (currentTask.type === 'mcq' && currentTask.options?.length) {
      text += `**Your options:**\n`;
      currentTask.options.forEach((opt, i) => {
        const letter = String.fromCharCode(65 + i);
        text += `${selected === letter ? '→ ' : ''}**${letter}.** ${opt}\n`;
      });
      text += `\n🎯 Focus on what the question is *really* testing about **${topic}**. The answer tests a specific fact or principle — not a trick.`;
    } else if (currentTask.type === 'coding') {
      text += `**What to code:**\nRead carefully. Identify:\n• Input format & type\n• Expected output format\n• Constraints or edge cases\n\nStart with the simplest case, then generalise.`;
    } else {
      text += `**What to write:**\nA strong answer directly states the *key concept*, then supports it with one or two specific points. Avoid vague language.`;
    }
    return text;
  }

  function buildWrong() {
    if (!currentTask) return '';
    if (!submitted) return '🔒 **Submit your answer first** — then I\'ll show you the full breakdown with the correct answer and explanation!';
    const correct = safeCorrect();
    let text = '';
    if (currentTask.type === 'mcq' && result) {
      const yours   = result.student_answer || selected || '?';
      const cLetter = correct || '?';
      const cOpt    = correct && currentTask.options ? (currentTask.options[correct.charCodeAt(0)-65] || '') : '';
      const yOpt    = yours !== '?' && currentTask.options ? (currentTask.options[yours.charCodeAt(0)-65] || '') : '';
      text = `❌ **You chose:** ${yours}${yOpt ? ` — _${yOpt}_` : ''}\n✅ **Correct:** ${cLetter}${cOpt ? ` — _${cOpt}_` : ''}\n\n`;
      text += `**Why?** ${currentTask.topic ? `In **${currentTask.topic}**, ` : ''}the correct option is the one that most precisely matches the definition or principle being tested. Review your notes on this area.`;
    } else if (currentTask.type === 'short' || currentTask.type === 'long') {
      text = `❌ **Your answer wasn't quite right.**\n\n`;
      if (correct) text += `✅ **Model answer:** _${correct}_\n\n`;
      text += `**Tip:** Compare your answer with the model answer. Which key idea was missing or incorrectly stated?`;
    } else if (currentTask.type === 'coding') {
      text = `❌ **Didn't pass all test cases.**\n\n**Debug checklist:**\n• Trace through manually with the sample input\n• Check loop bounds (off-by-one errors are common)\n• Verify your return value\n• Test with edge cases (empty, single, large)`;
    }
    if (currentTask.hint) text += `\n\n💡 **Hint:** ${currentTask.hint}`;
    return text;
  }

  function buildSimilar() {
    const topic = currentTask?.topic || 'this concept';
    const type  = currentTask?.type  || 'mcq';
    if (type === 'coding')
      return `🔁 **Practice variation:**\n\nModify the problem: what if the input was 10× larger? What if you had to handle negative numbers or empty inputs?\n\nThese variations build true mastery faster than re-reading.`;
    if (type === 'mcq')
      return `🔁 **Self-quiz:**\n\nWithout looking at the options, try to recall the answer to: *"What is the core principle of **${topic}**?"*\n\nIf you can answer without options, you truly know it.`;
    return `🔁 **Teach-back technique:**\n\nExplain **${topic}** out loud (or in writing) as if teaching a classmate who knows nothing. Gaps in your explanation = gaps in your knowledge.`;
  }

  // ─────────────────────────────────────────────────────────────────
  //  WEB MODE  (Level 3 — locked until submission)
  // ─────────────────────────────────────────────────────────────────
  function buildDeepDive() {
    if (!submitted) return '🔒 **Deep Dive is locked until you submit.**\n\nAnswer the question first — then I\'ll unlock the full analysis: correct answer, detailed reasoning, and study strategy.';
    if (webUsageCount >= 5) return `⚠️ **You've used Deep Dive ${webUsageCount} times.**\n\nThat\'s a lot of help! Challenge yourself: try the *next* question completely solo. Real mastery comes from the struggle.`;
    setWebUsageCount(c => c + 1);
    const topic   = currentTask?.topic || 'this topic';
    const correct = safeCorrect();
    let text = `🌐 **Deep Dive — ${topic}**\n\n`;
    if (correct) text += `✅ **Answer: ${correct}**\n\n`;
    text += `**Why this matters:**\n**${topic}** is a foundational concept that connects to:\n• Real-world applications in this field\n• Related sub-topics you'll encounter next\n• Common exam traps and how to avoid them\n\n`;
    text += `**Study strategy:** Create a 5-word summary of this concept. Write it down — retrieval practice boosts long-term retention by up to 50% compared to re-reading.`;
    if (webUsageCount >= 3) text += `\n\n_Deep Dive used ${webUsageCount+1}× — next question: try solo first!_`;
    return text;
  }

  // ─────────────────────────────────────────────────────────────────
  //  CODING DEBUG  (Level 1 — analyses pasted code)
  // ─────────────────────────────────────────────────────────────────
  function buildCodeDebug(code) {
    if (!code?.trim()) return '💻 **Coding Debug Mode:**\n\nPaste your code in the chat and I\'ll check it for common issues!';
    let issues = [];
    // Syntax checks
    if (/print [^(]/.test(code) && !code.includes('print(')) issues.push('⚠️ Python 3 uses `print()` with parentheses.');
    if (code.split('\n').some(l => /^\s*(for|while|if|elif|else|def|class)\s/.test(l) && !l.trim().endsWith(':')))
      issues.push('⚠️ A block statement is missing its colon `:` at the end.');
    if (!code.includes('return') && /def\s+\w+/.test(code))
      issues.push('⚠️ Your function may be missing a `return` statement.');
    const lines = code.split('\n').filter(l => l.trim());
    if (lines.length > 2 && lines.slice(1).every(l => !l.match(/^\s+/)))
      issues.push('⚠️ No indentation detected — Python requires indentation inside blocks.');
    if (/==[^=]/.test(code) && code.includes('=') && !code.includes('=='))
      issues.push('⚠️ Using `=` for comparison? Use `==` to compare values.');

    let text = `💻 **Code Review:**\n\n`;
    if (issues.length === 0) {
      text += `✓ No obvious syntax issues found!\n\n**Logic check:** Trace through manually with the sample input. Write down each variable\'s value at each step.`;
    } else {
      text += issues.join('\n') + '\n\nFix these and try running again!';
    }
    return text;
  }

  // ─────────────────────────────────────────────────────────────────
  //  CHAT HANDLER
  // ─────────────────────────────────────────────────────────────────
  function handleSend() {
    const msg = input.trim();
    if (!msg || isTyping) return;
    pushUser(msg);
    setInput('');

    setTimeout(() => {
      const lower = msg.toLowerCase();
      let reply = '', sugs = [];

      // Coding: detect pasted code
      const looksLikeCode = currentTask?.type === 'coding' &&
        (msg.includes('\n') || /def |for |while |print\(|import /.test(msg));

      if (looksLikeCode) {
        reply = buildCodeDebug(msg);
        sugs  = ['Check indentation', 'Edge cases?', 'What about return?'];
      } else if (/\bhint\b|\bclue\b|\bnudge\b/.test(lower)) {
        reply = buildHint();
        sugs  = ['Explain more', 'Give example', 'Show steps'];
      } else if (/explain|what does|what is|why|how/.test(lower)) {
        reply = buildExplain();
        sugs  = ['Simpler please', 'Give a hint', 'Similar question'];
      } else if (/wrong|correct answer|right answer|what.*answer/.test(lower)) {
        reply = buildWrong();
        sugs  = ['How to remember?', 'Similar question'];
      } else if (/similar|practice|example|another/.test(lower)) {
        reply = buildSimilar();
        sugs  = ['Go deeper', 'One more', 'My performance'];
      } else if (/deep|dive|detail|full.*(answer|explain)/.test(lower)) {
        reply = buildDeepDive();
        sugs  = ['How to study this?', 'Related topics'];
      } else if (/accuracy|score|performance|how am i|progress/.test(lower)) {
        const acc = answeredCount > 0 ? Math.round((correctCount/answeredCount)*100) : null;
        if (acc === null) reply = '📊 Answer a few questions and I\'ll track your accuracy!';
        else {
          const e = acc>=80?'🟢':acc>=60?'🟡':acc>=40?'🟠':'🔴';
          reply = `${e} **Accuracy: ${acc}%** (${correctCount}/${answeredCount} correct)\n\n${
            acc>=80 ? 'Excellent! You\'re mastering this material. Keep going!' :
            acc>=60 ? 'Good progress! Review what you\'re getting wrong.' :
            acc>=40 ? 'Focus on *why* wrong answers are wrong — not just memorising.' :
            'Take your time. Re-read each question fully before answering.'
          }`;
          sugs = ['What am I doing wrong?', 'Study tips'];
        }
      } else if (/^(hi|hello|hey|sup)[\s!.]*$/.test(lower)) {
        reply = `👋 Hey! I'm your AI study tutor. I can:\n• 💡 Give hints\n• 🧠 Explain questions in depth\n• ❌ Break down wrong answers\n• 🔁 Suggest practice\n• 🌐 Deep Dive (after you submit)\n\nWhat do you need?`;
      } else if (/debug|error|fix|syntax/.test(lower) && currentTask?.type === 'coding') {
        reply = buildCodeDebug(shortAnswer || '');
        sugs  = ['Paste your code', 'Logic help', 'What to check'];
      } else {
        reply = `Got it! For this ${currentTask ? `**${(currentTask.type||'').toUpperCase()}** question` : 'question'}, I can explain what's being asked, give a hint, or break down the concept. What would help most?`;
        sugs  = ['Give me a hint', 'Explain the question', 'Simplify it'];
      }

      pushBot(reply, sugs);
    }, 350 + Math.random() * 200);
  }

  // ─────────────────────────────────────────────────────────────────
  //  QUICK ACTION BUTTONS
  // ─────────────────────────────────────────────────────────────────
  function quickAction(id) {
    const labels = {
      hint:'💡 Hint', explain:'🧠 Explain',
      wrong:'❌ Why wrong?', similar:'🔁 Similar Q', deep:'🌐 Deep Dive'
    };
    pushUser(labels[id]);
    setTimeout(() => {
      let reply = '', sugs = [];
      if      (id==='hint')    { reply=buildHint();     sugs=['Explain more','Give example','Show steps']; }
      else if (id==='explain') { reply=buildExplain();  sugs=['Simpler please','Give hint','Practice Q']; }
      else if (id==='wrong')   { reply=buildWrong();    sugs=['How to remember?','Similar question']; }
      else if (id==='similar') { reply=buildSimilar();  sugs=['Go deeper','Another one']; }
      else if (id==='deep')    { reply=buildDeepDive(); sugs=['How to study this?','Related topics']; }
      pushBot(reply, sugs);
    }, 380);
  }

  // ─────────────────────────────────────────────────────────────────
  //  SUGGESTION CHIPS
  // ─────────────────────────────────────────────────────────────────
  function clickSuggestion(s) {
    pushUser(s);
    setTimeout(() => {
      const lower = s.toLowerCase();
      let reply = '';
      if (/simpler|plain/.test(lower))          reply = buildHint();
      else if (/example/.test(lower))           reply = `📌 **Example approach:**\n\nImagine applying this concept to a concrete, real-world scenario. Connect the abstract idea to something familiar — that's the fastest path to understanding.`;
      else if (/steps|step-by/.test(lower))     reply = `📋 **Step-by-step guide:**\n\n1. Read the question twice\n2. Identify the key concept or topic\n3. Eliminate clearly wrong options\n4. Choose your best answer\n5. Check: does it make logical sense?`;
      else if (/remember|memorise/.test(lower)) reply = `🧠 **Memory technique:**\n\nCreate a short acronym or visual story. Repeat the correct answer 3 times and use it in a sentence. Revisit it tomorrow for spaced repetition.`;
      else if (/similar|practice|another/.test(lower)) reply = buildSimilar();
      else if (/deeper|detail/.test(lower))     reply = buildDeepDive();
      else if (/study|tips/.test(lower))        reply = `📚 **Tonight's study plan:**\n\n• Review all wrong answers from this session\n• Make a flashcard for each missed concept\n• Explain each one to yourself out loud\n• Quiz yourself again tomorrow`;
      else if (/performance|improve|accuracy/.test(lower)) {
        const acc = answeredCount > 0 ? Math.round((correctCount/answeredCount)*100) : null;
        reply = acc !== null
          ? `📊 **Accuracy: ${acc}%** — ${acc>=70?'Great work! 🟢':'Room to grow. 🟡'}\n\nFocus on reviewing wrong answers to improve fastest.`
          : '📊 Answer more questions and I\'ll track your stats!';
      } else if (/wrong|doing wrong/.test(lower)) reply = buildWrong();
      else if (/related|topic/.test(lower))     reply = `🔗 **Related concepts:**\n\nThis question connects to **${currentTask?.topic||'core concepts'}**. Understanding this well will help you with adjacent topics in the same unit. Ask your teacher for the next concept to study!`;
      else reply = buildHint();
      pushBot(reply);
    }, 350);
  }

  // ─────────────────────────────────────────────────────────────────
  //  RENDER
  // ─────────────────────────────────────────────────────────────────
  const hasTask = !!currentTask;
  const acc = answeredCount > 0 ? Math.round((correctCount/answeredCount)*100) : null;

  return (
    <>
      {/* FAB */}
     <button 
  className="student-copilot-fab"
  onClick={() => { 
    setOpen(o => !o); 
    if (!open) setTimeout(() => inputRef.current?.focus(), 220); 
  }}
  title="AI Study Tutor"
>
  {open ? '✕' : '🤖'}

  {wrongStreak >= 2 && !open && (
    <span className="copilot-badge">!</span>
  )}
</button>

      {open && (
        <div className="student-copilot-panel" style={{
          height:520,display:'flex',flexDirection:'column',
        }}>
          {/* ── Header ── */}
          <div className="student-copilot-header" style={{flexShrink:0}}>
            <span style={{fontSize:'1.2rem'}}>🤖</span>
            <div style={{flex:1,minWidth:0}}>
              <div className="student-copilot-title">AI Study Tutor</div>
              <div className="student-copilot-sub">
                {hasTask
                  ? `${currentTask.topic || currentTask.type?.toUpperCase() || 'Task'}${acc!==null?` • ${acc}% accuracy`:''}`
                  : 'No active task'}
              </div>
            </div>
            {/* Mode selector */}
            <div style={{display:'flex',gap:3,marginRight:4}}>
              {[
                {id:'local', icon:'💡', title:'Local AI — hints'},
                {id:'deep',  icon:'🧠', title:'Deep AI — explanations'},
                {id:'web',   icon:'🌐', title: submitted?'Web Mode — deep analysis':'Web Mode — locked until submit'},
              ].map(m => (
                <button key={m.id} title={m.title}
                  onClick={() => {
                    if (m.id === 'web' && !submitted) {
                      pushBot('🔒 **Web Mode** unlocks after you submit. Answer first!');
                      return;
                    }
                    setCopilotMode(m.id);
                  }}
                  style={{
                    padding:'2px 7px',borderRadius:6,border:'none',cursor:'pointer',
                    fontSize:'0.72rem',fontWeight: copilotMode===m.id ? 700 : 400,
                    background: copilotMode===m.id ? 'rgba(255,255,255,0.28)' : 'rgba(255,255,255,0.06)',
                    color:'#fff',opacity: m.id==='web'&&!submitted ? 0.4 : 1,
                    transition:'all 0.15s',
                  }}>
                  {m.icon}
                </button>
              ))}
            </div>
            <button className="student-copilot-close" onClick={() => setOpen(false)}>✕</button>
          </div>

          {/* ── Quick actions strip ── */}
          <div style={{
            display:'flex',gap:5,padding:'7px 10px',overflowX:'auto',
            scrollbarWidth:'none',background:'var(--surface2)',
            borderBottom:'1px solid var(--border)',flexShrink:0,
          }}>
            {[
              {id:'hint',    label:'💡 Hint',        locked:false},
              {id:'explain', label:'🧠 Explain',     locked:false},
              {id:'wrong',   label:'❌ Why wrong?',  locked:!submitted},
              {id:'similar', label:'🔁 Similar Q',   locked:false},
              {id:'deep',    label:'🌐 Deep Dive',   locked:!submitted},
            ].map(a => (
              <button key={a.id}
                className="sc-quick-btn"
                disabled={a.locked}
                onClick={() => quickAction(a.id)}
                title={a.locked ? 'Submit your answer to unlock' : ''}>
                {a.label}{a.locked ? ' 🔒' : ''}
              </button>
            ))}
          </div>

          {/* ── Web usage warning ── */}
          {webUsageCount >= 3 && (
            <div style={{
              padding:'5px 12px',fontSize:'0.71rem',color:'var(--yellow)',flexShrink:0,
              background:'rgba(234,179,8,0.1)',borderBottom:'1px solid rgba(234,179,8,0.25)',
            }}>
              ⚠️ Deep Dive used {webUsageCount}× — try the next one solo for real mastery!
            </div>
          )}

          {/* ── Messages ── */}
          <div style={{flex:1,overflowY:'auto',padding:'12px',
            display:'flex',flexDirection:'column',gap:10}}>

            {/* Empty state */}
            {messages.length===0 && !isTyping && (
              <div style={{textAlign:'center',color:'var(--text3)',
                fontSize:'0.82rem',paddingTop:24}}>
                <div style={{fontSize:'2.2rem',marginBottom:8}}>🤖</div>
                <div style={{fontWeight:600,marginBottom:4,color:'var(--text)'}}>
                  {hasTask ? 'Ready to help!' : 'Waiting for a question…'}
                </div>
                <div>{hasTask
                  ? 'Hit a quick button above or just ask me anything!'
                  : 'I\'ll guide you the moment your teacher sends a task.'}</div>
                {timeSpent > 30 && hasTask && !submitted && (
                  <div style={{marginTop:12,padding:'8px 12px',borderRadius:8,
                    background:'rgba(99,102,241,0.1)',border:'1px solid rgba(99,102,241,0.2)',
                    fontSize:'0.78rem',color:'var(--accent)'}}>
                    ⏱ {Math.floor(timeSpent/60)}m {timeSpent%60}s on this question — need a hint?
                  </div>
                )}
              </div>
            )}

            {/* Message bubbles */}
            {messages.map((m, i) => (
              <div key={i} style={{display:'flex',flexDirection:'column',
                alignItems:m.role==='user'?'flex-end':'flex-start'}}>
                <div className={m.role==='user' ? 'sc-msg-user' : 'sc-msg-bot'}
                  dangerouslySetInnerHTML={{__html:
                    m.text
                      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
                      .replace(/_(.+?)_/g,'<em>$1</em>')
                      .replace(/\n/g,'<br/>')
                  }}/>
                <span style={{fontSize:'0.6rem',color:'var(--text3)',marginTop:2,
                  paddingLeft:4,paddingRight:4}}>{m.ts}</span>
                {/* Follow-up suggestion chips — only on latest bot message */}
                {m.role==='bot' && m.suggestions?.length>0 && i===messages.length-1 && (
                  <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:5}}>
                    {m.suggestions.map((s,si) => (
                      <button key={si} className="sc-suggestion" onClick={()=>clickSuggestion(s)}>
                        {s}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            ))}

            {/* Typing indicator */}
            {isTyping && (
              <div style={{display:'flex',alignItems:'center'}}>
                <div style={{
                  padding:'8px 14px',borderRadius:'12px 12px 12px 4px',
                  background:'var(--surface2)',border:'1px solid var(--border)',
                  display:'flex',gap:4,alignItems:'center',
                }}>
                  {[0,1,2].map(i=>(
                    <div key={i} style={{
                      width:6,height:6,borderRadius:'50%',background:'var(--text3)',
                      animation:`copilot-dot-bounce 1.2s ease-in-out ${i*0.16}s infinite`,
                    }}/>
                  ))}
                </div>
              </div>
            )}

            <div ref={bottomRef}/>
          </div>

          {/* ── Input row ── */}
          <div style={{display:'flex',gap:6,padding:'10px',
            borderTop:'1px solid var(--border)',background:'var(--surface)',flexShrink:0}}>
            <input ref={inputRef}
              className="sc-input"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key==='Enter' && !e.shiftKey && handleSend()}
              placeholder={
                !hasTask ? 'Waiting for a task…' :
                currentTask?.type==='coding' ? 'Ask or paste code…' :
                'Ask anything…'
              }
              disabled={!hasTask || isTyping}
            />
            <button className="sc-send"
              onClick={handleSend}
              disabled={!input.trim() || isTyping || !hasTask}>
              ➤
            </button>
          </div>
        </div>
      )}
    </>
  );
}

// ═════════════════════════════════════════════════════════════════
//  WAITING ROOM TIPS  (Feature 6 — tip rotator)
// ═════════════════════════════════════════════════════════════════
const WAITING_TIPS = [
  { icon: '📝', text: "Get ready! When a task arrives, read the question carefully before selecting your answer." },
  { icon: '💬', text: "Have a doubt? Use the Chat tab to ask your teacher anytime during the session." },
  { icon: '✋', text: "Stuck or confused? Raise your hand — your teacher will be notified silently." },
  { icon: '⏱️', text: "Some questions may have time limits. Answer quickly but thoughtfully!" },
  { icon: '🏆', text: "Correct answers earn points. Stay focused and aim for the leaderboard!" },
  { icon: '💡', text: "Hints are available on most tasks if you get stuck. Don't be afraid to use them." },
  { icon: '📊', text: "Track your accuracy and rank in real-time from the task view." },
  { icon: '🔔', text: "Stay on this page — you'll be automatically moved when the session starts." },
];

function WaitingTipRotator() {
  const [idx, setIdx] = useState(Math.floor(Math.random() * WAITING_TIPS.length));
  const [visible, setVisible] = useState(true);

  useEffect(() => {
    const id = setInterval(() => {
      setVisible(false);
      setTimeout(() => {
        setIdx(i => (i + 1) % WAITING_TIPS.length);
        setVisible(true);
      }, 400);
    }, 5000);
    return () => clearInterval(id);
  }, []);

  const tip = WAITING_TIPS[idx];
  return (
    <div className="waiting-tip" style={{opacity: visible ? 1 : 0, transition:'opacity 0.4s ease'}}>
      <span className="waiting-tip-icon">{tip.icon}</span>
      {tip.text}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  STUDENT: MY QUIZ REPORT  (Feature 1A — student sees ONLY their own)
// ═════════════════════════════════════════════════════════════════
function StudentMyQuizReport({ sessionCode, studentId, studentName }) {
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    setLoading(true);
    setError(null);
    apiFetch(`/quiz/report/${sessionCode}/${studentId}`)
      .then(data => { setReport(data); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, [sessionCode, studentId]);

  if (loading) return (
    <div className="page-sm text-center" style={{paddingTop:48}}>
      <div className="text-muted">Loading your quiz report…</div>
    </div>
  );

  if (error) return (
    <div className="page-sm text-center" style={{paddingTop:48}}>
      <div style={{fontSize:'3rem',marginBottom:12}}>📊</div>
      <div style={{fontWeight:600,marginBottom:8}}>No Quiz Report Yet</div>
      <div className="text-muted text-sm">Your quiz results will appear here once you've submitted a quiz.</div>
    </div>
  );

  const total = report.total || 0;
  const score = report.score || 0;
  const accuracy = total > 0 ? Math.round((score / total) * 100) : 0;
  const wrong = total - score;

  return (
    <div className="page-sm">
      <div className="section-header" style={{marginBottom:16}}>
        <div className="section-title">📊 My Quiz Report</div>
        <div className="text-muted text-sm">{studentName}</div>
      </div>

      {/* Summary Stats */}
      <div className="quiz-report-stat-row">
        <div className="stat">
          <div className="stat-value">{score}/{total}</div>
          <div className="stat-label">Score</div>
        </div>
        <div className="stat">
          <div className="stat-value">{accuracy}%</div>
          <div className="stat-label">Accuracy</div>
        </div>
        <div className="stat">
          <div className="stat-value" style={{backgroundImage:'linear-gradient(135deg,var(--green),#16a34a)'}}>{score}</div>
          <div className="stat-label">✅ Correct</div>
        </div>
        <div className="stat">
          <div className="stat-value" style={{backgroundImage:'linear-gradient(135deg,var(--red),#dc2626)'}}>{wrong}</div>
          <div className="stat-label">❌ Wrong</div>
        </div>
      </div>

      {/* Progress bar */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:'0.85rem'}}>
          <span className="text-muted">Overall Performance</span>
          <span style={{fontWeight:700,color: accuracy >= 70 ? 'var(--green)' : accuracy >= 40 ? 'var(--yellow)' : 'var(--red)'}}>
            {accuracy >= 70 ? 'Good 🎉' : accuracy >= 40 ? 'Fair 🙂' : 'Needs Practice 📚'}
          </span>
        </div>
        <div className="progress-bar">
          <div className={`progress-fill ${accuracy >= 70 ? 'green' : accuracy >= 40 ? 'yellow' : 'red'}`}
            style={{width:`${accuracy}%`}}/>
        </div>
      </div>

      {/* Per-question breakdown */}
      {report.details && report.details.length > 0 && (
        <div className="card">
          <div className="card-title">📋 Question Breakdown</div>
          {report.details.map((d, i) => (
            <div key={i} className={`quiz-report-q ${d.is_correct ? 'correct' : 'wrong'}`}>
              <div className="quiz-report-q-text">
                <span className={`badge ${d.is_correct ? 'badge-green' : 'badge-red'}`} style={{marginRight:8}}>
                  {d.is_correct ? '✅ Correct' : '❌ Wrong'}
                </span>
                Q{i+1}: {d.question}
              </div>
              <div className="quiz-report-ans">
                <span style={{color:'var(--text3)'}}>Your answer: </span>
                <strong style={{color: d.is_correct ? 'var(--green)' : 'var(--red)'}}>
                  {d.student_answer ?? '(no answer)'}
                </strong>
              </div>
              {!d.is_correct && d.correct_answer && (
                <div className="quiz-report-ans">
                  <span style={{color:'var(--text3)'}}>Correct answer: </span>
                  <strong style={{color:'var(--green)'}}>{d.correct_answer}</strong>
                </div>
              )}
              {d.topic && (
                <div style={{marginTop:4}}>
                  <span className="badge badge-blue" style={{fontSize:'0.7rem'}}>{d.topic}</span>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  STUDENT GUIDED TOUR
// ═════════════════════════════════════════════════════════════════
const STUDENT_TOUR_STEPS = [
  {
    targetId: 'student-nav-task',
    text: "Welcome to ClassMind! 👋 This is your **Task** view — where questions from your teacher appear. Wait here for the next task!",
  },
  {
    targetId: 'student-nav-chat',
    text: "The **Chat** tab lets you send messages, ask doubts, and raise your hand ✋ when you need help. Your teacher sees everything!",
  },
  {
    targetId: 'student-hand-btn',
    text: "Click **Raise Hand** anytime to silently signal your teacher. They'll get notified instantly — no interruptions needed!",
  },
  {
    targetId: 'student-session-badge',
    text: "This is your **Session Code** — share it with classmates who want to join the same session.",
  },
  {
    targetId: 'student-tour-task-hint',
    fallbackId: 'student-nav-task',
    text: "When a task arrives, read the question carefully, select or type your answer, then hit **Submit**. You may also request a hint!",
  },
  {
    targetId: 'student-nav-task',
    text: "After submitting, you'll get **instant feedback** — whether you got it right, your score, and the correct answer if you were wrong. 🎯",
  },
  {
    targetId: 'student-nav-chat',
    text: "Have a question about the lesson? Go to **Chat → My Doubts** and type it. Your teacher will answer and you'll get a notification!",
  },
  {
    targetId: 'student-hand-btn',
    text: "You're all set! 🎉 Participate actively, answer tasks, and ask doubts freely. **Good luck and enjoy the class!**",
  },
];

function StudentGuidedTour({ ready }) {
  const [active, setActive]       = useState(false);
  const [step, setStep]           = useState(0);
  const [rect, setRect]           = useState(null);
  const [tipPos, setTipPos]       = useState({ top: 0, left: 0 });
  const [arrowStyle, setArrowStyle] = useState({});

  useEffect(() => {
    if (!ready) return;
    // Tour triggers ONCE per session only (sessionStorage prevents re-run on refresh/navigation)
    if (sessionStorage.getItem('cm_student_tour_done')) return;
    const t = setTimeout(() => {
      setStep(0);
      setRect(null);
      setActive(true);
    }, 800);
    return () => clearTimeout(t);
  }, [ready]);

  useEffect(() => {
    if (!active) return;
    const t = setTimeout(() => computePos(), 180);
    window.addEventListener('resize', computePos);
    return () => { clearTimeout(t); window.removeEventListener('resize', computePos); };
  }, [active, step]);

  function computePos() {
    const s = STUDENT_TOUR_STEPS[step];
    if (!s) return;
    let el = document.getElementById(s.targetId);
    if (!el && s.fallbackId) el = document.getElementById(s.fallbackId);
    if (!el) { setRect(null); return; }
    const r = el.getBoundingClientRect();
    setRect({ top: r.top - 6, left: r.left - 6, width: r.width + 12, height: r.height + 12 });
    const vw = window.innerWidth;
    const below = r.bottom + 16;
    const above = r.top - 148;
    const useBelow = below + 130 < window.innerHeight;
    let tipLeft = r.left;
    if (tipLeft + 285 > vw) tipLeft = vw - 295;
    if (tipLeft < 10) tipLeft = 10;
    setTipPos({ top: useBelow ? below : above, left: tipLeft });
    setArrowStyle(useBelow
      ? { top: -7, left: Math.min(r.left - tipLeft + r.width / 2 - 6, 220) }
      : { bottom: -7, left: Math.min(r.left - tipLeft + r.width / 2 - 6, 220) }
    );
  }

  function nextStep() {
    if (step >= STUDENT_TOUR_STEPS.length - 1) { finish(); return; }
    setStep(s => s + 1);
  }

  function finish() {
    setActive(false);
    sessionStorage.setItem('cm_student_tour_done', '1');
  }

  function parseMarkdown(t) {
    return t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  }

  if (!active) return null;
  const cur = STUDENT_TOUR_STEPS[step];
  const isLast = step === STUDENT_TOUR_STEPS.length - 1;

  return (
    <>
      {rect && (
        <div className="tour-highlight" style={{ top: rect.top, left: rect.left, width: rect.width, height: rect.height }}/>
      )}
      <div className="tour-tooltip" style={{ top: tipPos.top, left: tipPos.left }}>
        <div className="tour-tooltip-arrow" style={arrowStyle}/>
        <div className="tour-progress">
          {STUDENT_TOUR_STEPS.map((_, i) => (
            <div key={i} className={`tour-dot ${i === step ? 'active' : i < step ? 'done' : ''}`}/>
          ))}
        </div>
        <div className="tour-step-num">Step {step + 1} of {STUDENT_TOUR_STEPS.length}</div>
        <div className="tour-tooltip-text" dangerouslySetInnerHTML={{ __html: parseMarkdown(cur.text) }}/>
        <div className="tour-actions">
          <button className="tour-btn-skip" onClick={finish}>Skip</button>
          <button className="tour-btn-next" onClick={nextStep}>
            {isLast ? '🎉 Let\'s go!' : 'Next →'}
          </button>
        </div>
      </div>
    </>
  );
}

// ═════════════════════════════════════════════════════════════════
//  ROOT APP — ROUTER
//  ROOT APP — ROUTER
// ═════════════════════════════════════════════════════════════════
function App() {
  const [route, setRoute] = useState({ page:'landing', params:{} });
  const toastCtx = useToasts();

  function navigate(page, params={}) {
    setRoute({ page, params });
    window.scrollTo(0,0);
  }

  const { page, params } = route;

  return (
   <AppCtx.Provider value={toastCtx}>
      <Toasts toasts={toastCtx.toasts} removeToast={toastCtx.removeToast}/>
      {page==='landing'       && <LandingPage navigate={navigate}/>}
      {page==='teacher-dashboard' && <TeacherShell {...params} navigate={navigate}/>}
      {page==='student-waiting'   && <StudentWaiting {...params} navigate={navigate}/>}
      {page==='student-task'      && <StudentTaskView {...params} navigate={navigate}/>}
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
