<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ClassMind — Real-Time Classroom System</title>

<!-- ─── CDN Libraries ──────────────────────────────────────────── -->
<!-- React 18 (production UMD — no JSX compiler needed) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- jsPDF + SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- ✅ No runtime transpiler needed — all JSX pre-compiled to React.createElement -->

<style>

/* ── Reset & Variables ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--surface3:#2a2f45;
  --accent:#6366f1;--accent2:#8b5cf6;--green:#22c55e;--red:#ef4444;
  --yellow:#eab308;--blue:#3b82f6;--orange:#f97316;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --border:#2d3148;--radius:12px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --font:'Inter',system-ui,sans-serif;
}
@keyframes blink {
  0%,100% { opacity:1; }
  50% { opacity:0; }
}
.light{
  --bg:#f8fafc;
  --surface:#ffffff;
  --surface2:#f1f5f9;
  --surface3:#e2e8f0;

  --text:#0f172a;
  --text2:#475569;
  --text3:#94a3b8;

  --border:#e2e8f0;
}

body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

/* ── Layout ── */
.app{display:flex;flex-direction:column;min-height:100vh}
.main-content{flex:1;padding:0}
.page{padding:24px;max-width:1400px;margin:0 auto}
.page-sm{padding:24px;max-width:700px;margin:0 auto}

/* ── Nav ── */
.nav{background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;height:60px;gap:4px;
  position:sticky;top:0;z-index:100;flex-wrap:wrap}
.nav-brand{font-weight:700;font-size:1.1rem;color:var(--accent);margin-right:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-btn{padding:6px 14px;border-radius:6px;border:none;background:transparent;
  color:var(--text2);cursor:pointer;font-size:0.85rem;transition:all 0.2s}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--accent);color:#fff}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.session-badge{background:var(--surface2);border:1px solid var(--border);
  padding:4px 12px;border-radius:20px;font-size:0.8rem;font-family:monospace;
  color:var(--accent);font-weight:700;letter-spacing:2px}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px}
.card-title{font-weight:600;font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;
  border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:0.875rem;
  font-weight:500;transition:all 0.2s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5254d4}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-warn{background:var(--yellow);color:#000}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2)}
.btn-sm{padding:5px 10px;font-size:0.8rem}
.btn-lg{padding:14px 28px;font-size:1rem}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* ── Forms ── */
.form-group{margin-bottom:14px}
label{display:block;font-size:0.85rem;color:var(--text2);margin-bottom:4px}
input,select,textarea{width:100%;padding:9px 13px;background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);
  font-size:0.9rem;font-family:inherit;outline:none;transition:border 0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--surface2)}
.input-row{display:flex;gap:8px}
.input-row input{flex:1}

/* ── Badges & Chips ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;
  font-size:0.75rem;font-weight:600}
.badge-green{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-red{background:rgba(239,68,68,0.15);color:var(--red)}
.badge-yellow{background:rgba(234,179,8,0.15);color:var(--yellow)}
.badge-blue{background:rgba(59,130,246,0.15);color:var(--blue)}
.badge-purple{background:rgba(99,102,241,0.15);color:var(--accent)}

/* ── Progress ── */
.progress-bar{background:var(--surface2);border-radius:20px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:20px;transition:width 0.6s ease}
.progress-fill.green{background:var(--green)}
.progress-fill.yellow{background:var(--yellow)}
.progress-fill.red{background:var(--red)}
.progress-fill.accent{background:linear-gradient(90deg,var(--accent),var(--accent2))}

/* ── Stat Cards ── */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;text-align:center}
.stat-value{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:0.8rem;color:var(--text2);margin-top:4px}

/* ── Landing Page ── */
.landing{display:block;overflow-x:hidden;background:var(--bg)}
.landing-hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 24px;
  background:radial-gradient(ellipse at 50% -10%,rgba(99,102,241,0.22) 0%,rgba(139,92,246,0.08) 40%,var(--bg) 70%);
  position:relative;overflow:hidden}
.landing-hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 50%,rgba(236,72,153,0.06) 0%,transparent 60%);pointer-events:none}
.landing-hero-grid{position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(99,102,241,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(99,102,241,0.04) 1px,transparent 1px);
  background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,black 0%,transparent 100%)}
.landing-logo{font-size:3.5rem;font-weight:800;margin-bottom:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2),#ec4899);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:1}
.landing-eyebrow{font-size:0.78rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--accent);background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);
  padding:4px 14px;border-radius:20px;margin-bottom:16px;display:inline-block;position:relative;z-index:1}
.landing-sub{color:var(--text2);font-size:1.1rem;margin-bottom:48px;text-align:center;
  max-width:520px;line-height:1.6;position:relative;z-index:1}
.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:600px;width:100%;position:relative;z-index:1}
.role-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;
  padding:32px;cursor:pointer;text-align:center;transition:all 0.25s}
.role-card:hover{border-color:var(--accent);background:var(--surface2);transform:translateY(-2px)}
.role-icon{font-size:3rem;margin-bottom:12px}
.role-title{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.role-desc{font-size:0.85rem;color:var(--text2)}

/* ── Landing sections shared ── */
.lp-section{padding:88px 24px;max-width:1160px;margin:0 auto}
.lp-section-full{padding:80px 0;width:100%}
.lp-tag{font-size:0.75rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--accent);background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);
  padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:16px}
.lp-h2{font-size:2.4rem;font-weight:800;line-height:1.2;margin-bottom:16px;letter-spacing:-0.02em}
.lp-h2 span{background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lp-lead{font-size:1.1rem;color:var(--text2);line-height:1.7;max-width:600px}
.lp-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}

/* ── What is ClassMind section ── */
.lp-what{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.lp-what-pills{display:flex;flex-wrap:wrap;gap:10px;margin-top:28px}
.lp-pill{display:flex;align-items:center;gap:8px;padding:8px 14px;
  background:var(--surface2);border:1px solid var(--border);border-radius:24px;
  font-size:0.82rem;font-weight:600;color:var(--text)}
.lp-pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lp-visual-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:28px;position:relative;overflow:hidden}
.lp-visual-card::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 70% 30%,rgba(99,102,241,0.08),transparent 60%);pointer-events:none}
.lp-mock-bar{height:10px;border-radius:8px;margin-bottom:10px;background:var(--surface2)}
.lp-mock-bar.accent{background:linear-gradient(90deg,var(--accent),var(--accent2));animation:bar-grow 2s ease infinite alternate}
.lp-mock-bar.green{background:var(--green);width:72%}
.lp-mock-bar.yellow{background:var(--yellow);width:45%}
.lp-mock-bar.red{background:var(--red);width:28%}
@keyframes bar-grow{from{opacity:0.7}to{opacity:1}}
.lp-mock-metric{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--surface2);border-radius:10px;margin-bottom:8px;font-size:0.82rem}
.lp-mock-metric-val{font-weight:700;font-size:1rem}
.lp-mock-metric-val.green{color:var(--green)}
.lp-mock-metric-val.yellow{color:var(--yellow)}
.lp-mock-metric-val.red{color:var(--red)}
.lp-mock-metric-val.accent{color:var(--accent)}
.lp-mock-students{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.lp-mock-student{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:0.7rem;font-weight:700;color:#fff}

/* ── Features ── */
.lp-features-bg{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.lp-features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-top:48px}
.lp-feat{background:var(--bg);border:1px solid var(--border);border-radius:16px;
  padding:24px;transition:all 0.25s;position:relative;overflow:hidden;cursor:default}
.lp-feat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transform:scaleX(0);transform-origin:left;transition:transform 0.3s ease}
.lp-feat:hover{border-color:rgba(99,102,241,0.4);transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,0.3)}
.lp-feat:hover::before{transform:scaleX(1)}
.lp-feat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:1.3rem;margin-bottom:16px;flex-shrink:0}
.lp-feat-title{font-size:1rem;font-weight:700;margin-bottom:6px;color:var(--text)}
.lp-feat-desc{font-size:0.85rem;color:var(--text2);line-height:1.6}

/* ── For Teachers / Students ── */
.lp-roles{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:48px}
.lp-role-block{border-radius:20px;padding:36px;border:1px solid var(--border);
  background:var(--surface);position:relative;overflow:hidden}
.lp-role-block.teacher{border-color:rgba(99,102,241,0.3)}
.lp-role-block.student{border-color:rgba(34,197,94,0.3)}
.lp-role-block::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  border-radius:20px;pointer-events:none;opacity:0.04}
.lp-role-block.teacher::before{background:var(--accent)}
.lp-role-block.student::before{background:var(--green)}
.lp-role-head{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.lp-role-emoji{font-size:2rem;width:52px;height:52px;border-radius:14px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
.lp-role-name{font-size:1.25rem;font-weight:800}
.lp-role-sub{font-size:0.82rem;color:var(--text2);margin-top:2px}
.lp-role-list{list-style:none;display:flex;flex-direction:column;gap:12px}
.lp-role-list li{display:flex;align-items:flex-start;gap:10px;font-size:0.9rem;color:var(--text2);line-height:1.5}
.lp-role-list li::before{content:'→';color:var(--accent);font-weight:700;flex-shrink:0;margin-top:1px}
.lp-role-block.student .lp-role-list li::before{color:var(--green)}

/* ── (stats bar removed) ── */

/* ── Carousel/Slideshow ── */
.lp-carousel-wrap{width:100%;overflow:hidden;position:relative;padding:32px 0}
.lp-carousel-track{display:flex;gap:20px;animation:lp-scroll 30s linear infinite;width:max-content}
.lp-carousel-track:hover{animation-play-state:paused}
.lp-slide{flex-shrink:0;width:320px;border-radius:16px;overflow:hidden;
  background:var(--surface);border:1px solid var(--border);padding:20px;
  position:relative}
.lp-slide-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.lp-slide-dot{width:10px;height:10px;border-radius:50%}
.lp-slide-title{font-size:0.78rem;font-weight:700;color:var(--text2)}
@keyframes lp-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── CTA bottom ── */
.lp-cta{text-align:center;padding:100px 24px;
  background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.15),transparent 60%)}
.lp-cta-h{font-size:2.2rem;font-weight:800;margin-bottom:12px;letter-spacing:-0.02em}
.lp-cta-sub{color:var(--text2);margin-bottom:36px;font-size:1.05rem}

/* ── Landing footer ── */
.lp-footer{text-align:center;padding:24px;color:var(--text3);font-size:0.8rem;
  border-top:1px solid var(--border)}

/* ── Scroll animations ── */
@keyframes lp-fadein{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.lp-animate{animation:lp-fadein 0.6s ease forwards;opacity:0}
.lp-animate.d1{animation-delay:0.1s}
.lp-animate.d2{animation-delay:0.2s}
.lp-animate.d3{animation-delay:0.3s}
.lp-animate.d4{animation-delay:0.4s}
.lp-animate.d5{animation-delay:0.5s}
.lp-animate.d6{animation-delay:0.6s}

/* ── Light mode overrides for landing ── */
.light .lp-feat{background:var(--surface2)}
.light .lp-role-block{background:var(--surface)}
.light .lp-slide{background:var(--surface)}

/* ── Teacher Dashboard ── */
.understanding-meter{background:var(--surface2);border-radius:var(--radius);
  padding:20px;text-align:center;margin-bottom:16px}
.meter-value{font-size:4rem;font-weight:800;line-height:1}
.meter-label{color:var(--text2);font-size:0.9rem;margin-top:4px}
.student-chip{display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--surface2);border-radius:8px;font-size:0.85rem}
.student-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.students-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}

/* ── Chat ── */
.chat-area{display:flex;flex-direction:column;height:420px}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{padding:8px 12px;border-radius:10px;max-width:75%;font-size:0.875rem}
.chat-msg.own{background:var(--accent);margin-left:auto}
.chat-msg.other{background:var(--surface2)}
.chat-msg .sender{font-size:0.75rem;color:var(--text3);margin-bottom:2px}
.chat-input-row{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border)}
.chat-input-row input{flex:1}

/* ── Code Editor ── */
.code-editor{background:#0d1117;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px;font-family:'Fira Code',monospace;font-size:0.875rem;color:#c9d1d9;
  min-height:200px;overflow:auto}
.code-editor textarea{background:transparent;border:none;color:inherit;font-family:inherit;
  font-size:inherit;width:100%;min-height:200px;resize:vertical;outline:none}
.code-output{background:#0d1117;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px;font-family:monospace;font-size:0.85rem;color:#22c55e;max-height:200px;overflow:auto;
  white-space:pre-wrap}
.code-output.error{color:var(--red)}

/* ── Waiting Room ── */
.waiting-pulse{width:60px;height:60px;border-radius:50%;border:3px solid var(--accent);
  animation:pulse 2s infinite;margin:0 auto 16px}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.7}}

/* ── Test Mode ── */
.timer{font-size:2.5rem;font-weight:700;font-family:monospace;
  color:var(--accent);text-align:center;padding:12px;
  background:var(--surface2);border-radius:var(--radius)}
.timer.warn{color:var(--yellow)}
.timer.danger{color:var(--red)}
.leaderboard-row{display:flex;align-items:center;gap:12px;padding:10px 14px;
  border-radius:var(--radius-sm);background:var(--surface2);margin-bottom:6px}
.rank-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:0.8rem}
.rank-1{background:#fbbf24;color:#000}
.rank-2{background:#94a3b8;color:#000}
.rank-3{background:#b45309;color:#fff}
.rank-n{background:var(--surface3);color:var(--text2)}

/* ── Task Options (MCQ) ── */
.option-btn{display:block;width:100%;text-align:left;padding:12px 16px;
  background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);cursor:pointer;margin-bottom:8px;transition:all 0.2s;font-family:inherit;font-size:0.9rem}
.option-btn:hover{border-color:var(--accent);background:var(--surface3)}
.option-btn.selected{border-color:var(--accent);background:rgba(99,102,241,0.15)}
.option-btn.correct{border-color:var(--green);background:rgba(34,197,94,0.1)}
.option-btn.wrong{border-color:var(--red);background:rgba(239,68,68,0.1)}

/* ── Groups ── */
.group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;transition:border 0.2s}
.group-card:hover{border-color:var(--accent)}
.group-member{display:flex;align-items:center;gap:8px;padding:6px 10px;
  background:var(--surface2);border-radius:6px;margin:4px 0;font-size:0.85rem}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff}

/* ── Doubt Panel ── */
.doubt-card{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.doubt-text{font-size:0.9rem;margin-bottom:4px}
.doubt-answer{font-size:0.85rem;color:var(--green);margin-top:6px;
  padding:6px 10px;background:rgba(34,197,94,0.08);border-radius:6px}

/* ── Content Preview ── */
.content-preview{width:100%;border-radius:var(--radius-sm);max-height:300px;object-fit:contain;
  background:var(--surface2)}
.file-card{display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:8px}
.file-icon{font-size:1.5rem}

/* ── Upload Zone ── */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;
  text-align:center;cursor:pointer;transition:border 0.2s;color:var(--text2)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);color:var(--text)}
.upload-icon{font-size:2.5rem;margin-bottom:8px}

/* ── Reports / Charts ── */
.chart-container{position:relative;height:260px;padding:4px}

/* ── At-risk panel ── */
.risk-badge{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
  border-radius:6px;padding:4px 10px;font-size:0.8rem;color:var(--red);margin:2px}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 16px;background:transparent;border:none;color:var(--text2);
  cursor:pointer;font-size:0.875rem;border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all 0.2s;font-family:inherit}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}

/* ── Divider ── */
hr{border:none;border-top:1px solid var(--border);margin:16px 0}

/* ── Section header ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}

/* ── Toast ── */
.toasts{position:fixed;top:70px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:12px 14px;border-radius:var(--radius-sm);background:var(--surface2);
  border:1px solid var(--border);font-size:0.875rem;
  animation:slideIn 0.3s ease;min-width:240px;max-width:360px;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--blue);color:var(--blue)}
.toast-msg{flex:1;line-height:1.4}
.toast-close{
  flex-shrink:0;background:none;border:none;cursor:pointer;
  color:currentColor;opacity:0.6;font-size:1rem;line-height:1;
  padding:2px 4px;border-radius:4px;transition:opacity 0.15s;
}
.toast-close:hover{opacity:1}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(40px);opacity:0}}

/* ── Mobile ── */
@media(max-width:600px){
  .role-cards{grid-template-columns:1fr}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .nav{padding:0 12px;height:auto;flex-wrap:wrap;padding-top:8px;padding-bottom:8px}
  .page,.page-sm{padding:16px}
  .lp-what{grid-template-columns:1fr;gap:32px}
  .lp-roles{grid-template-columns:1fr}
  .lp-stats{grid-template-columns:1fr 1fr}
  .lp-stat-item{border-right:none;border-bottom:1px solid var(--border);padding:28px 16px}
  .lp-h2{font-size:1.8rem}
  .lp-section{padding:56px 20px}
  .lp-features-grid{grid-template-columns:1fr}
}
@media(max-width:900px){
  .lp-what{grid-template-columns:1fr;gap:40px}
  .lp-roles{grid-template-columns:1fr}
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

/* ── Task Card Send Enhancements ── */
@keyframes task-sent-glow {
  0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.6), 0 4px 24px rgba(0,0,0,0.4); border-color: var(--green); }
  50%  { box-shadow: 0 0 0 6px rgba(34,197,94,0.15), 0 4px 24px rgba(0,0,0,0.4); border-color: var(--green); }
  100% { box-shadow: 0 0 0 0 rgba(34,197,94,0), 0 4px 24px rgba(0,0,0,0.4); border-color: var(--border); }
}
.task-card-sent {
  animation: task-sent-glow 1.8s ease forwards;
}
.sent-badge {
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:20px;font-size:0.72rem;font-weight:700;
  background:rgba(34,197,94,0.15);color:var(--green);
  border:1px solid rgba(34,197,94,0.3);
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}

/* ── Task Send Dropdown ── */
.task-send-dropdown {
  position:absolute;top:calc(100% + 6px);right:0;z-index:200;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);box-shadow:0 8px 24px rgba(0,0,0,0.35);
  min-width:180px;overflow:hidden;
  animation:fadeIn 0.15s ease;
}
.task-send-dropdown-item {
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;font-size:0.85rem;cursor:pointer;
  color:var(--text);transition:background 0.15s;border:none;
  background:transparent;width:100%;text-align:left;font-family:inherit;
}
.task-send-dropdown-item:hover { background:var(--surface2); }
.task-send-dropdown-label {
  font-size:0.72rem;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.06em;
  padding:8px 14px 4px;
}

/* ── Btn click animation ── */
.btn-click { animation:btn-pop 0.15s ease; }
@keyframes btn-pop { 0%{transform:scale(1)} 50%{transform:scale(0.91)} 100%{transform:scale(1)} }

/* ── Misc ── */
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}.mt-8{margin-top:8px}.mt-16{margin-top:16px}
.mt-24{margin-top:24px}.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.text-sm{font-size:0.875rem}.text-xs{font-size:0.75rem}.text-muted{color:var(--text2)}
.font-mono{font-family:monospace}.font-bold{font-weight:700}
.text-center{text-align:center}.w-full{width:100%}
.hidden{display:none}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.notification-dot{width:8px;height:8px;background:var(--red);border-radius:50%;
  display:inline-block;margin-left:4px;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── Quiz Builder / PDF / Excel Converter ── */
.quiz-order-item{display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:grab}
.quiz-order-item:hover{border-color:var(--accent)}
.quiz-order-btns{display:flex;flex-direction:column;gap:2px}
.quiz-order-btns button{background:none;border:none;cursor:pointer;color:var(--text3);
  font-size:0.75rem;padding:1px 4px;line-height:1;transition:color 0.15s}
.quiz-order-btns button:hover{color:var(--accent)}
.feedback-card{border-radius:12px;padding:14px 16px;margin-top:12px;font-size:0.9rem}
.feedback-correct{background:rgba(34,197,94,0.1);border:1px solid var(--green)}
.feedback-wrong{background:rgba(239,68,68,0.1);border:1px solid var(--red)}
.feedback-answer-box{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.3);
  border-radius:8px;padding:10px 13px;margin-top:8px;font-size:0.875rem}
.feedback-student-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);
  border-radius:8px;padding:10px 13px;margin-top:8px;font-size:0.875rem}
.pdf-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);
  display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.pdf-modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.excel-drop{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;
  cursor:pointer;transition:border 0.2s;position:relative}
.excel-drop:hover{border-color:var(--accent)}

/* ── Teacher Copilot ── */
.copilot-fab{
  position:fixed;bottom:28px;right:28px;z-index:99999;
  width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:1.4rem;
  box-shadow:0 4px 20px rgba(99,102,241,0.5);
  display:flex !important;align-items:center;justify-content:center;
  transition:transform 0.2s,box-shadow 0.2s;
  visibility:visible !important;opacity:1 !important;
}
.copilot-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(99,102,241,0.65)}
.copilot-fab .copilot-pulse{
  position:absolute;width:56px;height:56px;border-radius:50%;
  background:rgba(99,102,241,0.35);
  animation:copilot-ring 2.2s ease-out infinite;
}
@keyframes copilot-ring{0%{transform:scale(1);opacity:0.7}100%{transform:scale(1.65);opacity:0}}

.copilot-window{
  position:fixed;bottom:96px;right:28px;z-index:99998;
  width:360px;max-height:560px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,0.45);
  display:flex;flex-direction:column;overflow:hidden;
  animation:copilot-open 0.22s cubic-bezier(0.34,1.56,0.64,1);
  transform-origin:bottom right;
}
@keyframes copilot-open{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}

.copilot-header{
  padding:14px 16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.copilot-header-info{display:flex;align-items:center;gap:10px}
.copilot-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.copilot-title{font-weight:700;color:#fff;font-size:0.95rem}
.copilot-subtitle{font-size:0.72rem;color:rgba(255,255,255,0.75);margin-top:1px}
.copilot-close{background:none;border:none;color:rgba(255,255,255,0.8);cursor:pointer;
  font-size:1.1rem;padding:4px;border-radius:6px;transition:background 0.15s}
.copilot-close:hover{background:rgba(255,255,255,0.15);color:#fff}

.copilot-chips{
  padding:10px 12px 4px;display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.copilot-chip{
  padding:4px 10px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);font-size:0.75rem;cursor:pointer;
  transition:all 0.15s;white-space:nowrap;
}
.copilot-chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,0.08)}

.copilot-messages{
  flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;
}
.copilot-msg{display:flex;flex-direction:column;gap:2px;max-width:88%}
.copilot-msg.user{align-self:flex-end;align-items:flex-end}
.copilot-msg.bot{align-self:flex-start;align-items:flex-start}
.copilot-bubble{
  padding:9px 13px;border-radius:14px;font-size:0.845rem;line-height:1.5;
  word-break:break-word;
}
.copilot-msg.user .copilot-bubble{
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  border-bottom-right-radius:4px;
}
.copilot-msg.bot .copilot-bubble{
  background:var(--surface2);color:var(--text);
  border-bottom-left-radius:4px;border:1px solid var(--border);
}
.copilot-ts{font-size:0.68rem;color:var(--text3);padding:0 4px}
.copilot-typing{display:flex;align-items:center;gap:4px;padding:10px 13px;
  background:var(--surface2);border-radius:14px;border-bottom-left-radius:4px;
  border:1px solid var(--border);width:fit-content;}
.copilot-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);
  animation:copilot-bounce 1.2s infinite}
.copilot-dot:nth-child(2){animation-delay:0.2s}
.copilot-dot:nth-child(3){animation-delay:0.4s}
@keyframes copilot-bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

.copilot-input-row{
  display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;
}
.copilot-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:8px 14px;color:var(--text);font-size:0.85rem;
  font-family:inherit;outline:none;transition:border 0.2s;
}
.copilot-input:focus{border-color:var(--accent)}
.copilot-send{
  width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  font-size:0.9rem;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform 0.15s;
}
.copilot-send:hover{transform:scale(1.1)}
.copilot-send:disabled{opacity:0.4;cursor:not-allowed;transform:none}

@media(max-width:600px){
  .copilot-window{width:calc(100vw - 24px);right:12px;bottom:80px}
  .copilot-fab{bottom:16px;right:16px}
}
/* ── Guided Tour ── */
.tour-overlay{
  position:fixed;inset:0;z-index:8000;pointer-events:none;
  background:transparent;
}
.tour-highlight{
  position:fixed;z-index:8001;
  border-radius:10px;
  box-shadow:0 0 0 4000px rgba(0,0,0,0.62);
  border:2px solid var(--accent);
  pointer-events:none;
  transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
  animation:tour-pulse 1.8s ease-in-out infinite;
}
@keyframes tour-pulse{
  0%,100%{box-shadow:0 0 0 4000px rgba(0,0,0,0.62),0 0 0 0 rgba(99,102,241,0.6)}
  50%{box-shadow:0 0 0 4000px rgba(0,0,0,0.62),0 0 0 8px rgba(99,102,241,0)}
}
.tour-tooltip{
  position:fixed;z-index:8002;
  background:var(--surface);border:1px solid var(--accent);
  border-radius:14px;padding:16px 18px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  max-width:280px;min-width:220px;
  pointer-events:all;
  animation:tour-pop 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes tour-pop{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
.tour-tooltip-arrow{
  position:absolute;width:12px;height:12px;
  background:var(--surface);border:1px solid var(--accent);
  transform:rotate(45deg);
}
.tour-step-num{
  font-size:0.72rem;font-weight:700;color:var(--accent);
  text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;
}
.tour-tooltip-text{
  font-size:0.92rem;font-weight:500;line-height:1.5;color:var(--text);margin-bottom:14px;
}
.tour-actions{display:flex;gap:8px;align-items:center}
.tour-btn-next{
  flex:1;padding:7px 0;border-radius:8px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-weight:600;font-size:0.85rem;transition:opacity 0.15s;
}
.tour-btn-next:hover{opacity:0.88}
.tour-btn-skip{
  padding:7px 12px;border-radius:8px;border:1px solid var(--border);
  background:none;color:var(--text3);cursor:pointer;font-size:0.8rem;
  transition:color 0.15s;
}
.tour-btn-skip:hover{color:var(--text)}
.tour-progress{
  display:flex;gap:5px;margin-bottom:12px;
}
.tour-dot{
  width:7px;height:7px;border-radius:50%;background:var(--border);
  transition:background 0.2s;
}
.tour-dot.active{background:var(--accent)}
.tour-dot.done{background:var(--accent2)}

/* ── Copilot badge (new) ── */
.copilot-badge{
  position:absolute;top:-4px;right:-4px;
  width:18px;height:18px;border-radius:50%;
  background:var(--red);color:#fff;
  font-size:0.65rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);
  animation:blink 1.5s infinite;
}

/* ── Auto Intervention Popup ── */
@keyframes intervention-fadein{
  from{opacity:0;transform:translateY(20px) scale(0.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes intervention-fadeout{
  from{opacity:1;transform:translateY(0) scale(1)}
  to{opacity:0;transform:translateY(20px) scale(0.96)}
}
.intervention-popup{
  position:fixed;bottom:96px;left:28px;z-index:99997;
  width:320px;
  background:linear-gradient(145deg,var(--surface),var(--surface2));
  border:1px solid rgba(239,68,68,0.4);
  border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.45),0 0 0 1px rgba(239,68,68,0.15);
  overflow:hidden;
  animation:intervention-fadein 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.intervention-popup.hiding{
  animation:intervention-fadeout 0.3s ease forwards;
}
.intervention-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 10px;
  background:rgba(239,68,68,0.08);
  border-bottom:1px solid rgba(239,68,68,0.2);
}
.intervention-title{
  display:flex;align-items:center;gap:8px;
  font-weight:700;font-size:0.9rem;color:var(--red);
}
.intervention-close{
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:1.1rem;line-height:1;padding:2px 6px;border-radius:4px;
  transition:color 0.15s;
}
.intervention-close:hover{color:var(--text)}
.intervention-body{padding:12px 14px}
.intervention-metric{
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
  font-size:0.85rem;color:var(--text2);
}
.intervention-metric span{font-weight:600;color:var(--text)}
.intervention-actions{
  margin-top:10px;border-top:1px solid var(--border);padding-top:10px;
}
.intervention-action-label{
  font-size:0.75rem;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;
}
.intervention-action-item{
  display:flex;align-items:center;gap:6px;
  font-size:0.82rem;color:var(--text2);
  padding:4px 0;
}
.intervention-progress{
  height:3px;background:var(--surface3);border-radius:3px;
  margin-top:12px;overflow:hidden;
}
.intervention-progress-fill{
  height:100%;background:var(--red);border-radius:3px;
  transition:width 0.1s linear;
}

/* ── At-Risk Students Panel ── */
.at-risk-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-top:16px;
}
.at-risk-panel-title{
  font-weight:700;font-size:0.95rem;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.at-risk-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:8px;
  background:var(--surface2);margin-bottom:6px;
  transition:background 0.2s;
}
.at-risk-row:hover{background:var(--surface3)}
.at-risk-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
}
.at-risk-name{flex:1;font-size:0.875rem;font-weight:500}
.at-risk-pct{font-size:0.8rem;font-weight:700;margin-right:4px}
.at-risk-label{font-size:0.72rem;color:var(--text3)}
.at-risk-bar{
  width:60px;height:5px;background:var(--surface3);
  border-radius:3px;overflow:hidden;
}
.at-risk-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}

/* ═══════════════════════════════════════════════════════════════
   STUDENT UI ENHANCEMENTS — ALL 10 FEATURES
   ═══════════════════════════════════════════════════════════════ */

/* ── 1. Student Live HUD ── */
.student-hud{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 24px;display:flex;align-items:center;gap:16px;
  flex-wrap:wrap;font-size:0.78rem;position:sticky;top:60px;z-index:90;
}
.hud-item{display:flex;align-items:center;gap:6px;color:var(--text2)}
.hud-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hud-dot.green{background:var(--green);box-shadow:0 0 6px var(--green)}
.hud-dot.yellow{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.hud-dot.red{background:var(--red)}
.hud-dot.pulse{animation:hud-pulse 2s ease-in-out infinite}
@keyframes hud-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.2)}}
.hud-sep{width:1px;height:16px;background:var(--border)}
.hud-progress-track{width:80px;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.hud-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width 0.5s ease}
.hud-ws-badge{padding:2px 8px;border-radius:20px;font-weight:700;font-size:0.7rem;
  background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.3)}
.hud-ws-badge.warn{background:rgba(234,179,8,0.12);color:var(--yellow);border-color:rgba(234,179,8,0.3)}
.teacher-pulse{display:flex;align-items:center;gap:4px;color:var(--text3);font-size:0.72rem}
.teacher-pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:hud-pulse 1.8s ease-in-out infinite}

/* ── 2. Task Progress Bar & Time-spent ── */
.task-progress-bar{
  height:3px;background:var(--surface3);position:relative;overflow:hidden;
  margin-bottom:0;
}
.task-progress-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.task-time-spent{
  display:flex;align-items:center;gap:4px;font-size:0.72rem;color:var(--text3);
  font-family:monospace;padding:2px 8px;background:var(--surface2);
  border-radius:20px;border:1px solid var(--border);
}
@keyframes task-fade-in{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.task-card-animated{animation:task-fade-in 0.35s cubic-bezier(0.34,1.56,0.64,1)}
.option-btn{transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1)}
.option-btn:active{transform:scale(0.98)}
.option-btn.correct{animation:option-correct 0.4s ease}
.option-btn.wrong{animation:option-wrong 0.4s ease}
@keyframes option-correct{0%,100%{transform:translateX(0)}20%{transform:translateX(4px)}40%{transform:translateX(-2px)}60%{transform:translateX(2px)}}
@keyframes option-wrong{0%,100%{transform:translateX(0)}15%{transform:translateX(-6px)}30%{transform:translateX(6px)}45%{transform:translateX(-4px)}60%{transform:translateX(4px)}}

/* ── 3. Leaderboard toggle ── */
.lb-toggle-btn{
  font-size:0.75rem;padding:3px 10px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);cursor:pointer;transition:all 0.15s;
}
.lb-toggle-btn:hover{border-color:var(--accent);color:var(--accent)}
.lb-top-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;font-size:0.7rem;font-weight:700;margin-right:4px;
}
.lb-row-me{border-left:3px solid var(--accent);background:rgba(99,102,241,0.08) !important}

/* ── 4. Chat unread dot ── */
.chat-unread-dot{
  width:8px;height:8px;background:var(--red);border-radius:50%;
  display:inline-block;margin-left:6px;
  animation:blink 1.2s infinite;
  vertical-align:middle;
}

/* ── 5. Student Copilot (light) ── */
.student-copilot-fab{
  position:fixed;bottom:28px;right:28px;left:auto;z-index:99999;
  width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,#10b981,#0ea5e9);
  color:#fff;font-size:1.3rem;
  box-shadow:0 4px 20px rgba(16,185,129,0.55),0 0 0 1px rgba(16,185,129,0.2);
  display:flex !important;align-items:center;justify-content:center;
  transition:transform 0.2s,box-shadow 0.2s;
  visibility:visible !important;opacity:1 !important;
}
.student-copilot-fab:hover{transform:scale(1.1) translateY(-2px);box-shadow:0 8px 28px rgba(16,185,129,0.7)}
.student-copilot-panel{
  position:fixed;bottom:96px;right:28px;left:auto;z-index:99998;
  width:340px;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;box-shadow:0 12px 48px rgba(0,0,0,0.55);
  overflow:hidden;animation:copilot-open 0.22s cubic-bezier(0.34,1.56,0.64,1);
  transform-origin:bottom right;
}
.student-copilot-header{
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,#10b981,#0ea5e9);
}
.student-copilot-title{font-weight:700;color:#fff;font-size:0.9rem}
.student-copilot-sub{font-size:0.7rem;color:rgba(255,255,255,0.75);margin-top:1px}
.student-copilot-close{margin-left:auto;background:none;border:none;color:rgba(255,255,255,0.8);
  cursor:pointer;font-size:1.1rem;padding:4px;border-radius:6px;transition:background 0.15s}
.student-copilot-close:hover{background:rgba(255,255,255,0.15);color:#fff}
.student-copilot-actions{padding:12px;display:flex;flex-direction:column;gap:6px}
.student-copilot-action{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:10px;border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;font-size:0.85rem;color:var(--text);transition:all 0.15s;text-align:left;
  font-family:inherit;width:100%;
}
.student-copilot-action:hover{border-color:#10b981;background:rgba(16,185,129,0.08);color:#10b981}
.student-copilot-response{
  padding:0 12px 12px;font-size:0.875rem;line-height:1.6;color:var(--text2);
  background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);
  border-radius:10px;margin:0 12px 12px;
  animation:task-fade-in 0.25s ease;
}
.student-copilot-no-task{
  padding:20px;text-align:center;color:var(--text3);font-size:0.85rem;
}
@media(max-width:600px){
  .student-copilot-panel{width:calc(100vw - 24px);right:12px;left:auto;bottom:80px}
  .student-copilot-fab{bottom:16px;right:16px;left:auto}
}

/* ── 6. Waiting room tips ── */
.waiting-tip{
  background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);
  border-radius:10px;padding:12px 16px;font-size:0.85rem;color:var(--text2);
  margin-top:16px;text-align:left;line-height:1.5;
  animation:task-fade-in 0.4s ease;
}
.waiting-tip-icon{font-size:1.1rem;margin-right:6px}
.waiting-question-card{
  background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.3);
  border-radius:12px;padding:16px;margin-top:16px;text-align:left;
}
.waiting-question-label{
  font-size:0.75rem;font-weight:700;color:var(--yellow);
  text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}

/* ── 7. Performance panel ── */
.perf-panel{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;
}
.perf-panel-title{font-size:0.75rem;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
.perf-stats{display:flex;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.perf-stat{flex:1;text-align:center;padding:10px 6px;background:var(--surface)}
.perf-stat:not(:last-child){border-right:1px solid var(--border)}
.perf-stat-val{font-size:1.3rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.perf-stat-lbl{font-size:0.68rem;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em}

/* ── 8. Micro-interactions ── */
.btn{transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1)}
.btn:active:not(:disabled){transform:scale(0.95)}
.card{animation:task-fade-in 0.3s ease}
@keyframes panel-slide-in{
  from{opacity:0;transform:translateX(16px)}
  to{opacity:1;transform:translateX(0)}
}
.page-sm > *{animation:task-fade-in 0.3s ease}

/* ── 9. Content preview enhancement ── */
.content-preview-enhanced{
  width:100%;border-radius:12px;overflow:hidden;margin-bottom:16px;
  border:1px solid var(--border);background:var(--surface2);
}
.content-preview-label{
  padding:8px 14px;font-size:0.75rem;font-weight:700;color:var(--text2);
  background:var(--surface3);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
}
.content-preview-enhanced img{width:100%;max-height:280px;object-fit:contain;display:block}
.content-preview-enhanced iframe{width:100%;height:300px;border:none;display:block}

/* ── General fade for new content ── */
@keyframes fade-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fade-up 0.3s ease forwards}

/* ── Quiz Navigation ── */
.quiz-nav-dot{
  width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;
  font-size:0.75rem;font-weight:700;transition:all 0.15s;
}
.quiz-nav-dot:hover{transform:scale(1.1)}

/* ── Copilot response highlight ── */
.student-copilot-response strong{color:var(--text)}
.student-copilot-response{transition:opacity 0.2s ease;}

/* ── Copilot v2: wider panel + chat ── */
.student-copilot-panel{width:340px !important;bottom:96px !important;right:28px !important;left:auto !important;transform-origin:bottom right !important;}
@media(max-width:600px){.student-copilot-panel{width:calc(100vw - 20px) !important;right:10px !important;left:auto !important;}}
@keyframes copilot-dot-bounce{
  0%,80%,100%{transform:translateY(0);opacity:0.4}
  40%{transform:translateY(-5px);opacity:1}
}
@keyframes copilot-open{
  from{transform:scale(0.88) translateY(10px);opacity:0}
  to{transform:scale(1) translateY(0);opacity:1}
}
.sc-msg-user{
  background:linear-gradient(135deg,#10b981,#0ea5e9);
  color:#fff;border-radius:12px 12px 4px 12px;
  padding:8px 12px;font-size:0.83rem;line-height:1.55;max-width:88%;
}
.sc-msg-bot{
  background:var(--surface2);color:var(--text);
  border:1px solid var(--border);border-radius:12px 12px 12px 4px;
  padding:8px 12px;font-size:0.83rem;line-height:1.55;max-width:92%;
}
.sc-msg-bot strong{color:var(--text)}
.sc-quick-btn{
  white-space:nowrap;padding:4px 10px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text);font-size:0.74rem;cursor:pointer;flex-shrink:0;
  transition:all 0.15s;font-family:inherit;
}
.sc-quick-btn:hover:not(:disabled){border-color:#10b981;color:#10b981;background:rgba(16,185,129,0.08)}
.sc-quick-btn:disabled{opacity:0.4;cursor:not-allowed}
.sc-suggestion{
  padding:3px 9px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:0.7rem;
  cursor:pointer;font-family:inherit;transition:all 0.15s;
}
.sc-suggestion:hover{border-color:#10b981;color:#10b981}
.sc-input{
  flex:1;padding:7px 12px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-size:0.83rem;outline:none;font-family:inherit;
}
.sc-input:focus{border-color:#10b981}
.sc-send{
  padding:7px 14px;border-radius:20px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#10b981,#0ea5e9);
  color:#fff;font-weight:700;font-size:0.8rem;
  transition:opacity 0.15s;font-family:inherit;
}
.sc-send:disabled{opacity:0.4;cursor:not-allowed}

/* ── Quiz Report Section ── */
.quiz-report-section{margin-top:24px}
.quiz-report-stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.quiz-report-q{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--border)}
.quiz-report-q.correct{border-left-color:var(--green)}
.quiz-report-q.wrong{border-left-color:var(--red)}
.quiz-report-q-text{font-size:0.875rem;font-weight:600;margin-bottom:6px}
.quiz-report-ans{font-size:0.8rem;margin-top:4px;color:var(--text2)}

/* ── Profile Icon ── */
.profile-icon-btn{
  width:34px;height:34px;border-radius:50%;border:2px solid var(--border);
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:0.85rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;flex-shrink:0;
}
.profile-icon-btn.no-profile{
  background:var(--surface2);border:2px dashed var(--border);
  color:var(--text3);font-size:1rem;
}
.profile-icon-btn:hover{transform:scale(1.08);box-shadow:0 0 0 3px rgba(99,102,241,0.3)}

/* ── Login Modal ── */
@keyframes login-modal-in{
  from{opacity:0;transform:scale(0.92) translateY(12px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
/* ══ LOGIN PAGE — Full-screen auth wall ══ */
.login-page-bg{
  position:fixed;inset:0;z-index:10000;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  background:radial-gradient(ellipse at 60% 20%,rgba(99,102,241,0.18) 0%,rgba(139,92,246,0.08) 35%,var(--bg) 65%),
             radial-gradient(ellipse at 20% 80%,rgba(236,72,153,0.07) 0%,transparent 50%);
  animation:login-bg-in 0.4s ease;
}
@keyframes login-bg-in{from{opacity:0}to{opacity:1}}
.login-page-bg::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(99,102,241,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(99,102,241,0.04) 1px,transparent 1px);
  background-size:52px 52px;
  mask-image:radial-gradient(ellipse 90% 80% at 50% 50%,black 0%,transparent 100%);
}

/* ── Card wrapper ── */
.login-card{
  position:relative;z-index:1;
  background:var(--surface);
  border:1px solid rgba(99,102,241,0.18);
  border-radius:24px;
  width:100%;max-width:420px;
  box-shadow:0 32px 80px rgba(0,0,0,0.55),0 0 0 1px rgba(99,102,241,0.08),
             inset 0 1px 0 rgba(255,255,255,0.04);
  animation:login-card-rise 0.38s cubic-bezier(0.34,1.28,0.64,1);
  overflow:hidden;
}
@keyframes login-card-rise{
  from{opacity:0;transform:translateY(28px) scale(0.97)}
  to{opacity:1;transform:none}
}

/* ── Card header ── */
.login-card-head{
  padding:32px 32px 24px;
  background:linear-gradient(160deg,rgba(99,102,241,0.13),rgba(139,92,246,0.06) 60%,transparent);
  border-bottom:1px solid var(--border);
  text-align:center;
  position:relative;
}
.login-brand-mark{
  width:64px;height:64px;border-radius:18px;margin:0 auto 16px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;
  box-shadow:0 10px 32px rgba(99,102,241,0.4),inset 0 1px 0 rgba(255,255,255,0.15);
  position:relative;
}
.login-brand-mark::after{
  content:'';position:absolute;inset:0;border-radius:18px;
  background:linear-gradient(180deg,rgba(255,255,255,0.12),transparent);
  pointer-events:none;
}
.login-card-title{
  font-size:1.05rem;font-weight:800;letter-spacing:-0.02em;
  color:var(--text);margin-bottom:5px;line-height:1.3;
}
.login-card-sub{font-size:0.82rem;color:var(--text2);line-height:1.5;max-width:280px;margin:0 auto;}

/* ── Card body ── */
.login-card-body{padding:24px 28px 28px;}

/* ── Stored account rows ── */
.login-accounts-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.login-account-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border-radius:12px;
  border:1.5px solid var(--border);background:var(--surface2);
  cursor:pointer;transition:all 0.18s;text-align:left;
  font-family:inherit;color:var(--text);width:100%;
}
.login-account-row:hover{
  border-color:var(--accent);background:rgba(99,102,241,0.07);
  transform:translateX(2px);
  box-shadow:0 4px 16px rgba(99,102,241,0.12);
}
.login-account-avatar{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;font-weight:700;color:#fff;
  box-shadow:0 3px 10px rgba(99,102,241,0.3);
}
.login-account-info{flex:1;min-width:0;}
.login-account-name{font-size:0.9rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.login-account-email{font-size:0.75rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.login-account-arrow{color:var(--text3);font-size:0.85rem;flex-shrink:0;}

/* ── Divider with text ── */
.login-divider{
  display:flex;align-items:center;gap:10px;margin:16px 0;
  color:var(--text3);font-size:0.75rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
}
.login-divider::before,.login-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* ── "Use another account" button ── */
.login-use-another{
  width:100%;padding:11px 14px;
  display:flex;align-items:center;gap:12px;
  border-radius:12px;border:1.5px dashed var(--border);
  background:transparent;cursor:pointer;
  color:var(--text2);font-family:inherit;font-size:0.87rem;font-weight:600;
  transition:all 0.18s;
}
.login-use-another:hover{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,0.05);}
.login-use-another-icon{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:var(--surface3);display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:background 0.18s;
}
.login-use-another:hover .login-use-another-icon{background:rgba(99,102,241,0.15);}

/* ── New profile form ── */
.login-form-wrap{animation:login-form-in 0.25s ease;}
@keyframes login-form-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.login-form-back{
  display:flex;align-items:center;gap:6px;background:none;border:none;
  color:var(--text3);font-size:0.82rem;font-weight:600;cursor:pointer;
  padding:0 0 14px;font-family:inherit;transition:color 0.15s;
}
.login-form-back:hover{color:var(--text);}
.login-field-label{
  font-size:0.75rem;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;display:block;
}
.login-field-label span{color:var(--red);}
.login-field-input{
  width:100%;padding:11px 14px;margin-bottom:12px;
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-size:0.9rem;
  font-family:inherit;outline:none;transition:border 0.2s,box-shadow 0.2s;
}
.login-field-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(99,102,241,0.12);
}
.login-field-input::placeholder{color:var(--text3);}

/* ── Role selector in form ── */
.login-role-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.login-role-btn{
  padding:10px 8px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--surface2);cursor:pointer;text-align:center;
  transition:all 0.18s;font-family:inherit;color:var(--text);
}
.login-role-btn:hover{border-color:var(--accent);background:rgba(99,102,241,0.06);}
.login-role-btn.active{
  border-color:var(--accent);background:rgba(99,102,241,0.1);
  box-shadow:0 0 0 3px rgba(99,102,241,0.13);
}
.login-role-icon{font-size:1.5rem;margin-bottom:4px;}
.login-role-label{font-size:0.8rem;font-weight:700;}

/* ── Submit CTA ── */
.login-submit{
  width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;font-size:0.95rem;font-weight:700;font-family:inherit;
  letter-spacing:0.01em;transition:all 0.2s;
  box-shadow:0 4px 16px rgba(99,102,241,0.3);
  position:relative;overflow:hidden;
  margin-top:4px;
}
.login-submit::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.12),transparent);
  pointer-events:none;
}
.login-submit:hover:not(:disabled){
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(99,102,241,0.4);
}
.login-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* ── Social login ── */
.login-social-grid{display:flex;flex-direction:column;gap:9px;margin-bottom:4px;}
.login-social-btn{
  width:100%;padding:11px 14px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:0.875rem;font-weight:600;font-family:inherit;cursor:pointer;
  transition:all 0.18s;border:1.5px solid;position:relative;overflow:hidden;
}
.login-social-btn::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.18s;
  background:rgba(255,255,255,0.06);
}
.login-social-btn:hover::before{opacity:1;}
.login-social-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,0.25);}
.login-social-google{
  background:#fff;border-color:#e2e8f0;color:#1f2937;
}
.login-social-google:hover{border-color:#d1d5db;background:#f9fafb;}
.login-social-linkedin{
  background:#0077b5;border-color:#0077b5;color:#fff;
}
.login-social-facebook{
  background:#1877f2;border-color:#1877f2;color:#fff;
}
.login-social-icon{width:20px;height:20px;flex-shrink:0;}

/* ── Footer note ── */
.login-card-footer{
  padding:14px 28px 20px;
  text-align:center;font-size:0.75rem;color:var(--text3);
  border-top:1px solid var(--border);
  background:rgba(0,0,0,0.06);
}

/* Legacy alias so nothing else breaks */
.login-modal-overlay{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.login-modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:420px;overflow:hidden;}
.login-modal-header{padding:28px 28px 20px;border-bottom:1px solid var(--border);text-align:center;}
.login-modal-logo{width:60px;height:60px;border-radius:16px;margin:0 auto 14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
.login-modal-title{font-size:1.25rem;font-weight:800;margin-bottom:4px;}
.login-modal-sub{font-size:0.85rem;color:var(--text2);}
.login-modal-body{padding:24px 28px 28px;}
.login-modal-name-input{width:100%;padding:12px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:0.95rem;font-family:inherit;outline:none;transition:border 0.2s;margin-bottom:18px;}
.login-modal-name-input:focus{border-color:var(--accent);}
.login-modal-submit{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:0.95rem;font-weight:700;font-family:inherit;transition:all 0.2s;}
.login-modal-footer{text-align:center;margin-top:14px;font-size:0.78rem;color:var(--text3);}

/* ── Profile Drawer Overlay ── */
.profile-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9000;
  opacity:0;pointer-events:none;transition:opacity 0.25s ease;
}
.profile-overlay.open{opacity:1;pointer-events:all;}

/* ── Profile Drawer Panel ── */
.profile-drawer{
  position:fixed;top:0;right:-420px;width:420px;max-width:100vw;height:100vh;
  background:var(--surface);border-left:1px solid var(--border);
  z-index:9001;display:flex;flex-direction:column;
  transition:right 0.3s cubic-bezier(0.34,1.1,0.64,1);
  box-shadow:-8px 0 40px rgba(0,0,0,0.35);
  overflow:hidden;
}
.profile-drawer.open{right:0;}

/* ── Profile Drawer Header ── */
.profile-drawer-header{
  padding:20px 20px 0;
  background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.08));
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.profile-drawer-close{
  position:absolute;top:14px;right:14px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:5px 9px;cursor:pointer;
  color:var(--text2);font-size:0.9rem;transition:all 0.15s;
}
.profile-drawer-close:hover{background:var(--surface3);color:var(--text)}
.profile-avatar{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;font-weight:700;color:#fff;margin-bottom:10px;
  box-shadow:0 4px 16px rgba(99,102,241,0.4);
}
.profile-name{font-size:1.1rem;font-weight:700;margin-bottom:2px}
.profile-role-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:600;
  background:rgba(99,102,241,0.15);color:var(--accent);margin-bottom:14px;
}

/* ── Profile Tabs ── */
.profile-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-top:4px;}
.profile-tab{
  flex:1;padding:10px 6px;border:none;background:transparent;
  color:var(--text2);font-size:0.82rem;font-weight:600;cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.15s;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.profile-tab:hover{color:var(--text);background:rgba(99,102,241,0.05)}
.profile-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── Profile Drawer Body ── */
.profile-drawer-body{
  flex:1;overflow-y:auto;padding:16px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}

/* ── Profile Stats Grid ── */
.prof-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.prof-stat{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:14px;text-align:center;
}
.prof-stat-value{
  font-size:1.6rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.prof-stat-label{font-size:0.72rem;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:0.06em;}

/* ── Profile Section Title ── */
.prof-section-title{
  font-size:0.78rem;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.1em;
  margin:14px 0 8px;display:flex;align-items:center;gap:6px;
}

/* ── Session Row in profile ── */
.prof-session-row{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;margin-bottom:7px;
  display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;
}
.prof-session-name{font-size:0.88rem;font-weight:600;margin-bottom:3px;}
.prof-session-date{font-size:0.72rem;color:var(--text3);}
.prof-session-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.prof-session-stat{
  font-size:0.72rem;padding:2px 8px;border-radius:12px;font-weight:600;
  background:rgba(99,102,241,0.1);color:var(--accent);
}
.prof-session-stat.green{background:rgba(34,197,94,0.1);color:var(--green);}
.prof-session-stat.yellow{background:rgba(234,179,8,0.1);color:var(--yellow);}

/* ── Profile Export Bar ── */
.prof-export-bar{
  display:flex;gap:8px;padding:14px 16px;
  border-top:1px solid var(--border);flex-shrink:0;
  background:var(--surface);
}

/* ── Empty state in profile ── */
.prof-empty{
  text-align:center;padding:32px 16px;color:var(--text3);
  font-size:0.875rem;
}
.prof-empty-icon{font-size:2.5rem;margin-bottom:8px;}

/* ── Profile Settings Tab ── */
.prof-settings-section{margin-bottom:20px;}
.prof-settings-label{
  font-size:0.72rem;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}

/* ── Restricted Admin View ── */
.restricted-view {
  min-height: 80vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
}
.restricted-card {
  max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 32px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}
.restricted-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--red), var(--orange));
}
.restricted-icon {
  width: 80px;
  height: 80px;
  background: rgba(239, 68, 68, 0.1);
  color: var(--red);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  margin: 0 auto 24px;
}
.restricted-title {
  font-size: 1.5rem;
  font-weight: 800;
  margin-bottom: 12px;
  color: var(--text);
}
.restricted-text {
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 32px;
  font-size: 0.95rem;
}
.restricted-email {
  display: inline-block;
  font-family: monospace;
  background: var(--surface2);
  padding: 4px 10px;
  border-radius: 6px;
  color: var(--accent);
  font-weight: 700;
  margin-top: 8px;
}
.prof-settings-input{
  width:100%;padding:10px 14px;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:10px;
  color:var(--text);font-size:0.9rem;font-family:inherit;
  outline:none;transition:border 0.2s;margin-bottom:8px;
}
.prof-settings-input:focus{border-color:var(--accent);}
.prof-role-switch{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;
}
.prof-role-switch-btn{
  padding:10px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--surface2);cursor:pointer;text-align:center;
  font-family:inherit;color:var(--text2);transition:all 0.15s;
  font-size:0.85rem;font-weight:600;
}
.prof-role-switch-btn:hover{border-color:var(--accent);color:var(--accent)}
.prof-role-switch-btn.active{
  border-color:var(--accent);background:rgba(99,102,241,0.1);color:var(--accent);
}
.prof-logout-btn{
  width:100%;padding:11px;border-radius:10px;border:1.5px solid rgba(239,68,68,0.4);
  background:rgba(239,68,68,0.08);color:var(--red);
  cursor:pointer;font-family:inherit;font-size:0.875rem;font-weight:700;
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:24px;
}
.prof-logout-btn:hover{background:rgba(239,68,68,0.15);border-color:var(--red);}

/* ── Profile trend mini-chart ── */
.prof-trend-row{
  display:flex;gap:3px;align-items:flex-end;height:40px;margin-bottom:10px;
}
.prof-trend-bar{
  flex:1;border-radius:3px 3px 0 0;
  background:linear-gradient(to top,var(--accent),var(--accent2));
  opacity:0.8;min-width:6px;transition:all 0.3s ease;
}

@media(max-width:480px){
  .profile-drawer{width:100vw;}
}

/* ── Student Theme Toggle ── */
.theme-toggle-btn{
  padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);cursor:pointer;
  font-size:0.8rem;transition:all 0.2s;line-height:1;
}
.theme-toggle-btn:hover{background:var(--surface3);color:var(--text)}

/* ═══════════════════════════════════════════════════════════════════
   MOBILE ENHANCEMENT LAYER — additive only, desktop unchanged
   Breakpoints: 480px / 768px / 1024px
   ═══════════════════════════════════════════════════════════════════ */

/* ── Touch targets — globally enforced on mobile ── */
@media(max-width:768px){
  .btn{ min-height:44px; padding:10px 16px; }
  .btn-sm{ min-height:36px; padding:7px 12px; font-size:0.82rem; }
  .btn-lg{ min-height:52px; }
  input, select, textarea{ min-height:44px; padding:11px 14px; font-size:1rem; }
  .option-btn{ min-height:48px; padding:14px 16px; font-size:0.95rem; }
  .nav-btn{ min-height:36px; }
  .tab{ min-height:40px; padding:10px 14px; }
}

/* ── Active/tap feedback ── */
@media(hover:none){
  .btn:active:not(:disabled){ transform:scale(0.96); opacity:0.85; }
  .option-btn:active{ transform:scale(0.98); }
  .nav-btn:active{ background:var(--surface2); }
  .role-card:active{ transform:scale(0.98); border-color:var(--accent); }
}

/* ─────────────────────────────────────────────────────────────────
   1024px — small laptops / large tablets landscape
   ───────────────────────────────────────────────────────────────── */
@media(max-width:1024px){
  .page{ padding:20px 18px; }
  .grid-4{ grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); }
}

/* ─────────────────────────────────────────────────────────────────
   768px — tablets / phablets
   ───────────────────────────────────────────────────────────────── */
@media(max-width:768px){
  /* layout */
  .page, .page-sm{ padding:16px 14px; }
  .grid-2{ grid-template-columns:1fr 1fr; }
  .grid-3{ grid-template-columns:1fr 1fr; }
  .grid-4{ grid-template-columns:1fr 1fr; }

  /* stat cards */
  .stat-value{ font-size:1.7rem; }

  /* landing */
  .landing-logo{ font-size:2.6rem; }
  .landing-sub{ font-size:1rem; margin-bottom:32px; }
  .role-cards{ gap:14px; }
  .role-card{ padding:24px 20px; }
  .role-icon{ font-size:2.4rem; }

  /* meter */
  .meter-value{ font-size:3rem; }

  /* chart */
  .chart-container{ height:220px; }

  /* chat area */
  .chat-area{ height:360px; }

  /* student HUD wrapping fix */
  .student-hud{ padding:6px 14px; gap:10px; flex-wrap:wrap; }
  .hud-sep{ display:none; }
}

/* ─────────────────────────────────────────────────────────────────
   480px — phones
   ───────────────────────────────────────────────────────────────── */
@media(max-width:480px){
  /* layout */
  .page, .page-sm{ padding:12px 10px; }
  .grid-2, .grid-3, .grid-4{ grid-template-columns:1fr; }
  .role-cards{ grid-template-columns:1fr; gap:12px; }

  /* typography scaling */
  .landing-logo{ font-size:2rem; }
  .landing-sub{ font-size:0.9rem; margin-bottom:24px; }
  .meter-value{ font-size:2.4rem; }
  .stat-value{ font-size:1.5rem; }
  .section-title{ font-size:1rem; }
  .card-title{ font-size:0.95rem; }
  .timer{ font-size:1.8rem; }

  /* cards */
  .card{ padding:14px 12px; }
  .card-sm{ padding:10px 10px; }

  /* chat area */
  .chat-area{ height:300px; }

  /* chat messages */
  .chat-msg{ max-width:90%; font-size:0.9rem; }

  /* input rows */
  .input-row{ flex-direction:column; }
  .input-row input{ width:100%; }

  /* tabs: horizontally scrollable on tiny screens */
  .tabs{ overflow-x:auto; flex-wrap:nowrap; -webkit-overflow-scrolling:touch; gap:2px; padding-bottom:2px; }
  .tab{ white-space:nowrap; flex-shrink:0; font-size:0.82rem; padding:8px 12px; }

  /* perf panel */
  .perf-stats{ flex-wrap:wrap; }
  .perf-stat{ min-width:50%; }

  /* HUD */
  .student-hud{ flex-wrap:wrap; gap:8px; padding:6px 10px; top:56px; }
  .hud-sep{ display:none; }
  .hud-progress-track{ width:60px; }

  /* intervention popup */
  .intervention-popup{ left:12px; right:12px; width:auto; bottom:76px; }

  /* section header stacking */
  .section-header{ flex-direction:column; align-items:flex-start; gap:8px; }

  /* leaderboard rows */
  .leaderboard-row{ padding:8px 10px; gap:8px; }
}

/* ─────────────────────────────────────────────────────────────────
   NAV — hamburger on mobile
   ───────────────────────────────────────────────────────────────── */

/* hamburger button — hidden on desktop */
.nav-hamburger{
  display:none;
  background:none;border:none;cursor:pointer;
  color:var(--text);font-size:1.4rem;padding:4px 6px;
  border-radius:6px;transition:background 0.15s;
  flex-shrink:0;
}
.nav-hamburger:hover{ background:var(--surface2); }

/* mobile nav drawer container */
.nav-mobile-drawer{
  display:none; /* shown by JS class toggle */
  flex-direction:column;
  width:100%;
  padding:8px 0 12px;
  border-top:1px solid var(--border);
  background:var(--surface);
  gap:2px;
}
.nav-mobile-drawer.open{ display:flex; }

/* mobile nav item styling */
.nav-mobile-drawer .nav-btn{
  width:100%;
  text-align:left;
  border-radius:8px;
  padding:10px 14px;
  font-size:0.9rem;
  display:flex;
  align-items:center;
  gap:8px;
}

/* mobile nav-right row */
.nav-mobile-right{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:8px;
  padding:8px 14px 4px;
  border-top:1px solid var(--border);
  margin-top:4px;
}

@media(max-width:768px){
  /* hide default desktop nav buttons and right area */
  .nav > .nav-btn{ display:none; }
  .nav > .nav-right{ display:none; }
  /* show hamburger */
  .nav-hamburger{ display:flex; align-items:center; justify-content:center; }
  /* nav becomes a flex-col wrapper */
  .nav{
    flex-wrap:wrap;
    height:auto;
    padding:0 14px;
    position:sticky;top:0;z-index:100;
  }
  /* brand + hamburger on same row */
  .nav-brand{ padding:12px 0; flex:1; }
  .nav-hamburger{ margin-left:auto; }
}

/* ─────────────────────────────────────────────────────────────────
   FLOATING COMPONENTS — bottom sheets on mobile
   ───────────────────────────────────────────────────────────────── */
@media(max-width:768px){
  /* Copilot FABs — move up to clear bottom nav */
  .copilot-fab{ bottom:72px !important; right:14px !important; }
  .student-copilot-fab{ bottom:72px !important; right:14px !important; }

  /* Copilot windows — full-width bottom sheets */
  .copilot-window{
    width:100vw !important;
    right:0 !important;
    left:0 !important;
    bottom:0 !important;
    border-radius:20px 20px 0 0 !important;
    max-height:75vh !important;
    transform-origin:bottom center !important;
  }
  .student-copilot-panel{
    width:100vw !important;
    right:0 !important;
    left:0 !important;
    bottom:0 !important;
    border-radius:20px 20px 0 0 !important;
    max-height:80vh !important;
    transform-origin:bottom center !important;
  }

  /* PDF modal — full-screen on small devices */
  .pdf-modal-overlay{ padding:0; align-items:flex-end; }
  .pdf-modal{
    max-width:100vw;
    border-radius:20px 20px 0 0;
    max-height:92vh;
    padding:20px 16px;
  }

  /* Intervention popup — bottom sheet */
  .intervention-popup{
    left:0 !important; right:0 !important;
    bottom:0 !important; width:100% !important;
    border-radius:20px 20px 0 0 !important;
    max-width:100vw;
  }

  /* Tour tooltip — clamp to viewport */
  .tour-tooltip{
    max-width:calc(100vw - 24px) !important;
    left:12px !important;
  }

  /* Toast — full-width on mobile */
  .toasts{ right:8px; left:8px; top:64px; }
  .toast{ min-width:unset; max-width:100%; width:100%; }

  /* Task send dropdown */
  .task-send-dropdown{
    right:0 !important; left:0 !important;
    width:100% !important;
    border-radius:16px 16px 0 0 !important;
    bottom:0 !important; top:auto !important;
    position:fixed !important;
    z-index:9999 !important;
    padding-bottom:env(safe-area-inset-bottom,0px);
  }
}

/* ─────────────────────────────────────────────────────────────────
   BOTTOM NAVIGATION BAR — mobile only
   ───────────────────────────────────────────────────────────────── */
.mobile-bottom-nav{
  display:none;
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:999;
  background:var(--surface);
  border-top:1px solid var(--border);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));
  justify-content:space-around;
  align-items:center;
}
.mobile-bottom-nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;
  color:var(--text2);font-size:0.65rem;font-family:inherit;
  padding:4px 8px;border-radius:8px;transition:all 0.15s;
  min-width:52px;position:relative;
}
.mobile-bottom-nav-item span.icon{ font-size:1.35rem; line-height:1; }
.mobile-bottom-nav-item.active{ color:var(--accent); }
.mobile-bottom-nav-item .notif-dot{
  position:absolute;top:2px;right:10px;
  width:8px;height:8px;background:var(--red);
  border-radius:50%;border:2px solid var(--surface);
  animation:blink 1.5s infinite;
}

@media(max-width:768px){
  .mobile-bottom-nav{ display:flex; }
  /* push page content above bottom nav */
  .main-content{ padding-bottom:68px; }
  /* push student HUD below sticky nav on mobile */
  .student-hud{ top:56px; }
}

/* ─────────────────────────────────────────────────────────────────
   SCROLL & OVERFLOW FIXES
   ───────────────────────────────────────────────────────────────── */
@media(max-width:768px){
  /* prevent body from having nested scroll traps */
  body{ -webkit-overflow-scrolling:touch; overflow-x:hidden; }

  /* chat scroll areas */
  .chat-messages{ -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
  .students-list{ -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
  .copilot-messages{ -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }

  /* code editor */
  .code-editor{ overflow:auto; -webkit-overflow-scrolling:touch; }
  .code-output{ overflow:auto; -webkit-overflow-scrolling:touch; }

  /* tables inside reports */
  table{ display:block; overflow-x:auto; -webkit-overflow-scrolling:touch; width:100%; }

  /* quiz navigation dots — scrollable */
  .quiz-nav-dots-row{
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    flex-wrap:nowrap !important; padding-bottom:4px;
  }

  /* content preview */
  .content-preview-enhanced iframe{ height:200px; }
}

/* ─────────────────────────────────────────────────────────────────
   WAITING ROOM — mobile centered layout
   ───────────────────────────────────────────────────────────────── */
@media(max-width:480px){
  .page-sm{ padding:16px 12px; }

}

// Record student activity (accumulated, non-destructive)
function weeklyRecordStudent(studentId, correct, total, timeSecs) {
  if (!_weeklyStore.students[studentId]) {
    _weeklyStore.students[studentId] = {
      sessionsAttended: 0,
      tasksCompleted: 0,
      scores: [],
      timeSecs: 0
    };
  }
  const s = _weeklyStore.students[studentId];
  s.sessionsAttended = Math.max(s.sessionsAttended, 1);
  s.tasksCompleted = Math.max(s.tasksCompleted, total);
  s.timeSecs += timeSecs;
  if (total > 0) s.scores.push(Math.round(correct / total * 100));
}

function generateQuestionsPDF(tasks, opts = {}) {
  const {
    title = 'Question Bank',
    showAnswers = true,
    shuffle = false
  } = opts;
  const {
    jsPDF
  } = window.jspdf;
  const doc = new jsPDF({
    unit: 'mm',
    format: 'a4'
  });
  const W = 190,
    ML = 10,
    lh = 7;
  let y = 15;
  function checkPage(need = 20) {
    if (y + need > 280) {
      doc.addPage();
      y = 15;
    }
  }

  // Title
  doc.setFontSize(18);
  doc.setFont('helvetica', 'bold');
  doc.text(title, ML, y);
  y += 10;
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(120);
  doc.text(`Generated by ClassMind  •  ${new Date().toLocaleDateString()}  •  ${tasks.length} question(s)`, ML, y);
  doc.setTextColor(0);
  y += 8;
  doc.setDrawColor(180);
  doc.line(ML, y, ML + W, y);
  y += 6;
  let list = shuffle ? [...tasks].sort(() => Math.random() - 0.5) : [...tasks];
  list.forEach((t, i) => {
    checkPage(30);
    // Question number + type badge
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    const meta = [t.topic, t.difficulty].filter(Boolean).join(' · ');
    doc.text(`Q${i + 1}.  [${(t.type || 'mcq').toUpperCase()}]${meta ? '  ' + meta : ''}`, ML, y);
    y += lh;

    // Question text (wrapped)
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    const qLines = doc.splitTextToSize(t.question || '', W - 8);
    qLines.forEach(line => {
      checkPage();
      doc.text(line, ML + 4, y);
      y += lh;
    });

    // Options
    if (t.type === 'mcq' && t.options) {
      t.options.forEach((opt, j) => {
        const letter = String.fromCharCode(65 + j);
        const isCorrect = showAnswers && letter === t.correct_answer;
        doc.setFont('helvetica', isCorrect ? 'bold' : 'normal');
        if (isCorrect) doc.setTextColor(34, 197, 94);
        const optLines = doc.splitTextToSize(`${letter}. ${opt}`, W - 16);
        checkPage();
        optLines.forEach(l => {
          doc.text(l, ML + 8, y);
          y += lh;
        });
        doc.setTextColor(0);
        doc.setFont('helvetica', 'normal');
      });
    }

    // Correct answer for short/long
    if (showAnswers && (t.type === 'short' || t.type === 'long') && t.correct_answer) {
      checkPage(12);
      doc.setTextColor(34, 197, 94);
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(9);
      const aLines = doc.splitTextToSize('✓ Model Answer: ' + t.correct_answer, W - 8);
      aLines.forEach(l => {
        doc.text(l, ML + 4, y);
        y += 6;
      });
      doc.setTextColor(0);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
    }
    y += 4; // gap between questions
    checkPage(2);
    doc.setDrawColor(230);
    doc.line(ML, y, ML + W, y);
    y += 5;
  });
  return doc;
}

  const max = Math.max(...data, 100);
