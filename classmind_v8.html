//  STUDENT: WAITING ROOM
// ═════════════════════════════════════════════════════════════════
// ═════════════════════════════════════════════════════════════════
//  STUDENT: WAITING ROOM
// ═════════════════════════════════════════════════════════════════
function StudentWaiting({ sessionCode, studentId, studentName, navigate }) {
  const [status, setStatus] = useState('waiting');
  const [session, setSession] = useState(null);

  // ✅ NEW: waiting question state
  const [question, setQuestion] = useState(null);
  const [answer, setAnswer] = useState('');

  const wsUrl = `${WS_BASE}/ws/student/${sessionCode}/${studentId}`;

  useWS(wsUrl, useCallback((msg) => {

    if (msg.type === 'approved') {
      setStatus('approved');
      setTimeout(()=>navigate('student-task', {sessionCode, studentId, studentName}), 1000);
    }

    else if (msg.type === 'rejected') setStatus('rejected');

    else if (msg.type === 'kicked') setStatus('kicked');

    // ✅ NEW: receive question from teacher
    else if (msg.type === 'waiting_question') {
      setQuestion(msg.question);
    }

  }, []));

  useEffect(()=>{
    apiFetch(`/api/session/${sessionCode}`).then(setSession).catch(()=>{});
  },[]);

  // ✅ NEW: send response to teacher
  async function sendAnswer(){
    if(!answer.trim()) return;

    await apiFetch(`/api/session/${sessionCode}/waiting/response?student_id=${studentId}&answer=${encodeURIComponent(answer)}`,{
      method:'POST'
    });

    setAnswer('');
  }

  return (
    <div style={{
      minHeight:'100vh',
      display:'flex',
      flexDirection:'column',
      alignItems:'center',
      justifyContent:'center',
      background:'radial-gradient(ellipse at top,rgba(99,102,241,0.1) 0%,var(--bg) 60%)',
      padding:24
    }}>

      <div className="card" style={{width:'100%',maxWidth:440,textAlign:'center'}}>

        {/* WAITING */}
        {status==='waiting'&&<>
          <div className="waiting-pulse"/>

          <div style={{fontSize:'1.5rem',fontWeight:700,marginBottom:8}}>
            Waiting for Approval
          </div>

          <div className="text-muted">
            Hello, <strong>{studentName}</strong>!
          </div>

          <div className="text-muted text-sm mt-8">
            The teacher will approve your entry shortly.
          </div>

          {session&&(
            <div style={{marginTop:16}}>
              <div className="session-badge" style={{display:'inline-block'}}>
                {session.code}
              </div>
            </div>
          )}

          {/* ✅ NEW: Question UI */}
          {question && (
            <div style={{marginTop:20,textAlign:'left'}}>
              <div className="card-sm" style={{marginBottom:8}}>
                <div style={{fontWeight:600,marginBottom:6}}>❓ Teacher Question</div>
                <div className="text-sm">{question}</div>
              </div>

              <div className="flex gap-8">
                <input
                  value={answer}
                  onChange={e=>setAnswer(e.target.value)}
                  placeholder="Type your answer..."
                />

                <button className="btn btn-primary btn-sm" onClick={sendAnswer}>
                  Send
                </button>
              </div>
            </div>
          )}

          <div className="text-xs text-muted mt-16">
            Please wait, do not close this page.
          </div>

          {/* ── Feature 6: Rotating tips ── */}
          <WaitingTipRotator/>
        </>}

        {/* APPROVED */}
        {status==='approved'&&<>
          <div style={{fontSize:'4rem',marginBottom:12}}>✅</div>
          <div style={{fontSize:'1.5rem',fontWeight:700}}>You're in!</div>
          <div className="text-muted">Joining the session…</div>
        </>}

        {/* REJECTED */}
        {status==='rejected'&&<>
          <div style={{fontSize:'4rem',marginBottom:12}}>❌</div>
          <div style={{fontSize:'1.5rem',fontWeight:700}}>Access Denied</div>
          <div className="text-muted">The teacher has rejected your join request.</div>
          <button className="btn btn-ghost mt-16" onClick={()=>navigate('landing')}>
            ← Back to Home
          </button>
        </>}

        {/* KICKED */}
        {status==='kicked'&&<>
          <div style={{fontSize:'4rem',marginBottom:12}}>🚫</div>
          <div style={{fontSize:'1.5rem',fontWeight:700}}>Removed</div>
          <div className="text-muted">You have been removed from this session.</div>
          <button className="btn btn-ghost mt-16" onClick={()=>navigate('landing')}>
            ← Back to Home
          </button>
        </>}

      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  STUDENT: TASK VIEW
// ═════════════════════════════════════════════════════════════════
function StudentTaskView({ sessionCode, studentId, studentName, navigate }) {
  const [sPage, setSPage] = useState('task'); // task | test | chat | result
  const [currentTask, setCurrentTask] = useState(null);
  const [sessionStatus, setSessionStatus] = useState('active');
  const [testState, setTestState] = useState(null); // {tasks, duration, startTime}
  const [testAnswers, setTestAnswers] = useState({});
  const [selected, setSelected] = useState(null);
  const [shortAnswer, setShortAnswer] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [result, setResult] = useState(null);
  const [hint, setHint] = useState(null);
  const [contentShared, setContentShared] = useState(null);
  const [messages, setMessages] = useState([]);
  const [chatInput, setChatInput] = useState('');
  const [doubts, setDoubts] = useState([]);
  const [doubtText, setDoubtText] = useState('');
  const [handRaised, setHandRaised] = useState(false);
  const [groups, setGroups] = useState([]);
  const [announcement, setAnnouncement] = useState('');
  const [testTimeLeft, setTestTimeLeft] = useState(0);
  const testTimerRef = useRef(null);
  const messagesEnd = useRef(null);
  const { add } = useContext(AppCtx);

  // ── NEW: enhanced state ──
  const [wsConnected, setWsConnected]   = useState(false);
  const [taskIndex, setTaskIndex]       = useState(0);
  const [totalTasks, setTotalTasks]     = useState(0);
  const [answeredCount, setAnsweredCount] = useState(0);
  const [correctCount, setCorrectCount] = useState(0);
  const [myRank, setMyRank]             = useState(0);
  const [chatUnread, setChatUnread]     = useState(0);
  const [taskStartTime, setTaskStartTime] = useState(null);
  const [timeSpent, setTimeSpent]       = useState(0);
  // ── coding stats (Feature 7) ──────────────────────────────────────
  const [codingLeaderboard, setCodingLeaderboard] = useState([]);
  const [codingScore, setCodingScore]   = useState(0);
  const [codingPassed, setCodingPassed] = useState(0);
  const [codingTotal, setCodingTotal]   = useState(0);
  const [codingSubmitted, setCodingSubmitted] = useState(false);

  // ── QUIZ STATE ENGINE (single source of truth) ───────────────────
  // Golden rule: initialize once → UI reads only from quizState → WS never drives UI
  // answers keyed by index: { 0:{value:'A',submitted:true,result:{...}}, 1:{...} }
  const QUIZ_RESET = { active: false, questions: [], index: 0, answers: {} };
  const [quizState, setQuizState] = useState(QUIZ_RESET);
  // Ref so WS closure always reads latest value without stale captures
  const quizStateRef = useRef(QUIZ_RESET);
  useEffect(() => { quizStateRef.current = quizState; }, [quizState]);

  // ── PERSISTENCE: restore quizState + task on mount ──────────────
  useEffect(() => {
    try {
      const saved = localStorage.getItem(`cm_session_${sessionCode}_${studentId}`);
      if (saved) {
        const s = JSON.parse(saved);
        if (s.quizActive && s.quizQuestions?.length) {
          // Restore full quiz state
          setQuizState({
            active: true,
            questions: s.quizQuestions,
            index: s.quizIndex || 0,
            answers: s.quizAnswers || {},
          });
        } else if (s.currentTask) {
          setCurrentTask(s.currentTask);
        }
        if (s.answeredCount) setAnsweredCount(s.answeredCount);
        if (s.correctCount)  setCorrectCount(s.correctCount);
      }
    } catch {}
  }, []);

  // ── PERSISTENCE: save on key state changes ───────────────────────
  useEffect(() => {
    try {
      localStorage.setItem(`cm_session_${sessionCode}_${studentId}`, JSON.stringify({
        currentTask,
        quizActive:    quizState.active,
        quizQuestions: quizState.questions,
        quizIndex:     quizState.index,
        quizAnswers:   quizState.answers,
        answeredCount,
        correctCount,
        ts: Date.now(),
      }));
    } catch {}
  }, [currentTask, quizState, answeredCount, correctCount]);

  const wsUrl = `${WS_BASE}/ws/student/${sessionCode}/${studentId}`;

  // ── student notification sound ──
  function playStudentBeep(type='default') {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      if (type === 'task')   { osc.frequency.value = 880; gain.gain.value = 0.18; }
      else if (type === 'test')  { osc.frequency.value = 660; gain.gain.value = 0.22; }
      else if (type === 'doubt') { osc.frequency.value = 520; gain.gain.value = 0.15; }
      else if (type === 'chat')  { osc.frequency.value = 440; gain.gain.value = 0.10; }
      else                       { osc.frequency.value = 660; gain.gain.value = 0.15; }
      osc.start(); osc.stop(ctx.currentTime + 0.18);
    } catch {}
  }

  const wsSend = useWS(wsUrl, useCallback((msg) => {
    console.log('WS EVENT:', msg.type, '| QUIZ ACTIVE:', quizStateRef.current.active);

    // ══ STEP 1: ALWAYS handle quiz start first — before any other logic ══
    if (msg.type === 'new_quiz' || msg.type === 'quiz_start') {
      // Accept questions from any payload shape the backend may send
      const qs = msg.questions || msg.tasks || msg.quiz?.questions || [];
      if (!qs.length) return;
      console.log('QUIZ START — questions:', qs.length, '| index reset to 0');
      setQuizState({ active: true, questions: qs, index: 0, answers: {} });
      setWsConnected(true);
      playStudentBeep('task');
      add(`📋 Quiz started — ${qs.length} question${qs.length !== 1 ? 's' : ''}. Navigate freely.`, 'info');
      return; // nothing else runs
    }

    // ══ STEP 2: BLOCK ALL other events while a quiz is in progress ══
    // quizStateRef always holds the current value — no stale closure risk
    if (quizStateRef.current.active) {
      console.log('WS EVENT BLOCKED (quiz active):', msg.type);
      return; // ← hard wall — quiz UI never touched by WS
    }

    // ══ STEP 3: Normal (non-quiz) event handling ══
    if (msg.type === 'new_task' || msg.type === 'task') {
      const incomingTask = msg.task || null;
      setCurrentTask(incomingTask);
      setSelected(null); setShortAnswer(''); setSubmitted(false); setResult(null); setHint(null);
      setTaskStartTime(Date.now()); setTimeSpent(0);
      if (incomingTask?.content) {
        setContentShared({ name: incomingTask.content.name, type: incomingTask.content.content_type, data: incomingTask.content.data });
      }
      if (msg.task_index !== undefined) setTaskIndex(msg.task_index + 1);
      else if (msg.index !== undefined) setTaskIndex(msg.index + 1);
      if (msg.total_tasks !== undefined) setTotalTasks(msg.total_tasks);
      else if (msg.total !== undefined) setTotalTasks(msg.total);
      playStudentBeep('task');
      add('📤 New task received — answer now!', 'info');
      setWsConnected(true);
    }
    else if (msg.type === 'quiz_submit_ack') {
      // Server confirmed receipt of quiz answers
      add(`🎉 ${msg.message || 'Quiz submitted! Great work.'}`, 'success');
      console.log('QUIZ SUBMIT ACK — score:', msg.score, '| answers received:', msg.total);
    }
    else if (msg.type === 'session_status') setSessionStatus(msg.status);
    else if (msg.type === 'kicked') navigate('landing');
    else if (msg.type === 'content_shared') {
      setContentShared({ name: msg.filename, type: msg.content_type, data: msg.data });
      playStudentBeep('default');
      add('📄 Teacher shared new content', 'info');
    }
    else if (msg.type === 'chat_message') {
      setMessages(m => [...m, msg.message]);
      setTimeout(() => messagesEnd.current?.scrollIntoView({ behavior: 'smooth' }), 100);
      if (msg.message?.sender_id !== studentId) {
        playStudentBeep('chat');
        add('💬 New message in class chat', 'info');
        setChatUnread(n => n + 1);
      }
    }
    else if (msg.type === 'doubt_resolved') {
      setDoubts(d => d.map(x => x.id === msg.doubt.id ? msg.doubt : x));
      playStudentBeep('doubt');
      add('💡 Your doubt has been answered!', 'success');
      setSPage(p => { if (p !== 'chat') setChatUnread(n => n + 1); return p; });
    }
    else if (msg.type === 'test_started') {
      setTestState({ tasks: msg.tasks, duration: msg.duration_secs, startTime: msg.start_time });
      setTestAnswers({});
      setSPage('test');
      playStudentBeep('test');
      add('🧪 Test has started — good luck!', 'info');
      setTestTimeLeft(msg.duration_secs);
      clearInterval(testTimerRef.current);
      testTimerRef.current = setInterval(() => {
        setTestTimeLeft(t => {
          if (t <= 1) { clearInterval(testTimerRef.current); handleTestSubmit(); return 0; }
          return t - 1;
        });
      }, 1000);
    }
    else if (msg.type === 'test_ended') {
      clearInterval(testTimerRef.current);
      setTestState(null);
      setSPage('result');
      add('🏁 Test has ended', 'info');
    }
    else if (msg.type === 'announcement') setAnnouncement(msg.message);
    else if (msg.type === 'groups_updated') setGroups(msg.groups);
    else if (msg.type === 'coding_leaderboard_update') {
      setCodingLeaderboard(msg.leaderboard || []);
      const mine = (msg.leaderboard || []).find(r => r.name === studentName);
      if (mine) setCodingScore(mine.score);
    }
    else if (msg.type === 'connected') {
      if (msg.current_task) {
        setCurrentTask(msg.current_task);
        setTaskStartTime(Date.now());
        if (msg.current_task.content) {
          setContentShared({ name: msg.current_task.content.name, type: msg.current_task.content.content_type, data: msg.current_task.content.data });
        }
      }
      if (msg.groups) setGroups(msg.groups);
      if (msg.session_status) setSessionStatus(msg.session_status);
      if (msg.task_index !== undefined && msg.task_index >= 0) setTaskIndex(msg.task_index + 1);
      if (msg.total_tasks !== undefined) setTotalTasks(msg.total_tasks);
      setWsConnected(true);
    }
  }, [studentId]));

  // ── time-spent ticker ──
  useEffect(() => {
    if (!taskStartTime || submitted) return;
    const id = setInterval(() => setTimeSpent(Math.floor((Date.now() - taskStartTime) / 1000)), 1000);
    return () => clearInterval(id);
  }, [taskStartTime, submitted]);

  // ── rank polling ──
  useEffect(() => {
    if (!sessionCode || !studentId) return;
    let alive = true;
    async function pollRank() {
      try {
        const board = await apiFetch(`/api/session/${sessionCode}/leaderboard`);
        if (!alive) return;
        const idx = board.findIndex(s => s.student_id === studentId);
        if (idx >= 0) setMyRank(idx + 1);
      } catch {}
    }
    pollRank();
    const id = setInterval(pollRank, 10000);
    return () => { alive = false; clearInterval(id); };
  }, [sessionCode, studentId]);

  async function submitAnswer() {
    if (!currentTask) return;
    const answer = currentTask.type==='mcq'?selected:shortAnswer;
    if (!answer) return add('Please select/type an answer','error');
    try {
      const r = await apiFetch('/api/responses/submit', {method:'POST', body:{
        session_code:sessionCode, student_id:studentId,
        task_id:currentTask.id, answer,
        time_taken: taskStartTime ? (Date.now() - taskStartTime) / 1000 : null,
      }});
      setSubmitted(true);
      setResult(r);
      // update perf counters
      setAnsweredCount(c => c + 1);
      if (r.correct) setCorrectCount(c => c + 1);
      setTaskIndex(i => i + 1);
    } catch(e) { add(e.message,'error'); }
  }

  async function requestHint() {
    try {
      const r = await apiFetch(`/api/responses/request_hint?session_code=${sessionCode}&student_id=${studentId}&task_id=${currentTask.id}`,{method:'POST'});
      setHint(r.hint);
    } catch {}
  }

  // ══════════════════════════════════════════════════════════════════
  //  QUIZ ENGINE — all navigation is ONLY driven by user action
  //  Index NEVER changes automatically. No WS events touch these.
  // ══════════════════════════════════════════════════════════════════

  // Navigate to next question (clamps to last)
  function quizNext() {
    setQuizState(s => {
      const next = Math.min(s.index + 1, s.questions.length - 1);
      console.log('QUIZ NEXT:', s.index, '→', next);
      return { ...s, index: next };
    });
  }

  // Navigate to previous question (clamps to 0)
  function quizPrev() {
    setQuizState(s => {
      const prev = Math.max(s.index - 1, 0);
      console.log('QUIZ PREV:', s.index, '→', prev);
      return { ...s, index: prev };
    });
  }

  // Jump directly to a question by index
  function quizJump(i) {
    setQuizState(s => {
      console.log('QUIZ JUMP:', s.index, '→', i);
      return { ...s, index: i };
    });
  }

  // Save the selected/typed answer for the current question into state
  function quizSetAnswer(value) {
    setQuizState(s => ({
      ...s,
      answers: { ...s.answers, [s.index]: { ...(s.answers[s.index] || {}), value } },
    }));
  }

  // ── QUIZ REVIEW MODAL STATE ──────────────────────────────────────
  const [quizReviewOpen, setQuizReviewOpen] = useState(false);

  // Save answer into state only — NO API call. Works for MCQ, short, long, coding.
  function quizSaveAnswer() {
    const q   = quizState.questions[quizState.index];
    const ans = quizState.answers[quizState.index];
    const val = ans?.value || '';
    if (!q || !val.trim()) return add('Please select or type an answer first', 'error');
    setQuizState(s => ({
      ...s,
      answers: {
        ...s.answers,
        [s.index]: { ...(s.answers[s.index] || {}), value: val, saved: true },
      },
    }));
    add('✔ Answer saved', 'success');
  }

  // Open review modal (replaces direct finish)
  function openQuizReview() {
    setQuizReviewOpen(true);
  }

  // Final submit: send all answers via WS, reset quiz state
  function finishQuiz() {
    setQuizReviewOpen(false);
    const allAnswers = {};
    quizState.questions.forEach((q, i) => {
      const a = quizState.answers[i];
      if (a?.value) allAnswers[q.id] = a.value;
    });
    console.log('QUIZ SUBMIT — sending', Object.keys(allAnswers).length, 'answers via WS');
    wsSend({
      type:         'quiz_submit',
      answers:      allAnswers,
      student_id:   studentId,
      student_name: studentName,
    });
    setQuizState({ active: false, questions: [], index: 0, answers: {} });
    add('✅ Quiz submitted! Great work.', 'success');
  }

  async function handleTestSubmit() {
    if (!testState) return;
    // Submit all answers
    for (const [taskId, ans] of Object.entries(testAnswers)) {
      try {
        await apiFetch('/api/responses/submit', {method:'POST', body:{
          session_code:sessionCode, student_id:studentId, task_id:taskId, answer:ans,
        }});
      } catch {}
    }
    try {
      await apiFetch(`/api/test/submit/${sessionCode}/${studentId}`, {method:'POST'});
    } catch {}
    clearInterval(testTimerRef.current);
    setSPage('result');
  }

  async function sendChat() {
    if (!chatInput.trim()) return;
    try {
      await apiFetch('/api/chat/send', {method:'POST', body:{
        session_code:sessionCode, sender_id:studentId, content:chatInput, chat_type:'global',
      }});
      setChatInput('');
    } catch {}
  }

  async function submitDoubt() {
    if (!doubtText.trim()) return;
    try {
      const d = await apiFetch('/api/doubts/submit', {method:'POST', body:{session_code:sessionCode,student_id:studentId,doubt_text:doubtText}});
      setDoubts(prev=>[...prev,d]);
      setDoubtText('');
      add('Doubt submitted','success');
    } catch {}
  }

  async function toggleHand() {
    const endpoint = handRaised?'lower_hand':'raise_hand';
    try {
      await apiFetch(`/api/session/${sessionCode}/${endpoint}/${studentId}`, {method:'POST'});
      setHandRaised(!handRaised);
    } catch {}
  }

  const fmtTime = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  const [tourReady, setTourReady] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setTourReady(true), 700);
    return () => clearTimeout(t);
  }, []);

  // ── Feature: Student Day/Night Theme Toggle ──────────────────────
  const [isLightTheme, setIsLightTheme] = useState(() => {
    try { return localStorage.getItem('cm_student_theme') === 'light'; } catch { return false; }
  });
  useEffect(() => {
    if (isLightTheme) document.body.classList.add('light');
    else document.body.classList.remove('light');
    try { localStorage.setItem('cm_student_theme', isLightTheme ? 'light' : 'dark'); } catch {}
  }, [isLightTheme]);

  const NAV = [
    {id:'task',label:'📝 Task'},{id:'test',label:'🧪 Test'},{id:'chat',label:'💬 Chat'},{id:'myreport',label:'📊 Report'}
  ];

  const [mobileStudentNavOpen, setMobileStudentNavOpen] = useState(false);

  const fmtSecs = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  return (
    <div className="app">
      <nav className="nav">
        <span className="nav-brand">🧠 ClassMind</span>
        <span className="text-muted text-sm">{studentName}</span>

        {/* ── DESKTOP nav buttons ── */}
        {NAV.map(n=>(
          <button key={n.id} id={`student-nav-${n.id}`}
            className={`nav-btn ${sPage===n.id?'active':''}`}
            onClick={()=>{setSPage(n.id); if(n.id==='chat') setChatUnread(0);}}>
            {n.label}
            {n.id==='chat' && chatUnread > 0 && <span className="chat-unread-dot"/>}
          </button>
        ))}
        <div className="nav-right">
          <button
            className="theme-toggle-btn"
            onClick={() => setIsLightTheme(v => !v)}
            title={isLightTheme ? 'Switch to Dark Mode' : 'Switch to Light Mode'}
          >
            {isLightTheme ? '🌙' : '☀️'}
          </button>
          <button id="student-hand-btn" className={`btn btn-sm ${handRaised?'btn-warn':'btn-ghost'}`} onClick={toggleHand}>
            {handRaised?'✋ Hand Raised':'✋ Raise Hand'}
          </button>
          <span id="student-session-badge" className="session-badge">{sessionCode}</span>
        </div>

        {/* ── MOBILE hamburger ── */}
        <button
          className="nav-hamburger"
          aria-label="Menu"
          onClick={()=>setMobileStudentNavOpen(o=>!o)}
        >
          {mobileStudentNavOpen ? '✕' : '☰'}
        </button>

        {/* ── MOBILE drawer ── */}
        <div className={`nav-mobile-drawer${mobileStudentNavOpen?' open':''}`}>
          {NAV.map(n=>(
            <button key={n.id}
              className={`nav-btn ${sPage===n.id?'active':''}`}
              onClick={()=>{ setSPage(n.id); if(n.id==='chat') setChatUnread(0); setMobileStudentNavOpen(false); }}>
              {n.label}
              {n.id==='chat' && chatUnread > 0 && <span className="chat-unread-dot"/>}
            </button>
          ))}
          <div className="nav-mobile-right">
            <button
              className="theme-toggle-btn"
              onClick={() => setIsLightTheme(v => !v)}
            >
              {isLightTheme ? '🌙 Dark' : '☀️ Light'}
            </button>
            <button id="student-hand-btn" className={`btn btn-sm ${handRaised?'btn-warn':'btn-ghost'}`} onClick={toggleHand}>
              {handRaised?'✋ Raised':'✋ Raise Hand'}
            </button>
            <span id="student-session-badge" className="session-badge">{sessionCode}</span>
          </div>
        </div>
      </nav>

      {/* ── Student Live HUD ── */}
      <StudentHUD
        sessionStatus={sessionStatus}
        taskIndex={quizState.active ? quizState.index + 1 : taskIndex}
        totalTasks={quizState.active ? quizState.questions.length : totalTasks}
        wsConnected={wsConnected}
        hasTask={quizState.active || !!currentTask}
      />

      {announcement && (
        <div style={{background:'var(--accent)',padding:'10px 24px',fontSize:'0.9rem',display:'flex',justifyContent:'space-between'}}>
          📢 {announcement}
          <button style={{background:'none',border:'none',color:'#fff',cursor:'pointer'}} onClick={()=>setAnnouncement('')}>✕</button>
        </div>
      )}

      <div className="main-content">
        {/* TASK PAGE */}
        {sPage==='task' && (
          <div className="page-sm">
            {sessionStatus==='paused'&&<div className="card text-center" style={{padding:20,marginBottom:16,borderColor:'var(--yellow)'}}>⏸ Session is paused</div>}
            {sessionStatus==='ended'&&<div className="card text-center" style={{padding:20,borderColor:'var(--red)'}}>Session has ended. Thank you!</div>}

            {/* ── Performance Panel ── */}
            <StudentPerfPanel answered={answeredCount} correct={correctCount} rank={myRank}
              codingScore={codingScore} codingSubmitted={codingSubmitted}/>

            {/* ════════════════════════════════════════════════════════
                BRANCH A: QUIZ MODE  (JEE-style exam engine)
                ── Completely isolated from task system ──
                ── All state lives in quizState only ──
                ── No WS events touch this after quiz_start ──
                ════════════════════════════════════════════════════════ */}
            {quizState.active && (() => {
              const q        = quizState.questions[quizState.index];
              const qa       = quizState.answers[quizState.index] || {};
              const qVal     = qa.value || '';
              const qSaved   = qa.saved === true;   // answer saved to state
              const isFirst  = quizState.index === 0;
              const isLast   = quizState.index === quizState.questions.length - 1;
              const total    = quizState.questions.length;
              const answered = Object.values(quizState.answers).filter(a => a?.value?.trim()).length;

              if (!q) return null;

              return (
                <div>
                  {/* ── Quiz review modal ── */}
                  {quizReviewOpen && (
                    <div style={{
                      position:'fixed',inset:0,background:'rgba(0,0,0,0.72)',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      zIndex:500,padding:16,
                    }}>
                      <div className="card" style={{maxWidth:400,width:'100%',padding:28}}>
                        <div style={{fontWeight:800,fontSize:'1.15rem',marginBottom:16,textAlign:'center'}}>
                          📋 Review Before Submitting
                        </div>

                        {/* Summary stats */}
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
                          <div style={{background:'var(--surface2)',borderRadius:10,padding:'14px 16px',textAlign:'center'}}>
                            <div style={{fontSize:'1.8rem',fontWeight:800,color:'var(--green)'}}>{answered}</div>
                            <div style={{fontSize:'0.78rem',color:'var(--text2)',marginTop:2}}>Answered</div>
                          </div>
                          <div style={{background:'var(--surface2)',borderRadius:10,padding:'14px 16px',textAlign:'center'}}>
                            <div style={{fontSize:'1.8rem',fontWeight:800,color:'var(--text3)'}}>{total - answered}</div>
                            <div style={{fontSize:'0.78rem',color:'var(--text2)',marginTop:2}}>Not Answered</div>
                          </div>
                        </div>

                        {/* Per-question status */}
                        <div style={{display:'flex',gap:5,flexWrap:'wrap',justifyContent:'center',marginBottom:20}}>
                          {quizState.questions.map((_, i) => {
                            const hasAns = !!(quizState.answers[i]?.value?.trim());
                            return (
                              <div key={i} onClick={() => { setQuizReviewOpen(false); quizJump(i); }}
                                title={hasAns ? 'Answered' : 'Not answered'}
                                style={{
                                  width:28,height:28,borderRadius:6,
                                  background: hasAns ? 'var(--green)' : 'var(--surface3)',
                                  color: hasAns ? '#fff' : 'var(--text2)',
                                  display:'flex',alignItems:'center',justifyContent:'center',
                                  fontSize:'0.72rem',fontWeight:700,cursor:'pointer',
                                  border: `1px solid ${hasAns ? 'var(--green)' : 'var(--border)'}`,
                                }}>
                                {hasAns ? '✓' : i+1}
                              </div>
                            );
                          })}
                        </div>

                        {total - answered > 0 && (
                          <div style={{background:'rgba(234,179,8,0.1)',border:'1px solid var(--yellow)',
                            borderRadius:8,padding:'8px 12px',fontSize:'0.82rem',color:'var(--yellow)',
                            marginBottom:16,textAlign:'center'}}>
                            ⚠️ {total - answered} question{total-answered!==1?'s':''} unanswered — you can still go back
                          </div>
                        )}

                        <div style={{display:'flex',gap:10}}>
                          <button className="btn btn-ghost" style={{flex:1}}
                            onClick={() => setQuizReviewOpen(false)}>
                            ← Go Back
                          </button>
                          <button className="btn btn-success" style={{flex:1}}
                            onClick={finishQuiz}>
                            🏁 Submit Final
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* ── Quiz header bar ── */}
                  <div style={{
                    background:'linear-gradient(135deg,rgba(99,102,241,0.18),rgba(139,92,246,0.1))',
                    border:'1px solid rgba(99,102,241,0.3)',borderRadius:12,
                    padding:'12px 16px',marginBottom:12,
                    display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap',
                  }}>
                    <div>
                      <div style={{fontWeight:700,fontSize:'0.95rem'}}>📋 Quiz in Progress</div>
                      <div style={{fontSize:'0.75rem',color:'var(--text2)',marginTop:2}}>
                        {answered} / {total} answered
                      </div>
                    </div>
                    <div style={{flex:1,minWidth:120,maxWidth:240}}>
                      <div className="progress-bar" style={{height:6}}>
                        <div className="progress-fill accent" style={{
                          width:`${Math.round((answered/total)*100)}%`,
                        }}/>
                      </div>
                      <div style={{fontSize:'0.7rem',color:'var(--text3)',marginTop:3,textAlign:'right'}}>
                        Q {quizState.index+1} of {total}
                      </div>
                    </div>
                  </div>

                  {/* ── JEE-style dot navigator ──
                      Purple  = current question
                      Green   = answered (has a saved value)
                      Grey    = not yet answered                    */}
                  <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:12,justifyContent:'center'}}>
                    {quizState.questions.map((_, i) => {
                      const hasAns = !!(quizState.answers[i]?.value?.trim());
                      const isCur  = i === quizState.index;
                      return (
                        <button key={i} onClick={() => quizJump(i)} title={`Q${i+1}${hasAns?' — answered':''}`} style={{
                          width:32,height:32,borderRadius:7,border:'none',cursor:'pointer',
                          fontSize:'0.72rem',fontWeight:700,transition:'all 0.15s',
                          background: isCur ? 'var(--accent)' : hasAns ? 'var(--green)' : 'var(--surface3)',
                          color: isCur || hasAns ? '#fff' : 'var(--text2)',
                          boxShadow: isCur ? '0 0 0 3px rgba(99,102,241,0.35)' : 'none',
                          transform: isCur ? 'scale(1.18)' : 'scale(1)',
                        }}>
                          {hasAns ? '✓' : i+1}
                        </button>
                      );
                    })}
                  </div>

                  {/* ── Question card ── */}
                  <div className="card task-card-animated" key={`quiz-q-${quizState.index}`}>
                    {/* Header badges */}
                    <div className="flex justify-between items-center mb-12" style={{flexWrap:'wrap',gap:8}}>
                      <div className="flex gap-8" style={{flexWrap:'wrap'}}>
                        <span className="badge badge-purple">{q.type?.toUpperCase()}</span>
                        {q.topic && <span className="badge badge-blue">{q.topic}</span>}
                        {q.difficulty && (
                          <span className={`badge badge-${q.difficulty==='easy'?'green':q.difficulty==='hard'?'red':'yellow'}`}>
                            {q.difficulty}
                          </span>
                        )}
                      </div>
                      {qSaved && (
                        <span className="badge badge-green">✔ Saved</span>
                      )}
                    </div>

                    {/* Question text */}
                    <div style={{fontSize:'1.05rem',fontWeight:600,lineHeight:1.55,marginBottom:18}}>
                      {q.question}
                    </div>

                    {/* ── MCQ options ── */}
                    {q.type === 'mcq' && q.options?.map((opt, oi) => {
                      const letter     = String.fromCharCode(65+oi);
                      const isSelected = qVal === letter;
                      return (
                        <button key={oi}
                          className={`option-btn${isSelected ? ' selected' : ''}`}
                          onClick={() => quizSetAnswer(letter)}>
                          <strong>{letter}.</strong> {opt}
                        </button>
                      );
                    })}

                    {/* ── Short / long answer ── */}
                    {(q.type === 'short' || q.type === 'long') && (
                      <textarea
                        value={qVal}
                        onChange={e => quizSetAnswer(e.target.value)}
                        placeholder="Type your answer here…"
                        rows={q.long_answer ? 8 : 3}
                      />
                    )}

                    {/* ── Coding answer ── */}
                    {q.type === 'coding' && (
                      <div>
                        <div style={{fontSize:'0.8rem',color:'var(--text2)',marginBottom:6}}>
                          💻 Write your code below:
                        </div>
                        <div className="code-editor" style={{padding:0}}>
                          <textarea
                            value={qVal}
                            onChange={e => quizSetAnswer(e.target.value)}
                            placeholder="# Write your solution here…"
                            style={{
                              width:'100%',minHeight:180,resize:'vertical',
                              background:'transparent',border:'none',outline:'none',
                              color:'#c9d1d9',fontFamily:"'Fira Code',monospace",
                              fontSize:'0.875rem',padding:14,
                            }}
                          />
                        </div>
                      </div>
                    )}

                    {/* ── Save answer button ── */}
                    <button
                      className={`btn ${qSaved ? 'btn-ghost' : 'btn-primary'} w-full mt-16`}
                      onClick={quizSaveAnswer}
                      disabled={q.type==='mcq' ? !qVal : !qVal?.trim()}>
                      {qSaved ? '✔ Answer Saved — Click to Re-save' : '✔ Save Answer'}
                    </button>

                    {/* ── Navigation row ── */}
                    <div style={{display:'flex',gap:8,marginTop:10}}>
                      <button className="btn btn-ghost" style={{flex:1}}
                        onClick={quizPrev} disabled={isFirst}>
                        ← Prev
                      </button>
                      {!isLast ? (
                        <button className="btn btn-ghost" style={{flex:1}}
                          onClick={quizNext}>
                          Next →
                        </button>
                      ) : (
                        <button className="btn btn-success" style={{flex:1}}
                          onClick={openQuizReview}>
                          🏁 Finish Quiz
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* ════════════════════════════════════════════════════════
                BRANCH B: NORMAL TASK MODE (only when quiz is inactive)
                ════════════════════════════════════════════════════════ */}
            {!quizState.active && (
              <>
                {/* Content shared with no task */}
                {contentShared && !currentTask && (
                  <div style={{marginBottom:16}}>
                    <div className="content-preview-enhanced">
                      <div className="content-preview-label">
                        <span>📄</span> {contentShared.name}
                        <button className="btn btn-ghost btn-sm" style={{marginLeft:'auto',padding:'2px 8px'}}
                          onClick={()=>setContentShared(null)}>✕</button>
                      </div>
                      {contentShared.type?.startsWith('image/')
                        ? <img src={`data:${contentShared.type};base64,${contentShared.data}`} alt="content"/>
                        : contentShared.type === 'application/pdf'
                          ? <iframe src={`data:application/pdf;base64,${contentShared.data}`} title={contentShared.name}/>
                          : <div style={{padding:24,textAlign:'center'}}>
                              <div style={{fontSize:'4rem',marginBottom:12}}>📕</div>
                              <div style={{fontWeight:600,marginBottom:8}}>{contentShared.name}</div>
                              <a href={`data:application/pdf;base64,${contentShared.data}`}
                                 target="_blank" download={contentShared.name}
                                 className="btn btn-primary">⬇ Open / Download PDF</a>
                            </div>
                      }
                    </div>
                  </div>
                )}

                {currentTask ? (
                  <div className="task-card-animated">
                    {contentShared && (
                      <div className="content-preview-enhanced" style={{marginBottom:12}}>
                        <div className="content-preview-label">
                          <span>📄</span> {contentShared.name}
                          <button className="btn btn-ghost btn-sm" style={{marginLeft:'auto',padding:'2px 8px'}}
                            onClick={()=>setContentShared(null)}>✕</button>
                        </div>
                        {contentShared.type?.startsWith('image/')
                          ? <img src={`data:${contentShared.type};base64,${contentShared.data}`} alt="content"/>
                          : <a href={`data:application/pdf;base64,${contentShared.data}`}
                               target="_blank" download={contentShared.name}
                               style={{display:'block',padding:'12px 14px',textAlign:'center',color:'var(--accent)'}}>
                               📕 Open PDF — {contentShared.name}
                             </a>
                        }
                      </div>
                    )}

                    {totalTasks > 0 && (
                      <div className="task-progress-bar" style={{marginBottom:8,borderRadius:4}}>
                        <div className="task-progress-fill" style={{width:`${Math.min(100,(taskIndex/totalTasks)*100)}%`}}/>
                      </div>
                    )}

                    <div id="student-tour-task-hint" className="card" key={currentTask.id}>
                      <div className="flex justify-between items-center mb-12" style={{flexWrap:'wrap',gap:8}}>
                        <div className="flex gap-8" style={{flexWrap:'wrap'}}>
                          <span className="badge badge-purple">{currentTask.type?.toUpperCase()}</span>
                          {currentTask.topic&&<span className="badge badge-blue">{currentTask.topic}</span>}
                          {currentTask.difficulty&&<span className={`badge badge-${currentTask.difficulty==='easy'?'green':currentTask.difficulty==='hard'?'red':'yellow'}`}>{currentTask.difficulty}</span>}
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          {!submitted && taskStartTime && (
                            <div className="task-time-spent">⏱ {fmtSecs(timeSpent)}</div>
                          )}
                          {currentTask.time_limit && !submitted && (
                            <TaskTimer limitSecs={currentTask.time_limit} onExpire={submitAnswer}/>
                          )}
                        </div>
                      </div>

                      <div style={{fontSize:'1.1rem',fontWeight:600,lineHeight:1.5,marginBottom:20}}>{currentTask.question}</div>

                      {currentTask.type==='mcq' && currentTask.options?.map((opt,i)=>{
                        const letter = String.fromCharCode(65+i);
                        let cls = 'option-btn';
                        if (!submitted && letter===selected) cls += ' selected';
                        if (submitted && result) {
                          if (letter === (result.correct_answer || currentTask.correct_answer)) cls += ' correct';
                          else if (letter === selected && !result.correct) cls += ' wrong';
                        }
                        return (
                          <button key={i} className={cls} disabled={submitted}
                            onClick={()=>!submitted&&setSelected(letter)}>
                            <strong>{letter}.</strong> {opt}
                            {submitted && result && letter === (result.correct_answer || currentTask.correct_answer) && <span style={{marginLeft:8,color:'var(--green)'}}>✓</span>}
                            {submitted && result && !result.correct && letter === selected && <span style={{marginLeft:8,color:'var(--red)'}}>✗</span>}
                          </button>
                        );
                      })}

                      {currentTask.type==='short' && (
                        <textarea value={shortAnswer} onChange={e=>setShortAnswer(e.target.value)}
                          disabled={submitted} placeholder="Type your answer here…"
                          rows={currentTask.long_answer ? 8 : 3}/>
                      )}

                      {currentTask.type==='coding' && (
                        <StudentCodeEditor
                          task={currentTask} sessionCode={sessionCode} studentId={studentId}
                          submitted={submitted} setSubmitted={setSubmitted}
                          result={result} setResult={setResult}
                          setAnsweredCount={setAnsweredCount} setCorrectCount={setCorrectCount}
                          setCodingSubmitted={setCodingSubmitted} setCodingScore={setCodingScore}
                          add={add}
                        />
                      )}

                      {!submitted && !hint && currentTask.type!=='coding' && (
                        <button className="btn btn-ghost btn-sm mt-8" onClick={requestHint}>💡 Request Hint</button>
                      )}
                      {hint && (
                        <div style={{background:'rgba(234,179,8,0.1)',border:'1px solid var(--yellow)',
                          borderRadius:8,padding:10,marginTop:8,fontSize:'0.875rem'}}>
                          💡 <strong>Hint:</strong> {hint}
                        </div>
                      )}

                      {submitted && result && (
                        <div style={{marginTop:14,borderRadius:10,padding:'14px 16px',
                          background: result.correct ? 'rgba(34,197,94,0.12)' : 'rgba(239,68,68,0.12)',
                          border: `1px solid ${result.correct ? 'var(--green)' : 'var(--red)'}` }}>
                          <div style={{fontWeight:700,fontSize:'1rem',color: result.correct ? 'var(--green)' : 'var(--red)'}}>
                            {result.correct ? '✅ Correct! +'+result.score+' pts' : '❌ Wrong'}
                          </div>
                          {!result.correct && currentTask.type==='mcq' && (result.correct_answer || currentTask.correct_answer) && (
                            <div style={{marginTop:10,padding:'8px 12px',borderRadius:8,
                              background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.4)',fontSize:'0.875rem'}}>
                              ✅ <strong>Correct answer: {result.correct_answer || currentTask.correct_answer}.</strong>{' '}
                              {currentTask.options?.[(result.correct_answer || currentTask.correct_answer).charCodeAt(0)-65] || ''}
                            </div>
                          )}
                          {(currentTask.type==='short' || currentTask.type==='long') && (result.correct_answer || currentTask.correct_answer) && (
                            <div style={{marginTop:10,padding:'8px 12px',borderRadius:8,
                              background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.4)',fontSize:'0.875rem'}}>
                              <div style={{fontSize:'0.75rem',fontWeight:700,color:'var(--green)',marginBottom:4}}>MODEL ANSWER</div>
                              {result.correct_answer || currentTask.correct_answer}
                            </div>
                          )}
                        </div>
                      )}

                      {!submitted && currentTask.type!=='coding' && (
                        <button className="btn btn-primary w-full mt-16"
                          onClick={submitAnswer}
                          disabled={currentTask.type==='mcq'?!selected:!shortAnswer.trim()}>
                          Submit Answer
                        </button>
                      )}
                    </div>
                  </div>
                ) : (
                  !contentShared && (
                    <div className="card text-center" style={{padding:40}}>
                      <div style={{fontSize:'3rem',marginBottom:12}}>⏳</div>
                      <div style={{fontWeight:600,marginBottom:8}}>Waiting for next task</div>
                      <div className="text-muted text-sm">Your teacher will send a task soon.</div>
                    </div>
                  )
                )}
              </>
            )}

            {/* ── Leaderboard (always visible) ── */}
            <StudentLeaderboard sessionCode={sessionCode} studentId={studentId}
              codingLeaderboard={codingLeaderboard} studentName={studentName}/>
          </div>
        )}

        {/* TEST PAGE */}
        {sPage==='test' && (

//  PDF UTILITIES  (Features 1, 7, 8)
// ═════════════════════════════════════════════════════════════════
function generateQuestionsPDF(tasks, opts = {}) {
  const { title = 'Question Bank', showAnswers = true, shuffle = false } = opts;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 190, ML = 10, lh = 7;
  let y = 15;

  function checkPage(need = 20) {
    if (y + need > 280) { doc.addPage(); y = 15; }
  }

  // Title
  doc.setFontSize(18); doc.setFont('helvetica', 'bold');
  doc.text(title, ML, y); y += 10;
  doc.setFontSize(9); doc.setFont('helvetica', 'normal');
  doc.setTextColor(120);
  doc.text(`Generated by ClassMind  •  ${new Date().toLocaleDateString()}  •  ${tasks.length} question(s)`, ML, y);
  doc.setTextColor(0); y += 8;
  doc.setDrawColor(180); doc.line(ML, y, ML + W, y); y += 6;

  let list = shuffle ? [...tasks].sort(() => Math.random() - 0.5) : [...tasks];

  list.forEach((t, i) => {
    checkPage(30);
    // Question number + type badge
    doc.setFontSize(10); doc.setFont('helvetica', 'bold');
    const meta = [t.topic, t.difficulty].filter(Boolean).join(' · ');
    doc.text(`Q${i + 1}.  [${(t.type || 'mcq').toUpperCase()}]${meta ? '  ' + meta : ''}`, ML, y);
    y += lh;

    // Question text (wrapped)
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
    const qLines = doc.splitTextToSize(t.question || '', W - 8);
    qLines.forEach(line => { checkPage(); doc.text(line, ML + 4, y); y += lh; });

    // Options
    if (t.type === 'mcq' && t.options) {
      t.options.forEach((opt, j) => {
        const letter = String.fromCharCode(65 + j);
        const isCorrect = showAnswers && letter === t.correct_answer;
        doc.setFont('helvetica', isCorrect ? 'bold' : 'normal');
        if (isCorrect) doc.setTextColor(34, 197, 94);
        const optLines = doc.splitTextToSize(`${letter}. ${opt}`, W - 16);
        checkPage();
        optLines.forEach(l => { doc.text(l, ML + 8, y); y += lh; });
        doc.setTextColor(0); doc.setFont('helvetica', 'normal');
      });
    }

    // Correct answer for short/long
    if (showAnswers && (t.type === 'short' || t.type === 'long') && t.correct_answer) {
      checkPage(12);
      doc.setTextColor(34, 197, 94); doc.setFont('helvetica', 'italic'); doc.setFontSize(9);
      const aLines = doc.splitTextToSize('✓ Model Answer: ' + t.correct_answer, W - 8);
      aLines.forEach(l => { doc.text(l, ML + 4, y); y += 6; });
      doc.setTextColor(0); doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
    }
    y += 4; // gap between questions
    checkPage(2);
    doc.setDrawColor(230); doc.line(ML, y, ML + W, y); y += 5;
  });

  return doc;
}

function generateStudentReportPDF(studentName, tasks, testAnswers) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 190, ML = 10, lh = 7;
  let y = 15;

  function checkPage(need = 20) {
    if (y + need > 280) { doc.addPage(); y = 15; }
  }

  doc.setFontSize(18); doc.setFont('helvetica', 'bold');
  doc.text('Student Test Report', ML, y); y += 9;
  doc.setFontSize(10); doc.setFont('helvetica', 'normal'); doc.setTextColor(120);
  doc.text(`Student: ${studentName}  •  Date: ${new Date().toLocaleDateString()}`, ML, y);
  doc.setTextColor(0); y += 7;

  let correct = 0, total = tasks.length;
  tasks.forEach((t, i) => {
    checkPage(35);
    const studentAns = testAnswers[t.id] || '(No answer)';
    const isCorrect = t.correct_answer && studentAns.trim().toUpperCase() === t.correct_answer.trim().toUpperCase();
    if (isCorrect) correct++;

    doc.setFontSize(10); doc.setFont('helvetica', 'bold');
    doc.text(`Q${i + 1}. ` + (isCorrect ? '✓ CORRECT' : '✗ WRONG'), ML, y);
    y += lh;

    doc.setFont('helvetica', 'normal');
    const qLines = doc.splitTextToSize(t.question || '', W - 4);
    qLines.forEach(l => { checkPage(); doc.text(l, ML + 2, y); y += lh; });

    doc.setFont('helvetica', 'italic'); doc.setFontSize(9);
    doc.setTextColor(isCorrect ? 34 : 239, isCorrect ? 197 : 68, isCorrect ? 94 : 68);
    doc.text('Your answer: ' + studentAns, ML + 4, y); y += 6;
    doc.setTextColor(34, 197, 94);
    doc.text('Correct answer: ' + (t.correct_answer || 'N/A'), ML + 4, y); y += 6;
    doc.setTextColor(0); doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
    y += 3;
    doc.setDrawColor(210); doc.line(ML, y, ML + W, y); y += 5;
  });

  // Summary
  checkPage(20);
  doc.setFontSize(12); doc.setFont('helvetica', 'bold');
  doc.text(`Score: ${correct} / ${total} (${total ? Math.round(correct / total * 100) : 0}%)`, ML, y);

  return doc;
}

// ═════════════════════════════════════════════════════════════════
//  EXCEL → CSV CONVERTER  (Feature 3)
// ═════════════════════════════════════════════════════════════════
function ExcelToCSV() {
  const [fileName, setFileName] = useState('');
  const [status, setStatus] = useState('');
  const { add } = useContext(AppCtx);

  function handleFile(file) {
    if (!file) return;
    if (!file.name.match(/\.(xlsx|xls)$/i)) return add('Please upload an .xlsx or .xls file','error');
    setFileName(file.name);
    setStatus('Reading…');
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const XLSX = window.XLSX;
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const csv = XLSX.utils.sheet_to_csv(ws);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = file.name.replace(/\.(xlsx|xls)$/i, '.csv'); a.click();
        URL.revokeObjectURL(url);
        setStatus('✅ Converted & downloaded!');
        add('Excel → CSV converted successfully','success');
      } catch (err) {
        setStatus('❌ Conversion failed'); add('Conversion failed: ' + err.message, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  return (
    <div className="card" style={{marginTop:16}}>
      <div className="card-title">📊 Excel → CSV Converter</div>
      <div className="excel-drop"
        onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}}
        onDragOver={e=>e.preventDefault()}>
        <div style={{fontSize:'2rem',marginBottom:6}}>📋</div>
        <div className="text-sm text-muted">Drop .xlsx / .xls here, or click to browse</div>
        {fileName && <div className="text-sm" style={{marginTop:6,color:'var(--accent)',fontWeight:600}}>{fileName}</div>}
        {status && <div className="text-sm mt-8" style={{color:status.includes('✅')?'var(--green)':'var(--red)'}}>{status}</div>}
        <input type="file" accept=".xlsx,.xls" style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}
          onChange={e=>handleFile(e.target.files[0])}/>
      </div>
      <div className="text-xs text-muted mt-8">Converts first sheet. No data leaves your browser.</div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  QUIZ STUDIO  (Unified Quiz Builder + Organiser)
// ═════════════════════════════════════════════════════════════════
const QUIZ_STUDIO_TABS = ['build', 'organise', 'preview'];

const EMPTY_STUDIO_Q = {
  question:'', type:'mcq', options:['','','',''],
  correct_answer:'', hint:'', topic:'', difficulty:'medium',
};

function QuizStudio({ tasks, sessionCode, sessionStatus, loadTasks, saveTask, onSendQuiz }) {
  const [studioTab, setStudioTab] = useState('build');
  // Build tab state
  const [buildItems, setBuildItems] = useState([{ ...EMPTY_STUDIO_Q }]);
  const [buildType, setBuildType] = useState('mcq'); // mcq | short | long | coding
  const [saving, setSaving] = useState(false);
  // Organise tab state
  const [selected, setSelected] = useState([]);
  const [showPDF, setShowPDF] = useState(false);
  const [sending, setSending] = useState(false);
  // AI generation within Studio
  const [aiLoading, setAiLoading] = useState(false);
  const [aiTopic, setAiTopic] = useState('');
  const [aiCount, setAiCount] = useState(3);
  const { add } = useContext(AppCtx);

  // ── Build helpers ──────────────────────────────────────────────
  function addBuildItem() {
    setBuildItems(q => [...q, { ...EMPTY_STUDIO_Q, type: buildType }]);
  }
  function removeBuildItem(i) {
    setBuildItems(q => q.filter((_, j) => j !== i));
  }
  function updateBuildItem(i, patch) {
    setBuildItems(q => q.map((item, j) => j === i ? { ...item, ...patch } : item));
  }
  function setOpt(qi, oi, v) {
    setBuildItems(q => q.map((item, i) => {
      if (i !== qi) return item;
      const opts = [...(item.options || ['','','',''])];
      opts[oi] = v;
      return { ...item, options: opts };
    }));
  }
  function moveBuildItem(i, dir) {
    setBuildItems(q => {
      const arr = [...q];
      const to = i + dir;
      if (to < 0 || to >= arr.length) return arr;
      [arr[i], arr[to]] = [arr[to], arr[i]];
      return arr;
    });
  }
  function duplicateBuildItem(i) {
    setBuildItems(q => {
      const arr = [...q];
      arr.splice(i + 1, 0, { ...arr[i] });
      return arr;
    });
  }

  async function saveAll() {
    const valid = buildItems.filter(q => q.question.trim());
    if (!valid.length) return add('Add at least one question', 'error');
    setSaving(true);
    try {
      for (const q of valid) {
        await saveTask({
          ...q,
          type: q.type || 'mcq',
          hint_visibility: 'on_request',
          time_limit: '',
          long_answer: q.type === 'long',
        });
      }
      add(`✅ ${valid.length} question${valid.length > 1 ? 's' : ''} saved to task list!`, 'success');
      loadTasks();
      setBuildItems([{ ...EMPTY_STUDIO_Q }]);
      setStudioTab('organise');
    } catch(e) { add(e.message, 'error'); }
    setSaving(false);
  }

  // ── AI generation inside Studio ────────────────────────────────
  async function aiGenerate() {
    if (!aiTopic.trim()) return add('Enter a topic first', 'error');
    setAiLoading(true);
    const apiKey = localStorage.getItem('cm_gemini_key') || '';
    try {
      let generated = [];
      if (apiKey) {
        const typeMap = {mcq:'mcq', short:'short answer', long:'long answer/essay', coding:'coding/programming'};
        const prompt = `Generate ${aiCount} ${typeMap[buildType]} questions about "${aiTopic}".
Return ONLY a JSON array. Each object: {"type":"${buildType}","question":"...","options":["A text","B text","C text","D text"],"correct_answer":"A","hint":"...","difficulty":"easy|medium|hard"}.
For non-MCQ types, omit options. No markdown, just raw JSON.`;
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`,
            "HTTP-Referer": window.location.origin,
            "X-Title": "ClassMind AI"
          },
          body: JSON.stringify({ model: "openai/gpt-4o-mini", messages: [{ role:"user", content:prompt }] })
        });
        const data = await res.json();
        const text = data?.choices?.[0]?.message?.content || '[]';
        generated = JSON.parse(text.replace(/```json|```/g,'').trim());
        add(`⚡ Generated ${generated.length} questions!`, 'success');
      } else {
        await new Promise(r => setTimeout(r, 700));
        generated = Array.from({ length: aiCount }, (_, i) => ({
          type: buildType, difficulty: 'medium',
          question: `[${buildType.toUpperCase()} ${i+1}] Sample question about ${aiTopic}`,
          options: buildType === 'mcq' ? [`${aiTopic} option A`, `${aiTopic} option B`, 'Option C', 'Option D'] : [],
          correct_answer: buildType === 'mcq' ? 'A' : `Expected answer about ${aiTopic}`,
          hint: `Think about core aspects of ${aiTopic}`,
        }));
        add('Using mock data — add an AI key for real AI questions', 'info');
      }
      setBuildItems(prev => [...prev.filter(q => q.question.trim()), ...generated.map(q => ({
        ...EMPTY_STUDIO_Q, ...q,
        options: q.options?.length ? q.options : ['','','',''],
      }))]);
    } catch(e) {
      add('Generation failed: ' + e.message, 'error');
    }
    setAiLoading(false);
  }

  // ── Organise helpers ───────────────────────────────────────────
  function toggleTask(task) {
    if (selected.find(t => t.id === task.id))
      setSelected(s => s.filter(t => t.id !== task.id));
    else
      setSelected(s => [...s, task]);
  }
  function moveUp(i) { if (i===0) return; setSelected(s=>{const a=[...s];[a[i-1],a[i]]=[a[i],a[i-1]];return a;}); }
  function moveDown(i) { if (i===selected.length-1) return; setSelected(s=>{const a=[...s];[a[i],a[i+1]]=[a[i+1],a[i]];return a;}); }
  function shuffle() { setSelected(s=>[...s].sort(()=>Math.random()-0.5)); }

  async function sendQuiz() {
    if (!selected.length) return add('Select at least one task','error');
    if (sessionStatus !== 'active') return add('▶ Start session first','error');
    setSending(true);
    try {
      // Try batch quiz endpoint first (new behavior: delivers all at once)
      const batchRes = await fetch(`${API}/api/session/${sessionCode}/quiz/send`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ task_ids: selected.map(t => t.id), target_type:'all', target_id:'all' })
      });
      if (batchRes.ok) {
        add(`✅ Quiz sent — ${selected.length} questions delivered as a full quiz`,'success');
        setSending(false);
        if (onSendQuiz) onSendQuiz();
        return;
      }
    } catch {}
    // Fallback: send sequentially (backward compat) with a small delay
    for (const t of selected) {
      try {
        await fetch(`${API}/api/session/${sessionCode}/tasks/send`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({task_id:t.id,target_type:'all',target_id:'all'})
        });
        await new Promise(r=>setTimeout(r,300));
      } catch(e) { add('Send failed: '+e.message,'error'); setSending(false); return; }
    }
    add(`✅ Quiz sent — ${selected.length} tasks delivered in order`,'success');
    setSending(false);
    if (onSendQuiz) onSendQuiz();
  }

  const TYPE_LABELS = {mcq:'🔘 MCQ', short:'✍️ Short Answer', long:'📄 Long Answer', coding:'💻 Coding'};

  return (
    <div>
      {/* ── Studio header ── */}
      <div className="card" style={{marginBottom:16,background:'linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.08))',border:'1px solid rgba(99,102,241,0.3)'}}>
        <div className="flex justify-between items-center" style={{flexWrap:'wrap',gap:12}}>
          <div>

// ═════════════════════════════════════════════════════════════════
//  QUIZ ORGANISER  (Feature 4 — kept for backward-compat, used by QuizStudio)
// ═════════════════════════════════════════════════════════════════
function QuizOrganiser({ tasks, sessionCode, sessionStatus, onSendQuiz }) {
  const [selected, setSelected] = useState([]); // ordered list of task objects
  const [showPDF, setShowPDF] = useState(false);
  const { add } = useContext(AppCtx);

  function toggle(task) {
    if (selected.find(t => t.id === task.id))
      setSelected(s => s.filter(t => t.id !== task.id));
    else
      setSelected(s => [...s, task]);
  }

  function moveUp(i) {
    if (i === 0) return;
    setSelected(s => { const n = [...s]; [n[i-1], n[i]] = [n[i], n[i-1]]; return n; });
  }
  function moveDown(i) {
    if (i === selected.length - 1) return;
    setSelected(s => { const n = [...s]; [n[i], n[i+1]] = [n[i+1], n[i]]; return n; });
  }

  function shuffle() {
    setSelected(s => [...s].sort(() => Math.random() - 0.5));
  }

  async function sendQuiz() {
    if (!selected.length) return add('Select at least one task','error');
    if (sessionStatus !== 'active') return add('▶ Start the session first','error');
    // Try batch quiz endpoint first
    try {
      const batchRes = await fetch(`${API}/api/session/${sessionCode}/quiz/send`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ task_ids: selected.map(t => t.id), target_type:'all', target_id:'all' })
      });
      if (batchRes.ok) {
        add(`✅ Quiz sent — ${selected.length} questions as a full quiz`, 'success');
        if (onSendQuiz) onSendQuiz();
        return;
      }
    } catch {}
    // Fallback: sequential send
    for (const t of selected) {
      try {
        await sendTaskRequest(sessionCode, t.id, 'all', 'all');
        await new Promise(r => setTimeout(r, 300));
      } catch (e) { add('Send failed: ' + e.message, 'error'); return; }
    }
    add(`✅ Quiz sent — ${selected.length} tasks delivered in order`, 'success');
    if (onSendQuiz) onSendQuiz();
  }

  return (
    <div className="card" style={{marginTop:16}}>
      <div className="section-header" style={{marginBottom:12}}>
        <div className="card-title" style={{marginBottom:0}}>🎯 Quiz Builder</div>
        <div className="flex gap-8">
          {selected.length > 0 && (
            <>
              <button className="btn btn-ghost btn-sm" onClick={shuffle}>🔀 Shuffle</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowPDF(true)}>📄 PDF</button>
              <button className="btn btn-success btn-sm" onClick={sendQuiz}
                disabled={sessionStatus !== 'active'}>📤 Send Quiz</button>
            </>
          )}
        </div>
      </div>

      <div className="grid grid-2" style={{gap:12}}>
        {/* Left: task picker */}
        <div>
          <div className="text-sm text-muted mb-8">Select tasks to include:</div>
          {tasks.length === 0 && <div className="text-muted text-sm">No tasks yet.</div>}
          {tasks.map(t => {
            const inQuiz = !!selected.find(s => s.id === t.id);
            return (
              <div key={t.id}
                onClick={() => toggle(t)}
                style={{
                  display:'flex',alignItems:'center',gap:10,padding:'8px 12px',
                  borderRadius:8,marginBottom:5,cursor:'pointer',
                  border:`2px solid ${inQuiz ? 'var(--accent)' : 'var(--border)'}`,
                  background: inQuiz ? 'rgba(99,102,241,0.1)' : 'var(--surface2)',
                  transition:'all 0.15s',
                }}>
                <span style={{fontSize:'1rem'}}>{inQuiz ? '☑' : '☐'}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'0.85rem',fontWeight:500,overflow:'hidden',
                    textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.question}</div>
                  <div className="text-xs text-muted">{t.type} {t.topic ? '· '+t.topic : ''}</div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Right: ordered list */}
        <div>
          <div className="text-sm text-muted mb-8">Quiz order ({selected.length} tasks):</div>
          {selected.length === 0 && (
            <div className="text-muted text-sm" style={{padding:'20px 0',textAlign:'center'}}>
              ← Select tasks to add them here
            </div>
          )}
          {selected.map((t, i) => (
            <div key={t.id} className="quiz-order-item">
              <div style={{width:22,height:22,borderRadius:6,background:'var(--accent)',
                color:'#fff',fontWeight:700,fontSize:'0.75rem',display:'flex',alignItems:'center',
                justifyContent:'center',flexShrink:0}}>{i+1}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:'0.82rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.question}</div>
                <div className="text-xs text-muted">{t.type}</div>
              </div>
              <div className="quiz-order-btns">
                <button onClick={e=>{e.stopPropagation();moveUp(i)}} disabled={i===0}>▲</button>
                <button onClick={e=>{e.stopPropagation();moveDown(i)}} disabled={i===selected.length-1}>▼</button>
              </div>
              <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:'0.8rem'}}
                onClick={e=>{e.stopPropagation();setSelected(s=>s.filter((_,j)=>j!==i))}}>✕</button>
            </div>
          ))}
        </div>
      </div>

      {showPDF && <PDFOptionsModal tasks={selected} title="Quiz" onClose={()=>setShowPDF(false)}/>}
    </div>
  );
}
