//  CODING PERFORMANCE WIDGETS  (Feature 1 / 7)
// ═════════════════════════════════════════════════════════════════
function CodingPerformanceStat({ sessionCode }) {
  const [data, setData] = useState(null);
  useEffect(() => {
    let alive = true;
    async function load() {
      try {
        const r = await apiFetch(`/api/session/${sessionCode}/coding-analytics`);
        if (alive) setData(r);
      } catch {}
    }
    load();
    const id = setInterval(load, 10000);
    return () => { alive = false; clearInterval(id); };
  }, [sessionCode]);
  const avg = data?.avg_coding_score ?? 0;
  const count = data?.submissions_count ?? 0;
  return (
    <div className="stat">
      <div className="stat-value" style={{backgroundImage:'linear-gradient(135deg,#6366f1,#8b5cf6)'}}>
        {avg}%
      </div>
      <div className="stat-label">💻 Coding Perf.</div>
      <div className="text-xs text-muted" style={{marginTop:4}}>{count} submission{count!==1?'s':''}</div>
    </div>
  );
}

function CodingPerformanceBar({ sessionCode }) {
  const [data, setData] = useState(null);
  useEffect(() => {
    let alive = true;
    async function load() {
      try {
        const r = await apiFetch(`/api/session/${sessionCode}/coding-analytics`);
        if (alive) setData(r);
      } catch {}
    }
    load();
    const id = setInterval(load, 10000);
    return () => { alive = false; clearInterval(id); };
  }, [sessionCode]);
  if (!data || data.submissions_count === 0) return null;
  const avg = data.avg_coding_score ?? 0;
  const barColor = avg >= 70 ? 'green' : avg >= 40 ? 'yellow' : 'red';
  const topCoders = data.top_coders || [];
  return (
    <div className="card" style={{marginBottom:16}}>
      <div className="card-title">💻 Coding Performance</div>
      <div className="flex justify-between text-sm" style={{marginBottom:6}}>
        <span>Avg Score</span>
        <span className="font-bold">{avg}%</span>
      </div>
      <div className="progress-bar" style={{height:14,marginBottom:10}}>
        <div className={`progress-fill ${barColor}`} style={{width:`${avg}%`}}/>
      </div>
      <div className="flex justify-between text-sm text-muted">
        <span>📤 {data.submissions_count} submitted</span>
        {topCoders[0] && <span>🏆 {topCoders[0].name}: {topCoders[0].coding_score}%</span>}
      </div>
    </div>
  );
}

function TypewriterBanner({ teacherName }) {
  const [text, setText] = React.useState("");
  const [index, setIndex] = React.useState(0);
  const [charIndex, setCharIndex] = React.useState(0);
  const [isDeleting, setIsDeleting] = React.useState(false);

  const texts = React.useMemo(() => [
    `Welcome ${teacherName}`,
    `Ready To Teach, ${teacherName}?`,
    `Your Classroom...Your Control...`,
    `Teaching made intelligent 🧠`,
    `Command the class like a pro`
  ], [teacherName]);

  React.useEffect(() => {
    const typingSpeed = isDeleting ? 40 : 80;
    const pauseTime = 1200;

    const current = texts[index];

    const timeout = setTimeout(() => {
      if (!isDeleting) {
        setText(current.substring(0, charIndex + 1));
        setCharIndex(c => c + 1);

        if (charIndex + 1 === current.length) {
          setIsDeleting(true);
        }
      } else {
        setText(current.substring(0, charIndex - 1));
        setCharIndex(c => c - 1);

        if (charIndex - 1 === 0) {
          setIsDeleting(false);
          setIndex(i => (i + 1) % texts.length);
        }
      }
    }, charIndex === current.length ? pauseTime : typingSpeed);

    return () => clearTimeout(timeout);
  }, [charIndex, isDeleting, index, texts]);

  return (
    <div style={{
      textAlign: "center",
      fontSize: "28px",
      fontWeight: "600",
      margin: "20px 0 10px",
      background: "linear-gradient(90deg, #38bdf8, #818cf8, #f472b6)",
      WebkitBackgroundClip: "text",
      WebkitTextFillColor: "transparent"
    }}>
      {text}
      <span style={{
        display: "inline-block",
        width: "3px",
        height: "28px",
        background: "#38bdf8",
        marginLeft: "6px",
        animation: "blink 1s infinite"
      }} />
    </div>
  );
}

// ── Main AI generator ─────────────────────────────────────────────
function AIQuestionGenerator({ onAdd }) {
  const [topic, setTopic]     = useState('');
  const [qType, setQType]     = useState('mcq');  // mcq | short | long
  const [count, setCount]     = useState(4);
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState([]);     // editable drafts
  const [apiKey, setApiKey]   = useState(localStorage.getItem('cm_gemini_key')||'');
  const { add } = useContext(AppCtx);

  function updateResult(idx, updated) {
    setResults(r => r.map((q,i) => i===idx ? updated : q));
  }
  function discardResult(idx) {
    setResults(r => r.filter((_,i) => i!==idx));
  }

  async function generate() {
  if (!topic.trim()) return add('Enter a topic first','error');
  setLoading(true); setResults([]);

  try {
    if (apiKey) {
      const promptMap = {
        mcq: `Generate ${count} multiple-choice questions about "${topic}".
Return ONLY a JSON array. Each object must have:
{"type":"mcq","question":"...","options":["A text","B text","C text","D text"],"correct_answer":"A","hint":"...","difficulty":"easy|medium|hard"}.
No markdown, no explanation, just the raw JSON array.`,
        short: `Generate ${count} short-answer questions about "${topic}".
Return ONLY a JSON array. Each object:
{"type":"short","question":"...","correct_answer":"concise expected answer","hint":"...","difficulty":"easy|medium|hard"}.
No markdown, no explanation, just the raw JSON array.`,
        long: `Generate ${count} long-answer/essay questions about "${topic}".
Return ONLY a JSON array. Each object:
{"type":"long","question":"...","correct_answer":"detailed model answer","hint":"key points to cover","difficulty":"medium|hard"}.
No markdown, no explanation, just the raw JSON array.`,
      };

      // ✅ CHANGED: OpenRouter API
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`,
          "HTTP-Referer": window.location.origin,
          "X-Title": "ClassMind AI"

        body: JSON.stringify({
          model: "openai/gpt-4o-mini",

            { role: "user", content: promptMap[qType] }

      const data = await res.json();

    } else {

      const mocks = {
        mcq: Array.from({length:count},(_,i)=>({
          type:'mcq',
          question:`[MCQ ${i+1}] Which statement about ${topic} is correct?`,
          options:[`${topic} definition A`,`${topic} definition B`,`Unrelated option C`,`Wrong option D`],
          correct_answer:'A', hint:`Think about core properties of ${topic}`, difficulty:'medium',
        })),
        short: Array.from({length:count},(_,i)=>({
          type:'short',
          question:`[Short ${i+1}] In one sentence, explain ${topic}.`,
          correct_answer:`${topic} is a concept that involves key aspects relevant to the subject.`,
          hint:`Focus on the main definition`, difficulty:'easy',
        })),
        long: Array.from({length:count},(_,i)=>({
          type:'long',
          question:`[Essay ${i+1}] Discuss the significance of ${topic} in detail.`,
          correct_answer:`A comprehensive answer should cover: 1) Definition of ${topic}, 2) Key characteristics, 3) Real-world applications, 4) Limitations or challenges.`,
          hint:`Cover definition, characteristics, applications, and limitations`, difficulty:'hard',
        })),
      };
      setResults(mocks[qType]);
      add('Using mock data — add an AI API key for real AI questions','info');
    }

  } catch(e) {
    add(`Generation failed: ${e.message}`,'error');
  }

  setLoading(false);
}
  const typeLabels = {mcq:'🔘 MCQ', short:'✍️ Short Answer', long:'📄 Long Answer'};

            </div>
            <div className="flex gap-8">
              <button className="btn btn-ghost btn-sm" onClick={()=>setResults([])}>Clear all</button>
              <button className="btn btn-success btn-sm"
                onClick={async ()=>{ for(const q of results) await onAdd(q); setResults([]); add(`Added ${results.length} questions`,'success'); }}>
                ✚ Add All
              </button>
            </div>
          </div>
          {results.map((q,i)=>(
            <AIQuestionEditor key={i} q={q} idx={i}
              onChange={updateResult}
              onAdd={q=>{ onAdd(q); discardResult(i); }}
              onDiscard={discardResult}/>
          ))}
        </div>
      )}
    </div>
  );
}

  "starter_code": "Python starter code with a function stub and a sample print() call"
}
No markdown fences, no explanation. Raw JSON only.`;

//  TASK MANAGEMENT PAGE  (rebuilt)

function TaskManagementPage({ sessionCode, tasks, setTasks, loadTasks, groups, roster, sessionStatus }) {
  // top-level tab: list | create | quiz | ai | upload
  const [tab, setTab]         = useState('list');
  const [form, setForm]       = useState({...EMPTY_FORM});
  const [loading, setLoading] = useState(false);
  const [uploadFile, setUploadFile] = useState(null);
  // quiz builder: array of form objects
  const [quizItems, setQuizItems] = useState([]);
  const [quizSaving, setQuizSaving] = useState(false);


  // ── helpers ──────────────────────────────────────────────────
  const resetForm = () => setForm({...EMPTY_FORM});
  const setOpt    = (i,v) => { const o=[...form.options]; o[i]=v; setForm(f=>({...f,options:o})); };
const { add } = useContext(AppCtx);

  // ── save one task to backend ──────────────────────────────────
  async function saveTask(f) {
    const payload = {
      session_code:    sessionCode,
      question:        f.question.trim(),
      type:            f.type,
      options:         f.type==='mcq' ? f.options.filter(o=>o.trim()) : [],
      correct_answer:  f.correct_answer || '',
      topic:           f.topic || 'General',
      difficulty:      f.difficulty,
      hint:            f.hint || null,
      hint_visibility: f.hint_visibility,
      time_limit:      f.time_limit ? parseInt(f.time_limit) : null,
      long_answer:     !!f.long_answer,
    };
    return await apiFetch('/api/tasks/create', {method:'POST', body:payload});
  }

  async function createTask() {
    if (!form.question.trim())              return add('Enter a question','error');
    if (form.type==='mcq' && !form.correct_answer) return add('Select the correct answer','error');
    if (form.type==='mcq' && form.options.filter(o=>o.trim()).length < 2)
                                            return add('Add at least 2 options','error');
    setLoading(true);
    try {
      const task = await saveTask(form);
      add('Task saved ✓','success');
      resetForm();
      loadTasks();
      setTab('list');
      return task;
    } catch(e) {
      add(e.message,'error');
    } finally {
      setLoading(false);
    }
  }

  // ── send next task ────────────────────────────────────────────
  async function sendNextTask() {
    if (sessionStatus !== 'active') { add('▶ Start the session first to enable actions','error'); return; }
    try {
      await apiFetch(`/api/session/${sessionCode}/tasks/send_current`, {method:'POST'});
      add('Task sent to students','success');
    } catch(e) { add(e.message,'error'); }
  }

  async function deleteTask(id) {
    try { await apiFetch(`/api/session/${sessionCode}/tasks/${id}`, {method:'DELETE'}); loadTasks(); }
    catch {}
  }

  const [sendingTaskId, setSendingTaskId] = useState(null);

  // ── upload JSON ───────────────────────────────────────────────
  async function uploadJSON() {
    if (!uploadFile) return add('Select a JSON file','error');
    const fd = new FormData();
    fd.append('session_code', sessionCode);
    fd.append('file', uploadFile);
    setLoading(true);
    try {
      const r = await fetch(`${API}/api/tasks/upload_json`, {method:'POST', body:fd});
      const d = await r.json();
      add(`Imported ${d.created} tasks ✓`,'success');
      loadTasks(); setUploadFile(null); setTab('list');
    } catch { add('Upload failed','error'); }
    setLoading(false);
  }

  // ── quiz builder ──────────────────────────────────────────────
  const addQuizItem = () => setQuizItems(q=>[...q, {
    question:'', options:['','','',''], correct_answer:'', hint:'', difficulty:'medium', topic:''
  }]);
  const setQuizOpt = (qi,oi,v) => setQuizItems(q=>q.map((item,i)=>i===qi?{...item,options:item.options.map((o,j)=>j===oi?v:o)}:item));
  const removeQuizItem = (qi) => setQuizItems(q=>q.filter((_,i)=>i!==qi));

  async function saveQuiz() {
    const valid = quizItems.filter(q=>q.question.trim()&&q.correct_answer);
    if (!valid.length) return add('Add at least one complete question','error');
    setQuizSaving(true);
    try {
      for (const q of valid) await saveTask({...q, type:'mcq', hint_visibility:'on_request', time_limit:''});
      add(`Quiz saved — ${valid.length} questions added ✓`,'success');
      setQuizItems([]); loadTasks(); setTab('list');
    } catch(e) { add(e.message,'error'); }
    setQuizSaving(false);
  }

  // ── AI add handler ────────────────────────────────────────────
  async function addAIQuestion(q) {
    try {
      await saveTask({
        question: q.question, type:'mcq',
        options: q.options||['A','B','C','D'], correct_answer: q.correct_answer||'A',
        hint: q.hint||'', hint_visibility:'on_request', difficulty:'medium', topic:'', time_limit:'',
      });
      add('Question added ✓','success'); loadTasks();
    } catch(e) { add(e.message,'error'); }
  }

  // ── send targeting info ──────────────────────────────────────────────────
  const activeStudents = roster?.active || [];
  const groupList      = groups || [];
  const [showPDFModal,   setShowPDFModal]   = useState(false);

  // ── per-card dropdown state ──────────────────────────────────────────────
  const [openDropdown, setOpenDropdown] = useState({});

  // ── recently sent tasks (visual feedback) ────────────────────────────────
  const [sentTaskIds, setSentTaskIds] = useState(new Set());

  function markSent(id) {
    setSentTaskIds(s => { const n=new Set(s); n.add(id); return n; });
    setTimeout(() => setSentTaskIds(s => { const n=new Set(s); n.delete(id); return n; }), 2500);
  }

  // ════ TASK SENDING — SINGLE SOURCE OF TRUTH ════════════════════════════
  //
  //   sendTask(taskId, targetType, targetId)  ← ONE send path
  //     targetType: "all" | "student" | "group"
  //     targetId  : required for student/group, omit for all
  //
  //   createTask()               ← validate + POST /api/tasks/create
  //   createAndSendTask(tt, ti)  ← createTask → sendTask in one click
  // ════════════════════════════════════════════════════════════════════════

  async function sendTask(taskId, targetType, targetId = null) {
    if (!taskId) { add('Cannot send — no task ID', 'error'); return; }
    if (sessionStatus !== 'active') {
      add('▶ Start the session first to send tasks', 'error');
      return;
    }
    // Normalise target before hitting the API
    const resolvedType = (targetType || 'all').toLowerCase().trim();
    const resolvedId   = resolvedType === 'all' ? 'all' : (String(targetId || '').trim() || null);
    if (resolvedType !== 'all' && !resolvedId) {
      add(`Select a ${resolvedType} before sending`, 'error');
      return;
    }

    setSendingTaskId(taskId);
    try {
      const res = await sendTaskRequest(sessionCode, taskId, resolvedType, resolvedId || 'all');
      const label = res.target?.label
        || (resolvedType === 'student' ? 'student'
          : resolvedType === 'group'   ? 'group'
          : 'entire class');
      add(`✅ Task sent to ${label}`, 'success');
      markSent(taskId);
      setOpenDropdown({});
    } catch (err) {
      add(err.message || 'Error sending task', 'error');
    } finally {
      setTimeout(() => setSendingTaskId(null), 1200);
    }
  }

  // ── save then immediately send ─────────────────────────────────────────────────
  const [saveSending, setSaveSending] = useState(false);
  async function createAndSendTask(targetType = 'all', targetId = null) {
    if (!form.question.trim())              return add('Enter a question', 'error');
    if (form.type === 'mcq' && !form.correct_answer) return add('Select the correct answer', 'error');
    if (form.type === 'mcq' && form.options.filter(o=>o.trim()).length < 2)
                                            return add('Add at least 2 options', 'error');
    if (sessionStatus !== 'active') return add('▶ Start the session first to send tasks', 'error');
    const resolvedType = targetType !== 'all' ? targetType
                       : form.send_to === 'student' ? 'student'
                       : form.send_to === 'group'   ? 'group'
                       : 'all';
    const resolvedId = targetId || (resolvedType !== 'all' ? (form.target_group || '') : 'all');
    if (resolvedType !== 'all' && !resolvedId) return add(`Select a ${resolvedType} before sending`, 'error');

    setSaveSending(true);
    try {
      // 1. Build payload from form state (identical to saveTask)
      const payload = {
        session_code:    sessionCode,
        question:        form.question.trim(),
        type:            form.type,
        options:         form.type === 'mcq' ? form.options.filter(o => o.trim()) : [],
        correct_answer:  form.correct_answer || '',
        topic:           form.topic || 'General',
        difficulty:      form.difficulty,
        hint:            form.hint || null,
        hint_visibility: form.hint_visibility,
        time_limit:      form.time_limit ? parseInt(form.time_limit) : null,
        long_answer:     !!form.long_answer,
      };

      // 2. POST /api/tasks/create — backend returns full task object with .id
      const task = await apiFetch('/api/tasks/create', { method: 'POST', body: payload });
      if (!task?.id) { add('Task saved but no ID returned', 'error'); return; }

      // 4. Send via the single sendTask path
      await sendTask(task.id, resolvedType, resolvedId);

      resetForm();
      loadTasks();
      setTab('list');
    } catch (e) {
      add(e.message || 'Save & Send failed', 'error');
    } finally {
      setSaveSending(false);
    }
  }

  // ── close dropdowns on outside click ─────────────────────────────────────
  useEffect(() => {
    function onClickOutside(e) {
      if (!e.target.closest('.task-send-dropdown') && !e.target.closest('.btn-warn') && !e.target.closest('.btn-primary.btn-sm')) {
        setOpenDropdown({});
      }
    }
    document.addEventListener('mousedown', onClickOutside);
    return () => document.removeEventListener('mousedown', onClickOutside);
  }, []);

  // ─────────────────────────── RENDER ────────────────────────────
  return (
    <div className="page">
      {/* ── header ── */}
      <div className="section-header" style={{marginBottom:16}}>
        <div className="section-title">📝 Task Management</div>
        <div className="flex gap-8">
          <button className="btn btn-ghost" onClick={()=>setShowPDFModal(true)} disabled={!tasks.length}
            title="Export all tasks as PDF">
            📄 Export PDF
          </button>
          <button className="btn btn-success" onClick={sendNextTask}
            disabled={!tasks.length || sessionStatus !== 'active'}
            title={sessionStatus !== 'active' ? 'Start the session first' : ''}>
            📤 Send Next Task
          </button>
          <button className="btn btn-primary" onClick={()=>setTab(tab==='list'?'create':'list')}>
            {tab!=='list'?'← Task List':'+ Create Task'}
          </button>
        </div>
      </div>

      {showPDFModal && <PDFOptionsModal tasks={tasks} title="Question Bank" onClose={()=>setShowPDFModal(false)}/>}

      {/* ── nav tabs ── */}
      <div className="tabs" style={{marginBottom:20}}>
        {[
          {id:'list',    label:`📋 Tasks (${tasks.length})`},
          {id:'create',  label:'✏️ Create'},
          {id:'studio',  label:'🎬 Quiz Studio'},
          {id:'ai',      label:'🤖 AI Generate'},
          {id:'upload',  label:'⬆️ Import JSON'},
        ].map(t=>(
          <button key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ══════════════ LIST ══════════════ */}
      {tab==='list' && (
        <div>
          {tasks.length===0 && (
            <div className="card text-center" style={{padding:48}}>
              <div style={{fontSize:'3rem',marginBottom:12}}>📭</div>
              <div style={{fontWeight:600,marginBottom:6}}>No tasks yet</div>
              <div className="text-muted text-sm">Create a task, build a quiz, or use AI to generate questions.</div>
              <button className="btn btn-primary mt-16" onClick={()=>setTab('create')}>+ Create First Task</button>
            </div>
          )}
          {tasks.map((t,i)=>(
  <div key={t.id} className={`card${sentTaskIds.has(t.id) ? ' task-card-sent' : ''}`} style={{marginBottom:10}}>
    
    <div className="flex justify-between items-center" style={{flexWrap:'wrap',gap:8}}>
      
      {/* LEFT SIDE */}
      <div style={{flex:1,minWidth:0}}>
        <div className="flex gap-8 items-center mb-8" style={{flexWrap:'wrap'}}>
          <span className="badge badge-purple">{t.type.toUpperCase()}</span>
          <span className="badge badge-blue">{t.topic||'General'}</span>
          <span className={`badge badge-${t.difficulty==='easy'?'green':t.difficulty==='hard'?'red':'yellow'}`}>
            {t.difficulty}
          </span>
          {t.time_limit && <span className="badge badge-yellow">⏱ {t.time_limit}s</span>}
        </div>

        <div style={{fontWeight:600,marginBottom:4}}>
          {i+1}. {t.question}
        </div>

        {t.type==='mcq' && t.options?.length>0 && (
          <div className="text-sm text-muted">
            {t.options.map((o,j)=>(
              <span key={j} style={{marginRight:8}}>
                {String.fromCharCode(65+j)}. {o}
              </span>
            ))}
          </div>
        )}
      </div>

      {/* RIGHT SIDE */}
      <div className="flex gap-8 items-center" style={{flexWrap:'wrap'}}>
        
        {sentTaskIds.has(t.id) && (
          <span className="sent-badge">✓ Sent</span>
        )}

        <div style={{position:'relative',display:'flex',gap:4}}>

          {/* ALL */}
          <button
            className="btn btn-success btn-sm"
            disabled={sendingTaskId === t.id || sessionStatus !== 'active'}
            onClick={() => sendTask(t.id, 'all')}
          >
            {sendingTaskId === t.id ? '⏳' : '📤'} All
          </button>

          {/* GROUP */}
          <button
            className="btn btn-warn btn-sm"
            disabled={sendingTaskId === t.id || sessionStatus !== 'active'}
            onClick={()=>setOpenDropdown(d=>({...d, [t.id]: d[t.id]==='group' ? null : 'group'}))}
          >
            🎯 Group
          </button>

          {/* STUDENT */}
          <button
            className="btn btn-primary btn-sm"
            disabled={sendingTaskId === t.id || sessionStatus !== 'active'}
            onClick={()=>setOpenDropdown(d=>({...d, [t.id]: d[t.id]==='student' ? null : 'student'}))}
          >
            👤 Student
          </button>

          {/* GROUP DROPDOWN */}
          {openDropdown[t.id]==='group' && (
            <div className="task-send-dropdown">
              <div className="task-send-dropdown-label">Select Group</div>

              {groupList.map(g=>(
                <button
                  key={g.id}
                  className="task-send-dropdown-item"
                  onClick={()=>{
                    sendTask(t.id, 'group', g.id);
                  }}
                >
                  👥 {g.name}
                </button>
              ))}

              <button
                className="task-send-dropdown-item"
                onClick={()=>setOpenDropdown({})}
              >
                ✕ Cancel
              </button>
            </div>
          )}

          {/* STUDENT DROPDOWN */}
          {openDropdown[t.id]==='student' && (
            <div className="task-send-dropdown">
              <div className="task-send-dropdown-label">Select Student</div>

              {activeStudents.map(s=>(
                <button
                  key={s.id}
                  className="task-send-dropdown-item"
                  onClick={()=>{
                    sendTask(t.id, 'student', s.id);
                  }}
                >
                  👤 {s.name}
                </button>
              ))}

              <button
                className="task-send-dropdown-item"
                onClick={()=>setOpenDropdown({})}
              >

        </div>

        <button className="btn btn-danger btn-sm" onClick={()=>deleteTask(t.id)}>

      </div>
    </div>
  </div>
))}

            <div className="card" style={{background:'var(--surface2)',padding:'12px 16px'}}>
              <div className="text-sm text-muted">

              </div>

          )}

      )}

      {tab==='create' && (
        <div>
          {/* Task type selector */}
          <div className="card" style={{marginBottom:16}}>
            <div className="card-title">Select Task Type</div>
            <div className="flex gap-12" style={{flexWrap:'wrap'}}>
              <TaskTypeCard icon="🔘" label="MCQ" desc="4 options, one correct answer"
                selected={form.type==='mcq'} onClick={()=>setForm(f=>({...f,type:'mcq'}))}/>
              <TaskTypeCard icon="✍️" label="Short Answer" desc="Brief typed response"
                selected={form.type==='short'&&!form.long_answer}
                onClick={()=>setForm(f=>({...f,type:'short',long_answer:false}))}/>
              <TaskTypeCard icon="📄" label="Long Answer" desc="Detailed written response"

                onClick={()=>setForm(f=>({...f,type:'short',long_answer:true}))}/>

                selected={form.type==='coding'} onClick={()=>setForm(f=>({...f,type:'coding'}))}/>

          </div>

          {/* Main form */}
          <div className="card" style={{marginBottom:16}}>
            <div className="card-title">
              {form.type==='mcq'?'🔘 MCQ Task':form.long_answer?'📄 Long Answer Task':form.type==='coding'?'💻 Coding Task':'✍️ Short Answer Task'}

            {/* Question */}
            <div className="form-group">
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                <label style={{margin:0}}>Question <span style={{color:'var(--red)'}}>*</span></label>

                  <AICodingGenerator onGenerated={(q)=>{

                      correct_answer: q.starter_code||f.correct_answer,

              <textarea rows={form.long_answer?3:form.type==='coding'?4:2} value={form.question}
                onChange={e=>setForm(f=>({...f,question:e.target.value}))}
                placeholder={form.type==='coding'?'Describe the coding problem, input/output format, constraints, and sample test case…':form.long_answer?'Enter your essay / long answer question…':'Type your question here…'}/>

            {/* MCQ options */}
            {form.type==='mcq' && (
              <div style={{marginBottom:16}}>
                <label style={{display:'block',fontSize:'0.85rem',color:'var(--text2)',marginBottom:10}}>
                  Answer Options <span style={{color:'var(--text3)'}}>(click radio = correct answer)</span>
                </label>
                {['A','B','C','D'].map((letter,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                    <input type="radio" name="correct_ans" value={letter}
                      checked={form.correct_answer===letter}
                      onChange={()=>setForm(f=>({...f,correct_answer:letter}))}
                      style={{width:18,height:18,accentColor:'var(--green)',cursor:'pointer'}}/>
                    <div style={{
                      width:32,height:32,borderRadius:'50%',background:'var(--surface3)',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontWeight:700,fontSize:'0.85rem',flexShrink:0,
                      border: form.correct_answer===letter?'2px solid var(--green)':'2px solid transparent',
                      color: form.correct_answer===letter?'var(--green)':'var(--text2)',
                    }}>{letter}</div>
                    <input value={form.options[i]} onChange={e=>setOpt(i,e.target.value)}
                      placeholder={`Option ${letter}`} style={{flex:1}}/>
                  </div>
                ))}
                {!form.correct_answer && <div className="text-xs" style={{color:'var(--yellow)'}}>⚠️ Select a radio to mark the correct answer</div>}
                {form.correct_answer && <div className="text-xs" style={{color:'var(--green)'}}>✓ Correct answer: Option {form.correct_answer}</div>}
              </div>
            )}

            {/* Short/Long expected answer */}
            {form.type==='short' && (
              <div className="form-group">
                <label>Expected Answer <span className="text-muted text-xs">(for auto-grading)</span></label>
                {form.long_answer
                  ? <textarea rows={3} value={form.correct_answer} onChange={e=>setForm(f=>({...f,correct_answer:e.target.value}))} placeholder="Model answer (optional)…"/>
                  : <input value={form.correct_answer} onChange={e=>setForm(f=>({...f,correct_answer:e.target.value}))} placeholder="Expected answer (optional)"/>
                }
              </div>
            )}

            {/* Coding: starter code */}
            {form.type==='coding' && (
              <div className="form-group">
                <label>Starter Code <span className="text-muted text-xs">(optional — pre-filled in student editor)</span></label>
                <textarea rows={4} value={form.correct_answer}
                  onChange={e=>setForm(f=>({...f,correct_answer:e.target.value}))}
                  placeholder="# e.g.\ndef solution():\n    pass\n\nprint(solution())"
                  style={{fontFamily:"'Fira Code',Consolas,monospace",fontSize:'0.85rem',background:'#0d1117',color:'#c9d1d9'}}/>
              </div>
            )}

            {/* Topic + Difficulty */}
            <div className="grid grid-2" style={{gap:12,marginBottom:16}}>
              <div className="form-group" style={{marginBottom:0}}>
                <label>Topic</label>
                <input value={form.topic} onChange={e=>setForm(f=>({...f,topic:e.target.value}))}
                  placeholder="e.g. Algebra, Photosynthesis"/>
              </div>
              <div className="form-group" style={{marginBottom:0}}>
                <label>Difficulty</label>
                <select value={form.difficulty} onChange={e=>setForm(f=>({...f,difficulty:e.target.value}))}>
                  <option value="easy">🟢 Easy (+5 pts)</option>
                  <option value="medium">🟡 Medium (+10 pts)</option>
                  <option value="hard">🔴 Hard (+20 pts)</option>
                </select>
              </div>
            </div>

            {/* Timer */}
            <div style={{marginBottom:16}}>
              <TimerPresets value={form.time_limit} onChange={v=>setForm(f=>({...f,time_limit:v}))}/>
            </div>

            {/* Hint */}
            <div className="grid grid-2" style={{gap:12,marginBottom:16}}>
              <div className="form-group" style={{marginBottom:0}}>
                <label>💡 Hint / Clue <span className="text-muted text-xs">(optional)</span></label>
                <input value={form.hint} onChange={e=>setForm(f=>({...f,hint:e.target.value}))}
                  placeholder="Give students a hint…"/>
              </div>
              <div className="form-group" style={{marginBottom:0}}>
                <label>Hint Visibility</label>
                <select value={form.hint_visibility} onChange={e=>setForm(f=>({...f,hint_visibility:e.target.value}))}>
                  <option value="always">Always visible</option>
                  <option value="on_request">On request only</option>
                  <option value="after_submission">After submission</option>
                </select>
              </div>
            </div>

            {/* Send targeting */}
            <div style={{background:'var(--surface2)',borderRadius:10,padding:'14px 16px',marginBottom:16}}>
              <div style={{fontSize:'0.85rem',fontWeight:600,marginBottom:10,color:'var(--text2)'}}>📡 Send To</div>
              <div className="flex gap-8" style={{flexWrap:'wrap',marginBottom:8}}>
                {['class','group','student'].map(t=>(
                  <button key={t} type="button"
                    className={`btn btn-sm ${form.send_to===t?'btn-primary':'btn-ghost'}`}
                    onClick={()=>setForm(f=>({...f,send_to:t}))}>
                    {t==='class'?'🌐 Entire Class':t==='group'?'👥 Specific Group':'👤 Specific Student'}
                  </button>
                ))}
              </div>
              {form.send_to==='group' && groupList.length>0 && (
                <select value={form.target_group} onChange={e=>setForm(f=>({...f,target_group:e.target.value}))}>
                  <option value="">— Select group —</option>
                  {groupList.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                </select>
              )}
              {form.send_to==='group' && !groupList.length && (
                <div className="text-xs text-muted">No groups created yet. Use Groups page to create groups first.</div>
              )}
              {form.send_to==='student' && (
                <select value={form.target_group} onChange={e=>setForm(f=>({...f,target_group:e.target.value}))}>
                  <option value="">— Select student —</option>
                  {activeStudents.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              )}
              <div className="text-xs text-muted" style={{marginTop:6}}>
                Task is saved to queue. Use <strong>"Save & Send"</strong> below to push instantly, or use "Send Next Task" for sequential delivery.
              </div>
            </div>

            {/* Action buttons */}
            <div className="flex gap-12" style={{flexWrap:'wrap'}}>
              <button className="btn btn-primary btn-lg" onClick={createTask} disabled={loading || saveSending} style={{flex:1,minWidth:140}}>
                {loading?'💾 Saving…':'💾 Save Task'}
              </button>
              <button className="btn btn-success btn-lg" onClick={createAndSendTask} disabled={loading || saveSending || sessionStatus !== 'active'}
                title={sessionStatus !== 'active' ? 'Start session first to send' : 'Save and immediately send to students'}
                style={{flex:1,minWidth:160}}>
                {saveSending?'📤 Saving & Sending…':'📤 Save & Send'}
              </button>
              <button className="btn btn-ghost" onClick={resetForm}>↺ Reset</button>
              <button className="btn btn-ghost" onClick={()=>setTab('list')}>← Back to List</button>
            </div>
          </div>
        </div>
      )}

      {/* ══════════════ QUIZ STUDIO ══════════════ */}
      {tab==='studio' && (
        <QuizStudio
          tasks={tasks}
          sessionCode={sessionCode}
          sessionStatus={sessionStatus}
          loadTasks={loadTasks}
          saveTask={saveTask}
          onSendQuiz={()=>setTab('list')}
          groups={groups}
          roster={roster}
        />
      )}

      {/* ══════════════ AI GENERATE ══════════════ */}
      {tab==='ai' && (
        <div>
          <AIQuestionGenerator onAdd={addAIQuestion}/>
          <div className="card-sm text-sm text-muted">
            Generated questions are automatically saved to your task list. Switch to the 📋 Tasks tab to review and send them.
          </div>
        </div>
      )}

      {/* ══════════════ IMPORT JSON ══════════════ */}
      {tab==='upload' && (
        <div className="card">
          <div className="card-title">⬆️ Import Tasks from JSON</div>
          <div className="text-sm text-muted mb-16">Bulk-import tasks using a JSON file. Accepted format:</div>
          <pre style={{background:'var(--surface2)',padding:14,borderRadius:8,fontSize:'0.8rem',marginBottom:16,overflowX:'auto'}}>{`[
  {
    "question": "What is 2+2?",
    "type": "mcq",
    "options": ["3","4","5","6"],
    "correct_answer": "B",
    "topic": "Math",
    "difficulty": "easy",
    "hint": "Think counting"
  },
  {
    "question": "Describe photosynthesis.",
    "type": "short",
    "topic": "Biology",
    "difficulty": "medium"
  }
]`}</pre>
          <label className="upload-zone" style={{cursor:'pointer',position:'relative'}}>
            <div className="upload-icon">📂</div>
            <div>{uploadFile ? `✓ ${uploadFile.name}` : 'Click to select JSON file'}</div>
            <input type="file" accept=".json" style={{display:'none'}} onChange={e=>setUploadFile(e.target.files[0])}/>
          </label>
          <div className="flex gap-8 mt-16">
            <button className="btn btn-primary" onClick={uploadJSON} disabled={!uploadFile||loading}>
              {loading?'Importing…':'⬆️ Import Tasks'}
            </button>
            {uploadFile && <button className="btn btn-ghost" onClick={()=>setUploadFile(null)}>✕ Clear</button>}
          </div>
        </div>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  CONTENT MANAGEMENT PAGE
// ═════════════════════════════════════════════════════════════════
function ContentManagementPage({ sessionCode, tasks }) {
  const [files, setFiles] = useState([]);
  const [preview, setPreview] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [attachTarget, setAttachTarget] = useState('');
  const { add } = useContext(AppCtx);

  async function loadFiles() {
    try {
      const r = await apiFetch(`/api/session/${sessionCode}/content`);
      setFiles(r.files||[]);
    } catch {}
  }

  useEffect(()=>{ loadFiles(); },[]);

  async function uploadFile(file) {
    setUploading(true);
    const fd = new FormData();
    fd.append('session_code', sessionCode);
    fd.append('file', file);
    try {
      await fetch(`${API}/api/content/upload`, {method:'POST',body:fd});
      add('File uploaded & shared with students','success');
      loadFiles();
    } catch { add('Upload failed','error'); }
    setUploading(false);
  }

  function onDrop(e) {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (f) uploadFile(f);
  }

  async function deleteFile(name) {
    try {
      await apiFetch(`/api/session/${sessionCode}/content/${encodeURIComponent(name)}`,{method:'DELETE'});
      loadFiles();
    } catch {}
  }

  async function attachToTask(filename) {
    if (!attachTarget) return add('Select a task first','error');
    try {
      await apiFetch(`/api/session/${sessionCode}/tasks/${attachTarget}/attach_content?filename=${encodeURIComponent(filename)}`,{method:'POST'});
      add('Content attached to task','success');
    } catch(e) { add(e.message,'error'); }
  }

  const isImage = (ct) => ct && ct.startsWith('image/');
  const isPDF = (ct) => ct === 'application/pdf';

  return (
    <div className="page">
      <div className="section-title" style={{marginBottom:16}}>📄 Content Management</div>
      <div className="grid grid-2">
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div className="card-title">⬆️ Upload Content</div>
            <div className="upload-zone" onDrop={onDrop} onDragOver={e=>e.preventDefault()} style={{position:'relative'}}>
              <div className="upload-icon">{uploading?'⏳':'📁'}</div>
              <div>{uploading?'Uploading…':'Drop PDF or Image here, or click to browse'}</div>
              <div className="text-xs text-muted" style={{marginTop:4}}>PDF, PNG, JPG, GIF supported</div>
              {!uploading && <input type="file" accept="image/*,.pdf" style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}
                onChange={e=>e.target.files[0]&&uploadFile(e.target.files[0])}/>}
            </div>
            <div className="text-xs text-muted mt-8">Files are immediately broadcast to all connected students</div>
          </div>

          <div className="card">
            <div className="card-title">📎 Attach to Task</div>
            <div className="form-group">
              <label>Select task</label>
              <select value={attachTarget} onChange={e=>setAttachTarget(e.target.value)}>
                <option value="">— choose task —</option>
                {tasks.map(t=><option key={t.id} value={t.id}>{t.question.slice(0,50)}</option>)}
              </select>
            </div>
            <div className="text-sm text-muted">Then click "Attach" on a file below</div>
          </div>
        </div>

        <div className="card">
          <div className="card-title">📂 Uploaded Files ({files.length})</div>
          {files.length===0 && <div className="text-muted text-sm">No files uploaded yet</div>}
          {files.map(f=>(
            <div key={f.name} className="file-card">
              <div className="file-icon">{isImage(f.content_type)?'🖼️':isPDF(f.content_type)?'📕':'📎'}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:500,fontSize:'0.9rem',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{f.name}</div>
                <div className="text-xs text-muted">{(f.size/1024).toFixed(1)} KB</div>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={()=>attachToTask(f.name)}>📎</button>
              <button className="btn btn-danger btn-sm" onClick={()=>deleteFile(f.name)}>🗑</button>
            </div>
          ))}
        </div>
      </div>
      {/* ── Excel → CSV Tool ── */}
      <ExcelToCSV/>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  GROUPS PAGE
// ═════════════════════════════════════════════════════════════════
function GroupsPage({ sessionCode, groups, setGroups, roster, analytics }) {
  const [loading, setLoading] = useState(false);
  const [editGroup, setEditGroup] = useState(null);
  const { add } = useContext(AppCtx);

  async function generateGroups() {
    setLoading(true);
    try {
      const r = await apiFetch('/api/groups/generate', {method:'POST', body:{session_code:sessionCode,strategy:'auto'}});
      setGroups(r.groups||[]);
      add('Groups auto-generated','success');
    } catch(e) { add(e.message,'error'); }
    setLoading(false);
  }

  async function saveGroup(gid, members) {
    try {
      await apiFetch('/api/groups/update', {method:'PUT', body:{session_code:sessionCode,group_id:gid,members}});
      add('Group updated','success');
      setEditGroup(null);
    } catch(e) { add(e.message,'error'); }
  }

  const activeStudents = roster.active||[];
  const getStudentName = (id) => activeStudents.find(s=>s.id===id)?.name || id;
  const getGroupScore = (members) => {
    const scores = members.map(id=>activeStudents.find(s=>s.id===id)?.score||0);
    return scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  };

  return (
    <div className="page">
      <div className="section-header">
        <div className="section-title">👥 Groups ({groups.length} groups, max 4 per group)</div>
        <button className="btn btn-primary" onClick={generateGroups} disabled={loading}>
          {loading?'Generating…':'⚡ Auto-Generate Groups'}
        </button>
      </div>

      {groups.length===0 && (
        <div className="card text-center" style={{padding:40}}>
          <div style={{fontSize:'3rem',marginBottom:12}}>👥</div>
          <div className="text-muted">No groups yet. Click "Auto-Generate Groups" to create balanced groups.</div>
          <div className="text-sm text-muted mt-8">You need at least 2 active students to generate groups.</div>
        </div>
      )}

      <div className="grid grid-3">
        {groups.map(g=>(
          <div key={g.id} className="group-card">
            <div className="flex justify-between items-center mb-8">
              <div style={{fontWeight:700}}>{g.name}</div>
              <div className="flex gap-8 items-center">
                <span className="badge badge-purple">Avg: {getGroupScore(g.members)} pts</span>
                <button className="btn btn-ghost btn-sm" onClick={()=>setEditGroup(g)}>✏️</button>
              </div>
            </div>
            {g.members.map(mid=>(
              <div key={mid} className="group-member">
                <div className="avatar">{getStudentName(mid)[0]?.toUpperCase()}</div>
                <span>{getStudentName(mid)}</span>
                <span className="text-xs text-muted" style={{marginLeft:'auto'}}>
                  {activeStudents.find(s=>s.id===mid)?.score||0} pts
                </span>
              </div>
            ))}
            {g.members.length < 4 && (
              <div style={{fontSize:'0.75rem',color:'var(--text3)',marginTop:6}}>
                {4-g.members.length} slot(s) available
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Group performance summary */}
      {groups.length > 0 && (
        <div className="card" style={{marginTop:16}}>
          <div className="card-title">📊 Group Performance Comparison</div>
          <BarChart
            labels={groups.map(g=>g.name)}
            data={groups.map(g=>getGroupScore(g.members))}
            label="Average Score"
          />
        </div>
      )}

      {/* Edit modal */}
      {editGroup && (
        <GroupEditModal group={editGroup} students={activeStudents}
          onSave={(members)=>saveGroup(editGroup.id, members)}
          onClose={()=>setEditGroup(null)}/>
      )}
    </div>
  );
}

function GroupEditModal({ group, students, onSave, onClose }) {
  const [members, setMembers] = useState([...group.members]);
  const toggle = (id) => {
    if (members.includes(id)) setMembers(members.filter(m=>m!==id));
    else if (members.length < 4) setMembers([...members,id]);
  };
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200}}>
      <div className="card" style={{width:'100%',maxWidth:440}}>
        <div className="section-header">
          <div className="card-title">✏️ Edit {group.name}</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="text-sm text-muted mb-8">Select up to 4 students:</div>
        {students.map(s=>(
          <div key={s.id} className="flex items-center gap-8 mb-8">
            <input type="checkbox" checked={members.includes(s.id)} onChange={()=>toggle(s.id)}
              disabled={!members.includes(s.id)&&members.length>=4}/>
            <span>{s.name}</span>
            <span className="text-xs text-muted" style={{marginLeft:'auto'}}>{s.score} pts</span>
          </div>
        ))}
        <div className="flex gap-8 mt-16">
          <button className="btn btn-primary" onClick={()=>onSave(members)}>Save Group</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}


// ═════════════════════════════════════════════════════════════════
//  TEACHER QUIZ REPORT  (Feature 1B + 1C — separate section)
// ═════════════════════════════════════════════════════════════════
function TeacherQuizReport({ sessionCode }) {
  const [quizTab, setQuizTab] = useState('class'); // 'class' | 'individual'
  const [classReport, setClassReport] = useState(null);
  const [loadingClass, setLoadingClass] = useState(false);
  const [loadingStudent, setLoadingStudent] = useState(false);
  const [classError, setClassError] = useState(null);
  const [selectedStudentId, setSelectedStudentId] = useState('');
  const [studentReport, setStudentReport] = useState(null);
  const [studentError, setStudentError] = useState(null);
  const { add } = useContext(AppCtx);

  function loadClassReport() {
    setLoadingClass(true);
    setClassError(null);
    apiFetch(`/quiz/report/${sessionCode}`)
      .then(data => { setClassReport(data); setLoadingClass(false); })
      .catch(e => { setClassError(e.message); setLoadingClass(false); });
  }

  function loadStudentReport(sid) {
    if (!sid) return;
    setLoadingStudent(true);
    setStudentError(null);
    setStudentReport(null);
    apiFetch(`/quiz/report/${sessionCode}/${sid}`)
      .then(data => { setStudentReport(data); setLoadingStudent(false); })
      .catch(e => { setStudentError(e.message); setLoadingStudent(false); });
  }

  // Load class report when tab opens
  React.useEffect(() => {
    if (quizTab === 'class' && !classReport && !loadingClass) loadClassReport();
  }, [quizTab]);

  const rows = classReport?.rows || [];
  const totalQ = classReport?.total_q || 0;
  const submitted = classReport?.submitted || 0;

  // Compute class-level aggregates from rows
  const avgPct  = rows.length ? Math.round(rows.reduce((a,r) => a + r.percentage, 0) / rows.length) : 0;
  const highest = rows.length ? rows[0].percentage : 0;
  const lowest  = rows.length ? rows[rows.length - 1].percentage : 0;

  // Per-question analytics from class report.report map
  const reportMap = classReport?.report || {};
  let qStats = [];
  if (totalQ > 0 && Object.keys(reportMap).length > 0) {
    for (let qi = 0; qi < totalQ; qi++) {
      let correct = 0, total = 0;
      Object.values(reportMap).forEach(sv => {
        const d = sv.details?.[qi];
        if (d !== undefined) { total++; if (d.is_correct) correct++; }
      });
      const firstDetails = Object.values(reportMap)[0]?.details;
      qStats.push({
        index: qi,
        question: firstDetails?.[qi]?.question || `Q${qi+1}`,
        correctPct: total > 0 ? Math.round(correct / total * 100) : 0,
        wrongPct:   total > 0 ? Math.round((total - correct) / total * 100) : 0,
        total,
      });
    }
  }

  const topPerformers   = rows.slice(0, 3);
  const atRiskStudents  = rows.filter(r => r.percentage < 40);

  return (
    <div className="quiz-report-section">
      <hr/>
      <div className="section-header" style={{marginBottom:12}}>
        <div className="section-title">🎯 Quiz Report</div>
        <button className="btn btn-ghost btn-sm" onClick={quizTab==='class' ? loadClassReport : ()=>loadStudentReport(selectedStudentId)}>
          🔄 Refresh
        </button>
      </div>

      {/* Sub-tabs */}
      <div className="tabs">
        <button className={`tab ${quizTab==='class'?'active':''}`} onClick={()=>setQuizTab('class')}>
          📊 Class Report
        </button>
        <button className={`tab ${quizTab==='individual'?'active':''}`} onClick={()=>setQuizTab('individual')}>
          👤 Student Report
        </button>
      </div>

      {/* ── CLASS REPORT (1C) ── */}
      {quizTab === 'class' && (
        <div>
          {loadingClass && <div className="text-center text-muted" style={{padding:24}}>Loading class quiz data…</div>}
          {classError && (
            <div className="card text-center" style={{padding:24,borderColor:'var(--border)'}}>
              <div style={{fontSize:'2rem',marginBottom:8}}>📊</div>
              <div className="text-muted text-sm">No quiz data yet — send a quiz to students first.</div>
            </div>
          )}
          {!loadingClass && !classError && classReport && (
            <>
              {/* Summary Stats */}
              <div className="grid grid-4" style={{marginBottom:16}}>
                <div className="stat"><div className="stat-value">{avgPct}%</div><div className="stat-label">Avg Accuracy</div></div>
                <div className="stat">
                  <div className="stat-value" style={{backgroundImage:'linear-gradient(135deg,var(--green),#16a34a)'}}>{highest}%</div>
                  <div className="stat-label">Highest Score</div>
                </div>
                <div className="stat">
                  <div className="stat-value" style={{backgroundImage:'linear-gradient(135deg,var(--red),#dc2626)'}}>{lowest}%</div>
                  <div className="stat-label">Lowest Score</div>
                </div>
                <div className="stat"><div className="stat-value">{submitted}</div><div className="stat-label">Participants</div></div>
              </div>

              {/* Per-question analytics */}
              {qStats.length > 0 && (
                <div className="card" style={{marginBottom:16}}>
                  <div className="card-title">📋 Per-Question Analysis</div>
                  {qStats.map((q, i) => (
                    <div key={i} style={{marginBottom:12}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:'0.85rem'}}>
                        <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginRight:8}}>
                          <strong>Q{q.index+1}:</strong> {q.question}
                        </span>
                        <span className={`badge badge-${q.correctPct>=70?'green':q.correctPct>=40?'yellow':'red'}`}>
                          {q.correctPct}% correct
                        </span>
                        {q.correctPct < 40 && <span className="badge badge-red" style={{marginLeft:4}}>⚠️ Hard</span>}
                      </div>
                      <div className="progress-bar">
                        <div className={`progress-fill ${q.correctPct>=70?'green':q.correctPct>=40?'yellow':'red'}`}
                          style={{width:`${q.correctPct}%`}}/>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              <div className="grid grid-2" style={{marginBottom:16}}>
                {/* Top Performers */}
                {topPerformers.length > 0 && (
                  <div className="card">
                    <div className="card-title">🏆 Top Performers</div>
                    {topPerformers.map((r, i) => (
                      <div key={r.student_id} className="leaderboard-row" style={{marginBottom:6}}>
                        <div className={`rank-badge rank-${i+1}`}>#{i+1}</div>
                        <span style={{flex:1}}>{r.student_name || r.student_id}</span>
                        <span className="badge badge-green">{r.percentage}%</span>
                      </div>
                    ))}
                  </div>
                )}

                {/* At-Risk Students */}
                <div className="card">
                  <div className="card-title">⚠️ At-Risk Students</div>
                  {atRiskStudents.length === 0
                    ? <div className="text-muted text-sm">No at-risk students — great class performance! 🎉</div>
                    : atRiskStudents.map(r => (
                        <div key={r.student_id} className="at-risk-row" style={{marginBottom:6}}>
                          <div className="at-risk-dot" style={{background:'var(--red)'}}/>
                          <span className="at-risk-name">{r.student_name || r.student_id}</span>
                          <span className="at-risk-pct" style={{color:'var(--red)'}}>{r.percentage}%</span>
                        </div>
                      ))
                  }
                </div>
              </div>

              {/* Full leaderboard */}
              {rows.length > 0 && (
                <div className="card">
                  <div className="card-title">📊 All Students</div>
                  <div style={{overflowX:'auto'}}>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:'0.875rem'}}>
                      <thead>
                        <tr style={{borderBottom:'1px solid var(--border)'}}>
                          {['Rank','Student','Score','Accuracy'].map(h=>(
                            <th key={h} style={{padding:'8px 12px',textAlign:'left',color:'var(--text2)',fontWeight:600}}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {rows.map(r => (
                          <tr key={r.student_id} style={{borderBottom:'1px solid var(--border)'}}>
                            <td style={{padding:'8px 12px'}}>
                              <div className={`rank-badge rank-${Math.min(r.rank,4)<4?r.rank:'n'}`} style={{display:'inline-flex'}}>
                                #{r.rank}
                              </div>
                            </td>
                            <td style={{padding:'8px 12px'}}>{r.student_name || r.student_id}</td>
                            <td style={{padding:'8px 12px'}}>{r.score}/{totalQ}</td>
                            <td style={{padding:'8px 12px'}}>
                              <span className={`badge badge-${r.percentage>=70?'green':r.percentage>=40?'yellow':'red'}`}>
                                {r.percentage}%
                              </span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* ── INDIVIDUAL STUDENT REPORT (1B) ── */}
      {quizTab === 'individual' && (
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div className="card-title">👤 Select Student</div>
            <div className="flex gap-8">
              <input
                style={{flex:1}}
                placeholder="Enter student ID…"
                value={selectedStudentId}
                onChange={e => setSelectedStudentId(e.target.value)}
                onKeyDown={e => e.key==='Enter' && loadStudentReport(selectedStudentId)}
              />
              <button className="btn btn-primary"
                onClick={() => loadStudentReport(selectedStudentId)}
                disabled={!selectedStudentId.trim() || loadingStudent}>
                {loadingStudent ? '⏳' : 'Load Report'}
              </button>
            </div>
            {/* Quick-select from class report if loaded */}
            {rows.length > 0 && (
              <div style={{marginTop:12}}>
                <div className="text-xs text-muted" style={{marginBottom:6}}>Or select from class:</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {rows.map(r => (
                    <button key={r.student_id}
                      className="btn btn-ghost btn-sm"
                      onClick={() => { setSelectedStudentId(r.student_id); loadStudentReport(r.student_id); }}>
                      {r.student_name || r.student_id}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>

          {loadingStudent && <div className="text-center text-muted" style={{padding:24}}>Loading student report…</div>}
          {studentError && <div className="card text-center text-muted" style={{padding:24}}>{studentError}</div>}

          {studentReport && !loadingStudent && (() => {
            const total = studentReport.total || 0;
            const score = studentReport.score || 0;
            const accuracy = total > 0 ? Math.round(score / total * 100) : 0;
            return (
              <div className="card">
                <div className="card-title">
                  📄 {studentReport.student_name || selectedStudentId}'s Quiz Report
                </div>
                <div className="grid grid-4" style={{marginBottom:16}}>
                  <div className="stat"><div className="stat-value">{score}/{total}</div><div className="stat-label">Score</div></div>
                  <div className="stat"><div className="stat-value">{accuracy}%</div><div className="stat-label">Accuracy</div></div>
                  <div className="stat">
                    <div className="stat-value" style={{backgroundImage:'linear-gradient(135deg,var(--green),#16a34a)'}}>{score}</div>
                    <div className="stat-label">Correct</div>
                  </div>
                  <div className="stat">
                    <div className="stat-value" style={{backgroundImage:'linear-gradient(135deg,var(--red),#dc2626)'}}>{total - score}</div>
                    <div className="stat-label">Wrong</div>
                  </div>
                </div>
                {studentReport.details?.map((d, i) => (
                  <div key={i} className={`quiz-report-q ${d.is_correct ? 'correct' : 'wrong'}`}>
                    <div className="quiz-report-q-text">
                      <span className={`badge ${d.is_correct?'badge-green':'badge-red'}`} style={{marginRight:8}}>
                        {d.is_correct ? '✅' : '❌'}
                      </span>
                      Q{i+1}: {d.question}
                    </div>
                    <div className="quiz-report-ans">
                      Student: <strong style={{color: d.is_correct ? 'var(--green)' : 'var(--red)'}}>
                        {d.student_answer ?? '(no answer)'}
                      </strong>
                      {!d.is_correct && d.correct_answer && (
                        <> &nbsp;|&nbsp; Correct: <strong style={{color:'var(--green)'}}>{d.correct_answer}</strong></>
                      )}
                    </div>
                    {d.topic && <span className="badge badge-blue" style={{fontSize:'0.7rem',marginTop:4}}>{d.topic}</span>}
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

function ReportsPage({ sessionCode }) {

  }

  if (loading) return <div className="page text-center text-muted" style={{paddingTop:60}}>Loading reports…</div>;
  if (!report) return <div className="page text-center text-muted">No report data available yet.</div>;

  const { analytics, question_stats, group_stats, leaderboard } = report;
  const coding_summary = report.coding_summary || { avg_score: 0, top_coder: null };
  const topicEntries = Object.entries(analytics.topic_confusion||{});

  return (
    <div className="page">
      <div className="section-header">
  <div className="section-title">📈 Session Reports</div>

  <div className="flex gap-8">
    <button className="btn btn-ghost" onClick={loadReport}>🔄 Refresh</button>

    {report?.question_stats?.length > 0 && (
      <button className="btn btn-ghost" onClick={()=>setShowQBankPDF(true)}>
        📄 Question Bank PDF
      </button>
    )}

    <button className="btn btn-primary"
      onClick={async ()=>{
        const res = await fetch(`${API}/api/session/${sessionCode}/report/download`);
        const data = await res.json();

        const codingLine = `\n\n"Coding Performance"\n"Avg Score",${coding_summary.avg_score}%\n"Top Coder","${coding_summary.top_coder?.name||'N/A'}"\n`;
        const blob = new Blob([data.csv + codingLine], {type:"text/csv"});

        a.click();
      }}>

</div>

{showQBankPDF && (
  <PDFOptionsModal
    tasks={(report?.question_stats||[]).map(q=>({
      id: q.task_id,
      question: q.question,
      type: q.type || 'mcq',
      topic: q.topic,
      correct_answer: q.correct_answer,
      options: q.options,
    }))}
    title={`Session ${sessionCode} — Question Bank`}
    onClose={()=>setShowQBankPDF(false)}
  />
)}

      {/* Summary Stats */}
      <div className="grid grid-4" style={{marginBottom:16}}>
        <div className="stat"><div className="stat-value">{analytics.understanding||0}%</div><div className="stat-label">Understanding</div></div>
        <div className="stat"><div className="stat-value">{analytics.participation||0}%</div><div className="stat-label">Participation</div></div>
        <div className="stat"><div className="stat-value">{analytics.total_students||0}</div><div className="stat-label">Students</div></div>
        <div className="stat"><div className="stat-value">{report.total_tasks||0}</div><div className="stat-label">Tasks</div></div>

        {/* Per-question accuracy */}

          <div className="card">
            <div className="card-title">✅ Question Accuracy</div>
            <BarChart

              label="Accuracy %"
              color="#22c55e"
            />

        {topicEntries.length > 0 && (
          <div className="card">
            <div className="card-title">🎯 Topic Weakness</div>
            <BarChart
              labels={topicEntries.map(([t])=>t)}
              data={topicEntries.map(([,d])=>d.total>0?Math.round(d.wrong/d.total*100):0)}
              label="Wrong %"
              color="#ef4444"
            />
          </div>
        )}

        {/* Group comparison */}
        {group_stats.length > 0 && (
          <div className="card">
            <div className="card-title">👥 Group Comparison</div>
            <>
  <BarChart
    labels={group_stats.map(g=>g.name)}
    data={group_stats.map(g=>g.avg_score)}
    label="Avg Score"
    color="#8b5cf6"
  />

  <div className="mt-8">
    {group_stats.map(g=>(
      <div key={g.id} className="flex justify-between text-sm text-muted" style={{marginBottom:4}}>
        <span>{g.name}</span>
        <span>{g.participation}% participation</span>
      </div>
    ))}
  </div>
</>

                  {['#','Question','Topic','Responses','Correct','Accuracy'].map(h=>

              <tbody>
