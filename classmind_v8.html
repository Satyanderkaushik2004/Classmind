function GuidedTour({ setPage, onTourMessage, forceTour, onForceTourConsumed, dashboardReady, sessionCode }) {
  const STORAGE_KEY = `walkthrough_seen_${sessionCode}`;
  const [shouldStart, setShouldStart] = useState(false);
  const [step, setStep]               = useState(0);
  const [rect, setRect]               = useState(null);
  const [tooltipPos, setTooltipPos]   = useState({ top: 0, left: 0 });
  const [arrowStyle, setArrowStyle]   = useState({});
  const [fade, setFade]               = useState(true); // for smooth step transitions

  // ── Trigger: fire ONCE per session (sessionCode-scoped localStorage key) ──
  useEffect(() => {
    if (!dashboardReady) return;
    if (localStorage.getItem(STORAGE_KEY)) return;
    const t = setTimeout(() => {
      setStep(0);
      setRect(null);
      setFade(true);
      setShouldStart(true);
      localStorage.setItem(STORAGE_KEY, 'true');
    }, 400);
    return () => clearTimeout(t);
  }, [dashboardReady]);

  // ── Re-trigger: Copilot can restart tour at any time ────────────
  useEffect(() => {
    if (!forceTour) return;
    setStep(0);
    setRect(null);
    setFade(true);
    setShouldStart(true);
    if (onForceTourConsumed) onForceTourConsumed();
  }, [forceTour]);

  // ── Navigate to the right page when step changes ─────────────────
  useEffect(() => {
    if (!shouldStart) return;
    const s = TOUR_STEPS[step];
    if (s?.page) setPage(s.page);
    // Delay pos compute to allow page render
    const t = setTimeout(() => { setFade(true); computePos(); }, 280);
    window.addEventListener('resize', computePos);
    return () => { clearTimeout(t); window.removeEventListener('resize', computePos); };
  }, [shouldStart, step]);

  // ── Fire copilot hint when step advances ─────────────────────────
  useEffect(() => {
    if (!shouldStart || !onTourMessage) return;
    const s = TOUR_STEPS[step];
    if (s?.copilotHint) onTourMessage(s.copilotHint);
  }, [step, shouldStart]);

  function computePos() {
    const s = TOUR_STEPS[step];
    if (!s) return;
    let el = document.getElementById(s.targetId);
    if (!el && s.fallbackId) el = document.getElementById(s.fallbackId);
    if (!el) { setRect(null); return; }

    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    const r = el.getBoundingClientRect();
    setRect({ top: r.top - 6, left: r.left - 6, width: r.width + 12, height: r.height + 12 });

    const vw = window.innerWidth;
    const below = r.bottom + 20;
    const above = r.top - 148;
    const useBelow = below + 140 < window.innerHeight;

    let tipLeft = r.left;
    if (tipLeft + 310 > vw) tipLeft = vw - 320;
    if (tipLeft < 10) tipLeft = 10;

    setTooltipPos({ top: useBelow ? below : above, left: tipLeft });
    setArrowStyle(useBelow
      ? { top: -7, left: Math.min(r.left - tipLeft + r.width / 2 - 6, 240), bottom: 'auto' }
      : { bottom: -7, left: Math.min(r.left - tipLeft + r.width / 2 - 6, 240), top: 'auto' }
    );
  }

  function goToStep(newStep) {
    setFade(false);
    setTimeout(() => { setStep(newStep); }, 120);
  }

  function next() {
    if (step >= TOUR_STEPS.length - 1) { finish(); return; }
    goToStep(step + 1);
  }

  function prev() {
    if (step === 0) return;
    goToStep(step - 1);
  }

  function finish() {
    setShouldStart(false);
  }

  function parseMarkdown(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br/>');
  }

  if (!shouldStart) return null;

  const currentStep = TOUR_STEPS[step];
  const isLast = step === TOUR_STEPS.length - 1;
  const isFirst = step === 0;

  return (
    <>
      {/* Click-blocker overlay — prevents interaction with background during tour */}
      <div style={{
        position:'fixed',inset:0,zIndex:9000,
        background:'transparent',
        pointerEvents:'all',
      }} onClick={e => e.stopPropagation()}/>

      {/* Highlight cutout — box-shadow creates the dim effect, the element itself is the bright window */}
      {rect && (
        <div className="tour-highlight" style={{
          position:'fixed',
          top: rect.top, left: rect.left,
          width: rect.width, height: rect.height,
          zIndex:9001,
          boxShadow:'0 0 0 9999px rgba(0,0,0,0.6), 0 0 0 3px var(--accent)',
          borderRadius:8,
          background:'transparent',
          pointerEvents:'none',
          transition:'top 0.3s ease, left 0.3s ease, width 0.3s ease, height 0.3s ease',
        }}/>
      )}

      {/* Tooltip */}
      <div className="tour-tooltip" style={{
        position:'fixed',
        top: tooltipPos.top, left: tooltipPos.left,
        zIndex:9002,
        opacity: fade ? 1 : 0,
        transform: fade ? 'translateY(0)' : 'translateY(8px)',
        transition:'opacity 0.2s ease, transform 0.2s ease',
        maxWidth: 320,
      }}>
        <div className="tour-tooltip-arrow" style={arrowStyle}/>

        {/* Progress dots */}
        <div className="tour-progress" style={{display:'flex',gap:4,marginBottom:8}}>
          {TOUR_STEPS.map((_, i) => (
            <div key={i} className={`tour-dot ${i === step ? 'active' : i < step ? 'done' : ''}`}/>
          ))}
        </div>

        <div className="tour-step-num" style={{
          fontSize:'0.72rem',fontWeight:700,color:'var(--text3)',
          textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6,
        }}>Step {step + 1} of {TOUR_STEPS.length}</div>

        <div className="tour-tooltip-text"
          dangerouslySetInnerHTML={{ __html: parseMarkdown(currentStep.text) }}/>

        {/* Final step success banner */}
        {isLast && (
          <div style={{
            marginTop:12,padding:'10px 14px',borderRadius:8,
            background:'linear-gradient(135deg,rgba(99,102,241,0.18),rgba(34,197,94,0.12))',
            border:'1px solid rgba(99,102,241,0.3)',
            fontSize:'0.85rem',fontWeight:600,color:'var(--text)',textAlign:'center',
          }}>
            🚀 You're ready to run your classroom!
          </div>
        )}

        <div className="tour-actions" style={{display:'flex',gap:8,marginTop:12,alignItems:'center'}}>
          <button className="tour-btn-skip" onClick={finish} style={{marginRight:'auto'}}>
            {isLast ? '✓ Close' : 'Skip tour'}
          </button>
          {!isFirst && (
            <button className="tour-btn-next" style={{background:'var(--surface3)',color:'var(--text)'}}
              onClick={prev}>
              ← Prev
            </button>
          )}
          {!isLast && (
            <button className="tour-btn-next" onClick={next}>
              Next →
            </button>
          )}
          {isLast && (
            <button className="tour-btn-next" onClick={finish}
              style={{background:'linear-gradient(135deg,var(--accent),var(--green))'}}>
              🚀 Let's go!
            </button>
          )}
        </div>
      </div>
    </>
  );
}

// ═════════════════════════════════════════════════════════════════
//  AUTO INTERVENTION ENGINE
// ═════════════════════════════════════════════════════════════════
function InterventionPopup({ analytics, roster, sessionStatus }) {
  const [visible, setVisible] = useState(false);
  const [hiding, setHiding] = useState(false);
  const [progressPct, setProgressPct] = useState(100);
  const cooldownRef = useRef(null);
  const progressRef = useRef(null);
  const AUTO_HIDE_MS = 6000;

  const understanding = analytics?.understanding ?? 0;
  const answered      = analytics?.answered      ?? 0;
  const totalStudents = analytics?.total_students ?? (roster?.active?.length ?? 0);
  const atRisk        = analytics?.at_risk        || [];
  const topicConfusion= analytics?.topic_confusion|| {};
  const topTopic = Object.entries(topicConfusion).sort((a,b)=>b[1]-a[1])[0];

  // ── Strict trigger gate ──────────────────────────────────────────
  // ALL conditions must be true simultaneously:
  //  1. Session is actively running (not waiting / paused / ended)
  //  2. There are real students present
  //  3. At least 3 answers have been submitted (avoids 1-response false alarms)
  //  4. Understanding is genuinely low (< 40%)
  function isTourActive() {
    try { return !!document.querySelector('.tour-tooltip'); } catch { return false; }
  }

  const shouldTrigger =
    sessionStatus === 'active' &&
    totalStudents > 0          &&
    answered >= 3              &&
    understanding < 40;

  function dismiss() {
    setHiding(true);
    setTimeout(() => { setVisible(false); setHiding(false); }, 300);
  }

  function startAutoHide() {
    let elapsed = 0;
    const tick = 100;
    setProgressPct(100);
    clearInterval(progressRef.current);
    progressRef.current = setInterval(() => {
      elapsed += tick;
      setProgressPct(Math.max(0, 100 - (elapsed / AUTO_HIDE_MS) * 100));
      if (elapsed >= AUTO_HIDE_MS) {
        clearInterval(progressRef.current);
        dismiss();
      }
    }, tick);
  }

  useEffect(() => {
    // Hard blocks — exit immediately without touching state
    if (!shouldTrigger)      return;
    if (isTourActive())      return;  // tour takes priority
    if (cooldownRef.current) return;  // still in cooldown window
    if (visible)             return;  // already showing

    setVisible(true);
    setHiding(false);
    startAutoHide();

    // 20-second cooldown before next possible trigger
    cooldownRef.current = setTimeout(() => {
      cooldownRef.current = null;
    }, 20000);
  }, [sessionStatus, understanding, answered, totalStudents]);

  // Cleanup on unmount
  useEffect(() => {
    return () => {
      clearInterval(progressRef.current);
      clearTimeout(cooldownRef.current);
    };
  }, []);

  // If session becomes inactive, hide any visible popup immediately
  useEffect(() => {
    if (sessionStatus !== 'active' && visible) dismiss();
  }, [sessionStatus]);

  if (!visible) return null;

  const riskNames = atRisk.slice(0, 3).map(s => s.name || s).join(', ') || null;

  return (
    <div className={`intervention-popup${hiding ? ' hiding' : ''}`}>
      <div className="intervention-header">
        <div className="intervention-title">
          <span>⚠️</span>
          <span>Class Struggling Detected</span>
        </div>
        <button className="intervention-close" onClick={dismiss}>✕</button>
      </div>
      <div className="intervention-body">
        <div className="intervention-metric">
          📊 Understanding: <span style={{color: understanding < 30 ? 'var(--red)' : 'var(--yellow)'}}>{understanding}%</span>
        </div>
        {topTopic && (
          <div className="intervention-metric">
            🎯 Topic: <span>{topTopic[0]}</span>
          </div>
        )}
        <div className="intervention-actions">
          <div className="intervention-action-label">Suggested Actions</div>
          <div className="intervention-action-item">📚 Revise last concept with class</div>
          <div className="intervention-action-item">📝 Send an easier MCQ question</div>
          {atRisk.length > 0 && riskNames && (
            <div className="intervention-action-item">🔴 Focus on: {riskNames}</div>
          )}
        </div>
        <div className="intervention-progress">
          <div className="intervention-progress-fill" style={{width:`${progressPct}%`}}/>
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  AT-RISK STUDENTS PANEL
// ═════════════════════════════════════════════════════════════════
function AtRiskPanel({ analytics, roster }) {
  const atRisk = analytics?.at_risk || [];
  const activeStudents = roster?.active || [];

  // Build enriched student list with accuracy
  const students = activeStudents.map(st => {
    const pct = st.total_answered > 0
      ? Math.round((st.correct / st.total_answered) * 100)
      : null;
    const isRisk = atRisk.some(r => (r.id || r) === (st.id || st));
    return { ...st, pct, isRisk };
  }).filter(s => s.pct !== null || s.isRisk);

  // Sort: lowest first
  const sorted = [...students].sort((a, b) => {
    const pa = a.pct ?? 0;
    const pb = b.pct ?? 0;
    return pa - pb;
  });

  if (sorted.length === 0 && atRisk.length === 0) return null;

  function getColor(pct) {
    if (pct === null) return 'var(--text3)';
    if (pct < 40) return 'var(--red)';
    if (pct < 60) return 'var(--yellow)';
    return 'var(--green)';
  }
  function getLabel(pct) {
    if (pct === null) return 'No data';
    if (pct < 40) return 'Needs attention';
    if (pct < 60) return 'Monitor';
    return 'On track';
  }

  return (
    <div id="tour-anchor-atrisk" className="at-risk-panel">
      <div className="at-risk-panel-title">
        🚨 Student Risk Monitor
        <span className="badge badge-red">{sorted.filter(s=>(s.pct??100)<60).length} at risk</span>
      </div>
      {sorted.length === 0 && atRisk.length > 0 && atRisk.map((s, i) => (
        <div key={i} className="at-risk-row">
          <div className="at-risk-dot" style={{background:'var(--red)'}}/>
          <div className="at-risk-name">{s.name || s}</div>
          <div className="at-risk-label" style={{color:'var(--red)'}}>Needs attention</div>
        </div>
      ))}
      {sorted.map(st => {
        const color = getColor(st.pct);
        return (
          <div key={st.id} className="at-risk-row">
            <div className="at-risk-dot" style={{background:color}}/>
            <div className="at-risk-name">{st.name}</div>
            {st.pct !== null && (
              <div className="at-risk-bar">
                <div className="at-risk-bar-fill" style={{width:`${st.pct}%`,background:color}}/>
              </div>
            )}
            <div className="at-risk-pct" style={{color}}>{st.pct ?? '—'}%</div>
            <div className="at-risk-label">{getLabel(st.pct)}</div>
          </div>
        );
      })}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
//  TEACHER COPILOT  (Part 2 — humanized upgrade)
// ═════════════════════════════════════════════════════════════════
function TeacherCopilot({ analytics, roster, tasks, sessionStatus, sessionControl, setPage, tourMessage, setForceTour, prevSessionStatus, prevTasksLength }) {
  const [open, setOpen] = useState(false);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const [unread, setUnread] = useState(0);
  const [messages, setMessages] = useState(() => {
    const greetings = [
      "Hey 👋 Ready to run your class today?",
      "Welcome back! Let's make this session great. 🎓",
      "Hi there! Need help getting started?",
      "Good to see you! I'm here whenever you need guidance. 🧠",
    ];
    const g = greetings[Math.floor(Math.random() * greetings.length)];
    return [{ role:'bot', text: g, ts: fmtTs() }];
  });
  const bottomRef = useRef(null);
  const inputRef = useRef(null);
  const prevStatusRef = useRef(sessionStatus);
  const prevTasksRef = useRef(tasks?.length || 0);

  function fmtTs() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function addBotMsg(text, delay = 600) {
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      setMessages(m => [...m, { role:'bot', text, ts: fmtTs() }]);
      if (!open) setUnread(u => u + 1);
    }, delay + Math.random() * 200);
  }

  // Tour message injection
  useEffect(() => {
    if (!tourMessage) return;
    addBotMsg(tourMessage, 300);
  }, [tourMessage]);

  // Event-based proactive messages
  useEffect(() => {
    const prev = prevStatusRef.current;
    if (prev !== sessionStatus) {
      prevStatusRef.current = sessionStatus;
      if (sessionStatus === 'active' && prev === 'waiting') {
        addBotMsg(pick([
          "Session started ✅ Let's engage your students!",
          "You're live! Students can join now. 🚀",
          "Class is open — let's go! 🎉"
        ]), 400);
      } else if (sessionStatus === 'paused') {
        addBotMsg("Session paused ⏸ Take a breather!", 400);
      } else if (sessionStatus === 'ended') {
        addBotMsg("Session ended. Great work today! 🎓 Check Reports for insights.", 400);
      }
    }
  }, [sessionStatus]);

  useEffect(() => {
    const prev = prevTasksRef.current;
    const cur = tasks?.length || 0;
    if (cur > prev && prev === 0) {
      prevTasksRef.current = cur;
      addBotMsg(pick([
        "Nice! First task created 📝 Now send it to students!",
        "Great — your first question is ready. Hit **Send Next Task**! 📤",
      ]), 500);
    } else {
      prevTasksRef.current = cur;
    }
  }, [tasks?.length]);

  // Proactive on open
  useEffect(() => {
    if (!open) return;
    setUnread(0);
    setTimeout(() => inputRef.current?.focus(), 150);
    const taskCount = tasks?.length || 0;
    const participation = analytics?.participation || 0;
    const understanding = analytics?.understanding || 0;
    const atRisk = analytics?.at_risk || [];

    if (sessionStatus === 'waiting' && messages.length <= 2) {
      addBotMsg(pick([
        "Start your session first to let students in. 👆",
        "Whenever you're ready, hit **Start Session** to begin! 🚀"
      ]), 700);
      return;
    }
    if (taskCount === 0 && sessionStatus === 'active' && messages.length <= 2) {
      addBotMsg("You're live but have no tasks yet — head to **Tasks** to create your first question! 📝", 700);
      return;
    }
    if (participation < 50 && sessionStatus === 'active') {
      addBotMsg(pick([
        `Participation is low at ${participation}% 📉 Try sending a quick MCQ to re-engage the class.`,
        `Only ${participation}% of students are participating. Want to send a task to boost engagement?`
      ]), 700);
      return;
    }
    if (atRisk.length > 0 && messages.length <= 2) {
      addBotMsg(`Some students are struggling ⚠️ Want to review the at-risk list? (${atRisk.map(s=>s.name||s).slice(0,2).join(', ')}${atRisk.length > 2 ? '…' : ''})`, 700);
    }
  }, [open]);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:'smooth' });
  }, [messages, typing]);

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function handleSend() {
    const q = input.trim();
    if (!q) return;
    setInput('');
    setMessages(m => [...m, { role:'user', text: q, ts: fmtTs() }]);
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      // ── Tour trigger: intercept before normal getReply ─────────────
      if (/\btour\b|\bguide\b|\bwalkthrough\b|\bonboard\b/.test(q.toLowerCase())) {
        if (setForceTour) {
          setForceTour(true);
          setPage('dashboard');
        }
        setMessages(m => [...m, { role:'bot', text: pick([
          "🗺️ Starting the guided tour for you! Follow the highlighted steps to get set up.",
          "✨ Launching walkthrough now! I'll highlight each key feature step by step.",
          "🚀 Tour starting! Follow along — I'll guide you through ClassMind's core features.",
        ]), ts: fmtTs() }]);
        return;
      }
      const reply = getReply(q.toLowerCase());
      setMessages(m => [...m, { role:'bot', text: reply, ts: fmtTs() }]);
    }, 500 + Math.random() * 300);
  }

  function quickAsk(q) {
    setMessages(m => [...m, { role:'user', text: q, ts: fmtTs() }]);
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      // ── Tour trigger ───────────────────────────────────────────────
      if (/\btour\b|\bguide\b|\bwalkthrough\b|\bonboard\b/.test(q.toLowerCase())) {
        if (setForceTour) {
          setForceTour(true);
          setPage('dashboard');
        }
        setMessages(m => [...m, { role:'bot', text: "🗺️ Starting the guided tour for you! Follow the highlighted steps.", ts: fmtTs() }]);
        return;
      }
      setMessages(m => [...m, { role:'bot', text: getReply(q.toLowerCase()), ts: fmtTs() }]);
    }, 500);
  }

  function getReply(q) {
    const participation = analytics?.participation || 0;
    const understanding = analytics?.understanding || 0;
    const atRisk = analytics?.at_risk || [];
    const activeStudents = roster?.active || [];
    const taskCount = tasks?.length || 0;

    // ── Humanized small talk ──
    if (/^(hi|hello|hey|sup|yo)[\s!.]*$/.test(q.trim())) return pick(["Hey! How can I help you today? 😊", "Hi there! What do you need?", "Hello! Ready to help 🧠"]);
    if (/thank|thanks|ty/.test(q)) return pick(["Anytime 😄", "Happy to help!", "Of course! Let me know if you need anything else."]);
    if (/^ok[\s!.]*$|^okay[\s!.]*$|^got it[\s!.]*$/.test(q.trim())) return pick(["👍 Got it", "Perfect!", "Sounds good!"]);
    if (/good|great|awesome|nice/.test(q)) return pick(["That's great to hear! 🎉", "Love the energy! 💪", "Excellent!"]);
    if (/help/.test(q) && q.length < 10) return "I can help with navigation, live insights, sending tasks, or answering questions.\n\n💡 Say **\"start tour\"** to launch the guided walkthrough! 🧠";

    // ── Navigation ──
    if (/go to|open|show|navigate/.test(q)) {
      if (/dashboard/.test(q))      { setPage('dashboard');      return pick(['✅ Taking you to Dashboard!', 'Sure! Opening Dashboard now.']); }
      if (/task/.test(q))           { setPage('tasks');          return pick(['📝 Opening Tasks for you!', 'Sure! Here are your tasks.']); }
      if (/report/.test(q))         { setPage('reports');        return pick(['📈 Opening Reports!', 'Sure, checking the reports now.']); }
      if (/group/.test(q))          { setPage('groups');         return '👥 Opening Groups!'; }
      if (/chat|comm/.test(q))      { setPage('communication');  return '💬 Opening Chat!'; }
      if (/content/.test(q))        { setPage('content');        return '📄 Opening Content!'; }
      if (/test/.test(q))           { setPage('test');           return '🧪 Opening Test Mode!'; }
      if (/code|coding|lab/.test(q)){ setPage('coding');         return '💻 Opening Coding Lab!'; }
      return 'I can navigate to: Dashboard, Tasks, Reports, Groups, Chat, Content, Test Mode, or Coding Lab.';
    }

    // ── Session control ──
    if (/start session/.test(q)) {
      if (sessionStatus === 'active') return pick(['✅ Session is already active!', 'You\'re already live! 🟢']);
      sessionControl('start');
      return pick(['▶️ Starting your session now!', 'Here we go! Session starting… 🚀']);
    }
    if (/pause session/.test(q)) { sessionControl('pause'); return '⏸ Paused! Take your time.'; }
    if (/resume session/.test(q)) { sessionControl('resume'); return '▶️ Resumed! Welcome back.'; }
    if (/end session/.test(q)) { sessionControl('end'); return '🛑 Session ended. Great class!'; }

    // ── Analytics ──
    if (/at.?risk|struggling|weak/.test(q)) {
      if (atRisk.length === 0) return '✅ No at-risk students right now — class is doing well!';
      return `🚨 **At-risk students (${atRisk.length}):**\n${atRisk.map(s=>`• ${s.name||s}`).join('\n')}\n\nConsider checking in with them personally.`;
    }
    if (/performance|understanding|score/.test(q)) {
      const c = understanding >= 70 ? '🟢' : understanding >= 40 ? '🟡' : '🔴';
      return `${c} **Understanding:** ${understanding}%\n📣 **Participation:** ${participation}%\n👥 **Active:** ${activeStudents.length} students`;
    }
    if (/participation/.test(q)) {
      return participation < 50
        ? `📣 Participation is at **${participation}%** — that's low. Try sending a task to re-engage! 📤`
        : `📣 Participation is at **${participation}%** — looking good! ✅`;
    }
    if (/student|active|how many|roster/.test(q)) {
      return `👥 **${activeStudents.length} students** active right now.\n${activeStudents.slice(0,6).map(s=>`• ${s.name||s.display_name||'Student'}`).join('\n')}${activeStudents.length > 6 ? `\n…and ${activeStudents.length-6} more` : ''}`;
    }
    if (/task|how many task/.test(q)) {
      return taskCount === 0 ? '📝 No tasks yet — head to the **Tasks** tab to create your first question!' : `📝 You have **${taskCount} task${taskCount>1?'s':''}** in this session.`;
    }
    if (/session|status/.test(q)) {
      const e = {waiting:'⏳',active:'🟢',paused:'⏸',ended:'🔴'}[sessionStatus]||'⚪';
      return `${e} Session is **${sessionStatus.toUpperCase()}** right now.`;
    }

    // ── Feature guidance ──
    if (/create.*task|add.*task|new.*task/.test(q)) return '📝 **To create a task:**\n1. Click **Tasks** in the nav\n2. Click **"+ Create Task"**\n3. Choose MCQ, Short Answer, or Coding\n4. Fill in the question\n5. Hit **Save**, then **Send Next Task**!';
    if (/test mode|quiz|run.*test|launch.*quiz/.test(q)) return '🧪 **Test Mode:** Go to the Test tab, add questions, set a timer, and click **Launch Test** — students auto-redirect and get a live countdown!';
    if (/group/.test(q)) return '👥 **Groups:** Go to Groups tab → click **Auto-Generate** to create balanced groups instantly. You can also edit them manually.';
    if (/content|upload|share.*file/.test(q)) return '📄 **Content:** Upload a PDF or image in the Content tab — it\'s instantly shared with all students!';
    if (/report|analytics/.test(q)) return '📈 **Reports** show understanding %, accuracy per question, topic weakness map, and a live leaderboard. All updated in real-time!';
    if (/chat|doubt/.test(q)) return '💬 **Chat** tab has live class chat, student doubts you can answer, and hand-raise notifications. A red dot appears when someone needs you.';
    if (/coding lab|code lab|python/.test(q)) return '💻 **Coding Lab** gives students a Python sandbox. Send a coding task and students write, run, and submit their code directly in the browser.';
    if (/notif|hand.?raise|alert/.test(q)) return '🔔 **Notifications** appear as a red dot on the Chat tab. You\'ll be alerted for new doubts, hand raises, and chat messages — with a sound too!';
    if (/monitor|at.?risk|watch/.test(q)) return '🚨 **Student Monitor** (bottom of Dashboard) ranks all students by accuracy and flags who\'s falling behind so you know exactly who needs help.';
    if (/copilot|assistant|ai|you/.test(q)) return '🧠 **I\'m your ClassMind Copilot!** Ask me anything:\n• "Who is at risk?"\n• "Go to Reports"\n• "How do I create a task?"\n• "Suggest something"\n• "Start tour" for a walkthrough!';

    // ── What can I do here? ───────────────────────────────────────────
    if (/what can i do|what can you do|what.?s here|explain this|explain dashboard|explain feature|how do i use|how to use|overview/.test(q)) {
      return '🧭 **Here\'s what you can do in ClassMind:**\n• 📊 **Dashboard** — live class health at a glance\n• 📝 **Tasks** — create & send MCQ, short answer, or coding questions\n• 🧪 **Test Mode** — run timed graded quizzes\n• 💻 **Coding Lab** — send Python tasks to students\n• 📈 **Reports** — deep analytics & leaderboard\n• 💬 **Chat** — handle doubts, hand raises & messages\n• 📄 **Content** — share PDFs & images instantly\n• 👥 **Groups** — auto-generate balanced student groups\n\nSay **"Start tour"** for an interactive walkthrough! 🗺️';
    }

    // ── How does X work ───────────────────────────────────────────────
    if (/how does.*work|how.*send.*task|what is.*task/.test(q)) return '📤 **Sending tasks:** Go to Tasks → create a question → come back to Dashboard → click **Send Next Task**. Students see it instantly!';
    if (/how.*session|what.*session/.test(q)) return '🏫 A **Session** is your live classroom. Click **Start Session** to open it. Students join using your session code. You control pacing — start, pause, or end anytime.';
    if (/what can i do in task|tasks tab|task page/.test(q)) return '📝 In **Tasks** you can create and send tasks, assign quizzes, and track student responses in real-time.';
    if (/what can i do in report|report tab|report page/.test(q)) return '📈 In **Reports** you can view understanding trends, per-question accuracy, topic confusion maps, and a live student leaderboard.';

    if (/what can you|feature|how/.test(q)) return '🧠 **I can help with:**\n• Live insights — "Who is at risk?"\n• Navigate — "Go to Reports"\n• Feature help — "How to create a task?"\n• Actions — "Start session"\n• 🗺️ **Tour** — "Start tour" to relaunch the walkthrough\n\nJust ask!';

    // ── Intelligent "What should I do now?" ──
    if (/what should i do|what now|what do i do|next step|guide me|what.?s next/.test(q)) {
      const parts = [];
      if (understanding < 50) parts.push(`📉 Understanding is at ${understanding}% — revise the last concept before moving on.`);
      if (understanding >= 50 && understanding < 70) parts.push(`🟡 Understanding is ${understanding}% — consider a quick recap question.`);
      const topicConfusion = analytics?.topic_confusion || {};
      const topTopic = Object.entries(topicConfusion).sort((a,b)=>b[1]-a[1])[0];
      if (topTopic) parts.push(`🎯 Most confusion in: **${topTopic[0]}**.`);
      if (atRisk.length > 0) parts.push(`🔴 Focus on: ${atRisk.slice(0,3).map(s=>s.name||s).join(', ')}.`);
      if (participation < 40) parts.push(`📤 Send a quick MCQ to boost participation (${participation}% active).`);
      if (parts.length === 0) return '✅ Class is doing well! Keep going or send the next task.';
      return parts.join('\n');
    }

    // ── Suggestions ──
    if (/suggest|what should|advice|recommend/.test(q)) {
      const tips = [];
      if (participation < 50) tips.push('📤 Send a task to boost participation');
      if (understanding < 40) tips.push('📚 Revise the topic — students are struggling');
      if (taskCount === 0) tips.push('📝 Create your first task');
      if (atRisk.length > 0) tips.push(`⚠️ Check in with: ${atRisk.slice(0,2).map(s=>s.name||s).join(', ')}`);
      if (!tips.length) return pick(['✅ Everything looks great! Class is engaged and on track.', 'Class is running smoothly — keep it up! 🎉']);
      return '💡 **My suggestions:**\n' + tips.join('\n');
    }

    return pick([
      "🤔 I didn't quite catch that. Try asking about tasks, students, reports, or navigation!",
      "Hmm, not sure about that one. Ask me about class performance, tasks, or navigation 😊",
    ]);
  }

  function parseMarkdown(text) {
    return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>');
  }

  const QUICK = ['Class performance?', 'Who is at risk?', 'Go to Tasks', 'Suggest something'];

  return (
    <>
      {/* FAB */}
      <button id="copilot-tour-anchor" className="copilot-fab" onClick={() => { setOpen(o => !o); setUnread(0); }} title="ClassMind Copilot"
        style={{position:'fixed', bottom:'28px', right:'28px', zIndex:99999}}>
        <span className="copilot-pulse"/>
        {open ? '✕' : '🧠'}
        {!open && unread > 0 && <span className="copilot-badge">{unread}</span>}
      </button>

      {/* Chat Window */}
      {open && (
        <div className="copilot-window" style={{position:'fixed', bottom:'96px', right:'28px', zIndex:99998}}>
          <div className="copilot-header">
            <div className="copilot-header-info">
              <div className="copilot-avatar">🧠</div>
              <div>
                <div className="copilot-title">ClassMind Copilot</div>
                <div className="copilot-subtitle" style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{width:7,height:7,borderRadius:'50%',background:'var(--green)',display:'inline-block'}}/>
                  Online — always here to help
                </div>
              </div>
            </div>
            <button className="copilot-close" onClick={() => setOpen(false)}>✕</button>
          </div>

          <div className="copilot-chips">
            {QUICK.map(q => (
              <button key={q} className="copilot-chip" onClick={() => quickAsk(q)}>{q}</button>
            ))}
          </div>

          <div className="copilot-messages">
            {messages.map((m, i) => (
              <div key={i} className={`copilot-msg ${m.role}`}>
                <div className="copilot-bubble" dangerouslySetInnerHTML={{ __html: parseMarkdown(m.text) }}/>
                <span className="copilot-ts">{m.ts}</span>
              </div>
            ))}
            {typing && (
              <div className="copilot-msg bot">
                <div className="copilot-typing">
                  <div className="copilot-dot"/><div className="copilot-dot"/><div className="copilot-dot"/>
                </div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          <div className="copilot-input-row">
            <input ref={inputRef} className="copilot-input" value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && !typing && handleSend()}
              placeholder="Ask anything…" disabled={typing}/>
            <button className="copilot-send" onClick={handleSend} disabled={typing || !input.trim()}>➤</button>
          </div>
        </div>
      )}
    </>
  );
}

//  STUDENT LIVE HUD  (Feature 1)

function StudentHUD({ sessionStatus, taskIndex, totalTasks, wsConnected, hasTask }) {
  const statusColor = sessionStatus === 'active' ? 'green' : sessionStatus === 'paused' ? 'yellow' : 'red';
  const statusLabel = sessionStatus === 'active' ? 'Live' : sessionStatus === 'paused' ? 'Paused' : sessionStatus === 'ended' ? 'Ended' : 'Waiting';

  return (
    <div className="student-hud">

        <div className={`hud-dot ${statusColor} ${sessionStatus==='active'?'pulse':''}`}/>

      <div className="hud-sep"/>
